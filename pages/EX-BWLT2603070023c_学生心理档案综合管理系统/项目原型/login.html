<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 学生心理档案综合管理系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --primary:#2C6BAC;--primary-light:#4A8FD4;--primary-dark:#1A4F85;
  --accent:#5BB8A0;--accent2:#F0A500;--danger:#E05555;--warn:#E08A30;
  --bg:#F4F7FB;--sidebar-bg:#1C2D4A;--sidebar-text:#B8CCDF;
  --card-bg:#FFFFFF;--text-main:#1A2A3C;--text-sub:#5C7A96;
  --border:#DDE6F0;--shadow:0 2px 16px rgba(44,107,172,0.10);
  --shadow-lg:0 8px 32px rgba(44,107,172,0.16);--radius:14px;--radius-sm:8px;
  --font-serif:'Noto Serif SC',serif;--font-sans:'Noto Sans SC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center}

.login-container{width:100%;max-width:480px;padding:20px}
.login-card{background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);overflow:hidden}
.login-header{background:linear-gradient(135deg,#1C3F6E 0%,#2C6BAC 50%,#3A8BBF 100%);padding:40px 40px 50px;text-align:center;position:relative;overflow:hidden}
.login-header::before{content:'';position:absolute;top:-30px;right:-30px;width:150px;height:150px;background:rgba(255,255,255,0.05);border-radius:50%}
.login-header::after{content:'';position:absolute;bottom:-40px;right:80px;width:120px;height:120px;background:rgba(255,255,255,0.04);border-radius:50%}

.login-logo{width:64px;height:64px;background:linear-gradient(135deg,#4A8FD4,#5BB8A0);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 20px rgba(44,107,172,0.4)}
.login-logo i{font-size:30px;color:#fff}
.login-title{font-family:var(--font-serif);font-size:22px;color:#fff;font-weight:700;margin-bottom:8px}
.login-subtitle{font-size:13px;color:rgba(255,255,255,0.75)}

.login-body{padding:36px 40px 40px}

.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text-main);margin-bottom:8px}
.form-input{width:100%;height:48px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 16px;font-size:14px;color:var(--text-main);font-family:var(--font-sans);transition:all 0.2s;outline:none}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(44,107,172,0.1)}
.form-input::placeholder{color:var(--text-sub)}

.input-group{display:flex;gap:10px}
.input-group .form-input{flex:1}

.btn{height:48px;padding:0 24px;border-radius:var(--radius-sm);font-size:15px;font-weight:500;cursor:pointer;border:none;transition:all 0.2s;font-family:var(--font-sans);display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 16px rgba(44,107,172,0.35)}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(44,107,172,0.4)}
.btn-primary:active{transform:translateY(0)}
.btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--primary);background:#F0F6FF}
.btn-full{width:100%}

.btn-secondary{background:var(--bg);color:var(--text-sub);height:44px;font-size:13px}
.btn-secondary:hover{background:var(--border);color:var(--text-main)}
.btn-sm{height:36px;padding:0 14px;font-size:13px}

.verify-btn{width:110px;height:48px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--primary);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.verify-btn:hover:not(:disabled){background:var(--primary);border-color:var(--primary);color:#fff}
.verify-btn:disabled{opacity:0.5;cursor:not-allowed}

.login-divider{display:flex;align-items:center;gap:16px;margin:24px 0}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.login-divider span{font-size:12px;color:var(--text-sub)}

.login-footer{text-align:center;margin-top:24px}
.login-footer p{font-size:12px;color:var(--text-sub)}
.login-footer a{color:var(--primary);text-decoration:none}
.login-footer a:hover{text-decoration:underline}

.remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.remember-check{display:flex;align-items:center;gap:8px;cursor:pointer}
.remember-check input{width:16px;height:16px;accent-color:var(--primary)}
.remember-check span{font-size:13px;color:var(--text-sub)}
.forgot-link{font-size:13px;color:var(--primary);text-decoration:none;cursor:pointer}
.forgot-link:hover{text-decoration:underline}

.alert{height:44px;background:#FDEAEA;border:1px solid #F5CACA;border-radius:var(--radius-sm);display:flex;align-items:center;gap:10px;padding:0 16px;margin-bottom:20px;font-size:13px;color:#C04040;display:none}
.alert.show{display:flex}
.alert i{font-size:16px}

.user-agreement{font-size:12px;color:var(--text-sub);margin-bottom:20px;line-height:1.6}
.user-agreement a{color:var(--primary)}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo"><i class="fa-solid fa-heart-pulse"></i></div>
      <div class="login-title">学生心理档案综合管理系统</div>
      <div class="login-subtitle">请登录以继续使用系统</div>
    </div>
    <div class="login-body">
      <div class="alert" id="loginAlert"><i class="fa-solid fa-circle-exclamation"></i><span>验证码错误，请重新输入</span></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">手机号码</label>
          <input type="tel" class="form-input" id="phone" placeholder="请输入手机号码" maxlength="11">
        </div>

        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="input-group">
            <input type="text" class="form-input" id="verifyCode" placeholder="请输入6位验证码" maxlength="6">
            <button type="button" class="verify-btn" id="sendCodeBtn">获取验证码</button>
          </div>
        </div>

        <div class="remember-row">
          <label class="remember-check">
            <input type="checkbox" checked>
            <span>30天内免登录</span>
          </label>
          <a class="forgot-link">遇到问题？</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          <i class="fa-solid fa-right-to-bracket"></i> 登录系统
        </button>
      </form>

      <div class="user-agreement">
        登录即表示您同意<a href="#">《用户服务协议》</a>和<a href="#">《隐私政策》
      </div>
    </div>
  </div>
</div>

<script>
const phoneInput = document.getElementById('phone');
const verifyCodeInput = document.getElementById('verifyCode');
const sendCodeBtn = document.getElementById('sendCodeBtn');
const loginForm = document.getElementById('loginForm');
const loginAlert = document.getElementById('loginAlert');

let countdown = 0;
let timer = null;

sendCodeBtn.addEventListener('click', function() {
  const phone = phoneInput.value.trim();

  if (!phone) {
    showAlert('请输入手机号码');
    phoneInput.focus();
    return;
  }

  if (!/^1[3-9]\d{9}$/.test(phone)) {
    showAlert('请输入正确的手机号码');
    phoneInput.focus();
    return;
  }

  countdown = 60;
  this.disabled = true;
  this.textContent = countdown + 's';

  timer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      clearInterval(timer);
      this.disabled = false;
      this.textContent = '重新获取';
    } else {
      this.textContent = countdown + 's';
    }
  }, 1000);
});

loginForm.addEventListener('submit', function(e) {
  e.preventDefault();

  const phone = phoneInput.value.trim();
  const code = verifyCodeInput.value.trim();

  if (!phone) {
    showAlert('请输入手机号码');
    phoneInput.focus();
    return;
  }

  if (!code) {
    showAlert('请输入验证码');
    verifyCodeInput.focus();
    return;
  }

  if (code.length !== 6) {
    showAlert('请输入6位验证码');
    verifyCodeInput.focus();
    return;
  }

  if (code === '123456') {
    sessionStorage.setItem('isLoggedIn', 'true');
    sessionStorage.setItem('userName', '孙家祺');
    sessionStorage.setItem('userRole', '管理员');
    window.location.href = 'index.html';
  } else {
    showAlert('验证码错误，请输入123456测试');
  }
});

function showAlert(msg) {
  loginAlert.querySelector('span').textContent = msg;
  loginAlert.classList.add('show');
  setTimeout(() => {
    loginAlert.classList.remove('show');
  }, 3000);
}
</script>
</body>
</html>
