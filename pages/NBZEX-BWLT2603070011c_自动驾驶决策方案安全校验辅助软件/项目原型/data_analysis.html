<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        :root {
            --mac-bg-0: #0b0c0f;
            --mac-bg-1: #0f1117;
            --mac-surface: rgba(28, 28, 30, 0.72);
            --mac-surface-strong: rgba(28, 28, 30, 0.86);
            --mac-border: rgba(255, 255, 255, 0.10);
            --mac-border-soft: rgba(255, 255, 255, 0.08);
            --mac-text: rgba(255, 255, 255, 0.92);
            --mac-text-dim: rgba(255, 255, 255, 0.68);
            --mac-text-muted: rgba(255, 255, 255, 0.48);
            --mac-blue: #0a84ff;
            --mac-blue-dim: rgba(10, 132, 255, 0.22);
            --mac-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
            --mac-window-radius: 18px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: url('./static/bg.jpeg'); background-size: cover; background-position: center; color: var(--mac-text); overflow: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        .liquid-glass { background: var(--mac-surface); backdrop-filter: saturate(180%) blur(26px); -webkit-backdrop-filter: saturate(180%) blur(26px); border: 1px solid var(--mac-border-soft); box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset; }
        .mac-desktop { width: 100vw; height: 100vh; padding: 18px; display: flex; align-items: center; justify-content: center; }
        .mac-window { width: 1440px; height: 900px; border-radius: var(--mac-window-radius); box-shadow: var(--mac-shadow); border: 1px solid rgba(255, 255, 255, 0.08); overflow: hidden; background: rgba(15, 17, 23, 0.35); display: flex; flex-direction: column; }
        .mac-titlebar { height: 52px; padding: 0 14px; display: flex; align-items: center; gap: 12px; background: var(--mac-surface-strong); backdrop-filter: saturate(180%) blur(26px); -webkit-backdrop-filter: saturate(180%) blur(26px); border-bottom: 1px solid var(--mac-border-soft); user-select: none; flex-shrink: 0; }
        .mac-traffic { display: flex; align-items: center; gap: 8px; padding: 0 4px; }
        .mac-dot { width: 12px; height: 12px; border-radius: 9999px; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.28) inset; }
        .mac-dot.red { background: #ff5f57; } .mac-dot.yellow { background: #febc2e; } .mac-dot.green { background: #28c840; } .mac-dot.gray { background: rgba(255, 255, 255, 0.28); }
        .mac-title { flex: 1; text-align: center; font-size: 13px; font-weight: 600; letter-spacing: 0.2px; color: rgba(255, 255, 255, 0.9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-item { display: flex; align-items: center; padding: 10px 12px; font-size: 14px; color: rgba(255, 255, 255, 0.68); border-radius: 10px; transition: all 0.2s ease; text-decoration: none; margin-bottom: 4px; cursor: pointer; }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.92); }
        .sidebar-item.active { background: var(--mac-blue-dim); color: var(--mac-blue); box-shadow: 0 0 0 1px rgba(10, 132, 255, 0.20) inset; }
        .sidebar-item i { margin-right: 12px; font-size: 16px; width: 20px; text-align: center; }
        .control-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: none; outline: none; }
        .control-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .control-btn:active { transform: scale(0.95); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 4px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.25); }
        .draggable-window { position: fixed; z-index: 1000; background: var(--mac-surface-strong); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden; display: flex; flex-direction: column; }
        .window-header { height: 38px; padding: 0 12px; display: flex; align-items: center; background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor: move; user-select: none; }
        .window-body { padding: 16px; color: var(--mac-text); overflow-y: auto; max-height: 80vh; }
        .btn-primary { background-color: var(--mac-blue); color: white; padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; }
        .btn-secondary { background-color: rgba(255, 255, 255, 0.1); color: white; padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; }
        .btn-danger { background-color: #ff453a; color: white; padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; }
        .input-field { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 8px 12px; border-radius: 6px; width: 100%; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: var(--mac-blue); }
        @supports not ((-webkit-backdrop-filter: none) or (backdrop-filter: none)) { .liquid-glass, .mac-titlebar, .draggable-window { background: rgba(28, 28, 30, 0.95); } }
    </style>
</head>
<body class="overflow-hidden">

            <div class="flex h-[calc(100%-52px)] overflow-hidden">

                    <nav class="flex-1 space-y-1">

                            <i class="fa-solid fa-triangle-exclamation"></i>

                        </a>
                        <a class="sidebar-item flex items-center px-3 py-2.5 text-sm" href="system_settings.html">
                            <i class="fa-solid fa-gear"></i>
                            系统设置
                        </a>
                    </nav>
                    <div class="mt-auto pt-4 border-t border-white/10 flex items-center gap-3 px-2">
                        <div class="relative w-10 h-10 flex items-center justify-center font-bold text-white">
                            <img class="w-full h-full object-cover rounded-full " alt="王一辰"
                                src="https://i02piccdn.sogoucdn.com/40248540f6e11524" />
                            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-black/50 rounded-full"></div>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-sm font-medium text-white/90">王一辰</span>

                        </div>
                        <button class="ml-auto text-white/55 hover:text-white/85 transition-colors">
                            <i class="fa-solid fa-right-from-bracket"></i>
                        </button>
                    </div>
                </aside>
                <main class="flex-1 flex flex-col relative bg-black/40 p-6 overflow-y-auto custom-scrollbar">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-xl font-semibold text-white">数据分析面板</h1>
                        <button id="btn-export" class="control-btn px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                        <div class="liquid-glass p-5 rounded-xl">
                            <div class="text-sm text-gray-400 mb-2">累计校验里程</div>
                            <div class="text-3xl font-bold text-white">12,450 <span class="text-sm font-normal text-gray-400">km</span></div>

                        <div class="liquid-glass p-5 rounded-xl">

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">

                        <div class="liquid-glass p-5 rounded-xl">

                    <div class="liquid-glass rounded-xl p-5">
                        <h3 class="text-sm font-semibold text-white mb-4">详细校验记录</h3>
                        <table class="w-full text-left text-sm text-gray-400">
                            <thead class="border-b border-white/10 text-xs uppercase">
                                <tr>
                                    <th class="pb-3 font-medium">时间</th>

                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5" id="table-body">
                                <tr class="hover:bg-white/5 transition-colors">
                                    <td class="py-3">2026-03-16 14:30</td>
                                    <td class="py-3 text-white/80">城市十字路口</td>
                                    <td class="py-3">2.5</td>
                                    <td class="py-3"><span class="px-2 py-1 rounded bg-green-500/20 text-green-400 text-xs">通过</span></td>
                                    <td class="py-3"><button class="text-blue-400 hover:text-blue-300 text-xs">详情</button></td>
                                </tr>
                                <tr class="hover:bg-white/5 transition-colors">
                                    <td class="py-3">2026-03-16 14:25</td>
                                    <td class="py-3 text-white/80">高速汇入</td>
                                    <td class="py-3">1.2</td>
                                    <td class="py-3"><span class="px-2 py-1 rounded bg-yellow-500/20 text-yellow-400 text-xs">警告</span></td>
                                    <td class="py-3"><button class="text-blue-400 hover:text-blue-300 text-xs">详情</button></td>
                                </tr>
                                <tr class="hover:bg-white/5 transition-colors">
                                    <td class="py-3">2026-03-16 14:20</td>
                                    <td class="py-3 text-white/80">特殊障碍物</td>
                                    <td class="py-3">3.1</td>
                                    <td class="py-3"><span class="px-2 py-1 rounded bg-green-500/20 text-green-400 text-xs">通过</span></td>
                                    <td class="py-3"><button class="text-blue-400 hover:text-blue-300 text-xs">详情</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // Common JS Functions
        function initDraggableWindow(windowElement) {
            const header = windowElement.querySelector('.window-header');
            if (!header) return;
            let isDragging = false, startX, startY, initialLeft, initialTop;
            header.addEventListener('mousedown', (e) => {
                if (e.target.closest('button')) return;
                isDragging = true;
                startX = e.clientX; startY = e.clientY;
                initialLeft = windowElement.offsetLeft; initialTop = windowElement.offsetTop;
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
            function onMouseMove(e) {
                if (!isDragging) return;
                windowElement.style.left = (initialLeft + e.clientX - startX) + 'px';
                windowElement.style.top = (initialTop + e.clientY - startY) + 'px';
            }
            function onMouseUp() { isDragging = false; document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
        }
        function createWindow(title, contentHtml, options = {}) {
            const { width = '500px' } = options;
            const win = document.createElement('div');
            win.className = 'draggable-window';
            win.style.width = width;
            win.style.left = '50%'; win.style.top = '50%'; win.style.transform = 'translate(-50%, -50%)';
            win.innerHTML = `<div class="window-header"><div class="mac-traffic"><span class="mac-dot red" data-close="1"></span><span class="mac-dot yellow"></span><span class="mac-dot green"></span></div><div class="mac-title" style="font-size:12px;text-align:center;">${title}</div></div><div class="window-body">${contentHtml}</div>`;
            document.body.appendChild(win);
            initDraggableWindow(win);
            win.querySelector('[data-close="1"]')?.addEventListener('click', () => win.remove());
            return win;
        }
        function showConfirm(title, message, onConfirm) {
            const html = `<div style="margin-bottom:15px;">${message}</div><div style="display:flex;justify-content:flex-end;gap:10px;"><button class="btn-secondary" id="mc">取消</button><button class="btn-primary" id="mk">确认</button></div>`;
            const win = createWindow(title, html);
            win.querySelector('#mk').addEventListener('click', () => { win.remove(); if(onConfirm) onConfirm(); });
            win.querySelector('#mc').addEventListener('click', () => win.remove());
        }
        function showAlert(type, message) {
            const colors = {success:'text-green-400',error:'text-red-400',info:'text-blue-400',warning:'text-yellow-400'};
            const icons = {success:'fa-check-circle',error:'fa-circle-xmark',info:'fa-circle-info',warning:'fa-triangle-exclamation'};
            const html = `<div class="flex items-center gap-3 py-2"><i class="fa-solid ${icons[type]} ${colors[type]} text-xl"></i><span class="text-white">${message}</span></div><div class="flex justify-end mt-2"><button class="btn-primary text-xs" id="alert-ok">确定</button></div>`;
            const win = createWindow('提示', html, {width:'300px'});
            win.querySelector('#alert-ok').addEventListener('click', () => win.remove());
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Charts
            const takeoverChart = echarts.init(document.getElementById('chart-takeover'));
            takeoverChart.setOption({
                color: ['#0a84ff'],
                grid: { top: 10, right: 10, bottom: 20, left: 30 },
                xAxis: { type: 'category', data: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'], axisLine: { lineStyle: { color: '#555' } }, axisLabel: { color: '#888' } },
                yAxis: { type: 'value', splitLine: { lineStyle: { color: '#333' } }, axisLabel: { color: '#888' } },
                series: [{ data: [0.01, 0.03, 0.02, 0.01, 0.04, 0.02, 0.01], type: 'line', smooth: true, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: 'rgba(10,132,255,0.3)'}, {offset: 1, color: 'rgba(10,132,255,0)'}] )} }]
            });

            const pieChart = echarts.init(document.getElementById('chart-pie'));
            pieChart.setOption({
                color: ['#30d158', '#ff9f0a', '#bf5af2', '#64d2ff'],
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: [
                        { value: 1048, name: '正常行驶' },
                        { value: 735, name: '行人横穿' },
                        { value: 580, name: '车辆切出' },
                        { value: 484, name: '施工占道' }
                    ],
                    label: { color: '#fff' }
                }]
            });

            // Export Button
            document.getElementById('btn-export').addEventListener('click', () => {
                showConfirm('导出报告', '确定要导出当前数据分析报告吗？', () => {
                    showAlert('success', '报告已生成并开始下载');
                });
            });

            // Table buttons (example)
            document.querySelectorAll('tbody button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const row = e.target.closest('tr');
                    const type = row.cells[1].innerText;
                    const time = row.cells[0].innerText;
                    const content = `
                        <div class="space-y-3">
                            <div><span class="text-gray-500 text-xs">场景:</span> <span class="text-white ml-2">${type}</span></div>
                            <div><span class="text-gray-500 text-xs">时间:</span> <span class="text-white ml-2">${time}</span></div>
                            <div><span class="text-gray-500 text-xs">详细日志:</span></div>
                            <div class="bg-black/30 p-2 rounded text-xs font-mono text-gray-400 h-24 overflow-auto">
                                [14:30:01] 感知模块: 检测到障碍物<br>
                                [14:30:02] 决策模块: 规划绕行路径<br>
                                [14:30:03] 控制模块: 执行变道<br>
                                [14:30:05] 校验模块: 安全距离 2.5m > 阈值 1.5m - PASS
                            </div>
                        </div>
                    `;
                    createWindow('校验详情', content, { width: '400px' });
                });
            });
        });
    </script>
</body>
