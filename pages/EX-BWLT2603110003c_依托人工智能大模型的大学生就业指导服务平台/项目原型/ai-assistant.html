<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AI助手 - 依托人工智能大模型的大学生就业指导服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans SC', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #f0f2f5; overscroll-behavior: none; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .android-status-bar { height: env(safe-area-inset-top, 0px); min-height: 24px; background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0)); }
        .android-container { width: 100%; max-width: 480px; height: 100vh; max-height: 926px; margin: 0 auto; background: #f0f2f5; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .nav-active { color: #1976d2; }
        .ripple { position: relative; overflow: hidden; }
        .ripple::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; background-image: radial-gradient(circle, rgba(25, 118, 210, 0.15) 10%, transparent 10%); background-repeat: no-repeat; background-position: 50% 50%; transform: scale(0); opacity: 0; transition: transform 0.4s ease-out, opacity 0.4s ease-out; }
        .ripple:active::after { transform: scale(2); opacity: 1; transition: 0s; }
        .btn-touch { transition: all 0.1s ease-out; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .tab-ripple::after { background-image: radial-gradient(circle, rgba(25, 118, 210, 0.2) 10%, transparent 10%); }
        .chat-bubble { max-width: 80%; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .android-nav-bar { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
</head>
<body>
    <div class="android-status-bar"></div>
    <div class="android-container flex flex-col">
        <div class="flex-shrink-0 px-4 pt-2 pb-3 bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-700 shadow-lg">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                    <span class="iconify text-white text-xl" data-icon="material-symbols:smart-toy"></span>
                </div>
                <div>
                    <h1 class="text-white text-[15px] font-bold">AI就业助手</h1>
                    <p class="text-blue-100 text-[10px]">在线 · 为你服务中</p>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto hide-scrollbar overscroll-contain px-4 py-4 pb-2">
            <div class="flex items-start gap-2 mb-4">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center flex-shrink-0">
                    <span class="iconify text-white text-lg" data-icon="material-symbols:smart-toy"></span>
                </div>
                <div class="chat-bubble bg-white rounded-2xl rounded-tl-sm px-3 py-2 shadow-sm border border-gray-100">
                    <p class="text-[13px] text-gray-700 leading-relaxed">你好！我是AI就业指导助手。可以帮你优化简历、模拟面试、规划职业路径。有什么可以帮到你的吗？</p>
                </div>
            </div>

            <div class="flex items-start gap-2 mb-4">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center flex-shrink-0">
                    <span class="iconify text-white text-lg" data-icon="material-symbols:smart-toy"></span>
                </div>
                <div class="chat-bubble bg-white rounded-2xl rounded-tl-sm px-3 py-2 shadow-sm border border-gray-100">
                    <p class="text-[13px] text-gray-700 mb-2">你可以尝试这些功能：</p>
                    <div class="flex flex-wrap gap-2">
                        <a href="resume-optimize.html" class="btn-touch inline-flex items-center gap-1 bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-[12px] font-medium">
                            <span class="iconify text-sm" data-icon="material-symbols:description-outline"></span>
                            简历优化
                        </a>
                        <a href="interview.html" class="btn-touch inline-flex items-center gap-1 bg-orange-50 text-orange-600 px-3 py-1.5 rounded-lg text-[12px] font-medium">
                            <span class="iconify text-sm" data-icon="material-symbols:record-voice-over-outline"></span>
                            模拟面试
                        </a>
                        <a href="career.html" class="btn-touch inline-flex items-center gap-1 bg-purple-50 text-purple-600 px-3 py-1.5 rounded-lg text-[12px] font-medium">
                            <span class="iconify text-sm" data-icon="material-symbols:explore-outline"></span>
                            职业规划
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-shrink-0 bg-white border-t border-gray-200 px-4 py-3" style="padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));">
            <div class="flex items-end gap-2 max-w-[480px] mx-auto">
                <div class="flex-1 bg-gray-100 rounded-2xl px-4 py-2.5 flex items-center">
                    <textarea id="chatInput" class="flex-1 bg-transparent text-[14px] text-gray-700 outline-none resize-none max-h-28 min-h-[24px]" placeholder="输入你的求职问题..." rows="1" oninput="autoResize(this)"></textarea>
                </div>
                <button onclick="sendMessage()" class="w-11 h-11 rounded-full bg-blue-600 flex items-center justify-center btn-touch flex-shrink-0">
                    <span class="iconify text-white text-xl" data-icon="material-symbols:send-rounded"></span>
                </button>
            </div>
        </div>

        <div class="android-nav-bar absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-200/50 px-2 flex justify-around items-center z-20">
            <a href="./home.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:home-rounded"></span>
                <span class="text-[10px] mt-0.5 font-medium">首页</span>
            </a>
            <a href="./jobs.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:work-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">职位</span>
            </a>
            <div class="relative -mt-6">
                <div class="w-14 h-14 bg-gradient-to-tr from-blue-500 via-blue-600 to-indigo-600 rounded-2xl shadow-lg flex items-center justify-center border-[3px] border-white nav-active">
                    <span class="iconify text-white text-3xl" data-icon="material-symbols:smart-toy"></span>
                </div>
            </div>
            <a href="./messages.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400 relative">
                <span class="iconify text-2xl" data-icon="material-symbols:chat-bubble-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">消息</span>
                <span class="absolute top-1 right-3 w-2 h-2 bg-red-500 rounded-full"></span>
            </a>
            <a href="./mine.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:person-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">我的</span>
            </a>
        </div>
    </div>

    <script>
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 112) + 'px';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const container = document.querySelector('.flex-1.overflow-y-auto');

            const userBubble = document.createElement('div');
            userBubble.className = 'flex items-start gap-2 mb-4 justify-end';
            userBubble.innerHTML = `
                <div class="chat-bubble bg-blue-600 rounded-2xl rounded-tr-sm px-3 py-2 shadow-sm">
                    <p class="text-[13px] text-white leading-relaxed">${message}</p>
                </div>
                <div class="w-9 h-9 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0">
                    <span class="iconify text-gray-500 text-lg" data-icon="material-symbols:person-outline"></span>
                </div>
            `;
            container.appendChild(userBubble);

            input.value = '';
            input.style.height = 'auto';
            container.scrollTop = container.scrollHeight;

            setTimeout(() => {
                const aiBubble = document.createElement('div');
                aiBubble.className = 'flex items-start gap-2 mb-4';
                aiBubble.innerHTML = `
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center flex-shrink-0">
                        <span class="iconify text-white text-lg" data-icon="material-symbols:smart-toy"></span>
                    </div>
                    <div class="chat-bubble bg-white rounded-2xl rounded-tl-sm px-3 py-2 shadow-sm border border-gray-100">
                        <p class="text-[13px] text-gray-700 leading-relaxed">感谢你的提问！让我来分析一下...</p>
                    </div>
                `;
                container.appendChild(aiBubble);
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }

        document.getElementById('chatInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
