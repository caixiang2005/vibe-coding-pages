<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AI模拟面试 - 依托人工智能大模型的大学生就业指导服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #f0f2f5; overscroll-behavior: none; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .android-status-bar { height: env(safe-area-inset-top, 0px); min-height: 24px; background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0)); }
        .android-container { width: 100%; max-width: 480px; height: 100vh; max-height: 926px; margin: 0 auto; background: #f0f2f5; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .ripple { position: relative; overflow: hidden; }
        .ripple::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; background-image: radial-gradient(circle, rgba(25, 118, 210, 0.15) 10%, transparent 10%); background-repeat: no-repeat; background-position: 50% 50%; transform: scale(0); opacity: 0; transition: transform 0.4s ease-out, opacity 0.4s ease-out; }
        .ripple:active::after { transform: scale(2); opacity: 1; transition: 0s; }
        .card-touch { transition: all 0.15s ease-out; }
        .card-touch:active { transform: scale(0.98); background-color: #fff7ed; }
        .btn-touch { transition: all 0.1s ease-out; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .tab-ripple::after { background-image: radial-gradient(circle, rgba(25, 118, 210, 0.2) 10%, transparent 10%); }
        .record-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0); z-index: 100; pointer-events: none; transition: background 0.2s ease; }
        .modal-overlay.active { background: rgba(0,0,0,0.5); pointer-events: auto; }
        .draggable-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 101; cursor: move; touch-action: none; }
        .android-nav-bar { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
</head>
<body>
    <div class="android-status-bar"></div>
    <div class="android-container flex flex-col">
        <div class="flex-shrink-0 px-4 pt-2 pb-3 bg-gradient-to-br from-orange-500 via-orange-600 to-red-600 shadow-lg">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <button onclick="window.history.back()" class="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center btn-touch">
                        <span class="iconify text-white text-lg" data-icon="material-symbols:arrow-back-rounded"></span>
                    </button>
                    <h1 class="text-white text-base font-bold leading-relaxed">AI模拟面试</h1>
                </div>
            </div>
            <p class="text-orange-100 text-xs mt-1 pl-11">AI结构化提问，提升面试技巧</p>
        </div>

        <div class="flex-1 overflow-y-auto hide-scrollbar overscroll-contain pb-16 px-4 pt-4">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-4">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 bg-orange-50 rounded-lg flex items-center justify-center">
                        <span class="iconify text-orange-600 text-xl" data-icon="material-symbols:record-voice-over-outline"></span>
                    </div>
                    <div>
                        <h3 class="text-[14px] font-bold text-gray-800">模拟面试助手</h3>
                        <p class="text-[11px] text-gray-500">选择岗位，开始练习</p>
                    </div>
                </div>
                <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
                    <button class="job-tag px-3 py-1.5 bg-orange-100 text-orange-700 rounded-full text-[11px] font-medium whitespace-nowrap btn-touch" onclick="selectJob(this)">后端开发</button>
                    <button class="job-tag px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-[11px] font-medium whitespace-nowrap btn-touch" onclick="selectJob(this)">前端开发</button>
                    <button class="job-tag px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-[11px] font-medium whitespace-nowrap btn-touch" onclick="selectJob(this)">算法工程师</button>
                    <button class="job-tag px-3 py-1.5 bg-gray-100 text-gray-600 rounded-full text-[11px] font-medium whitespace-nowrap btn-touch" onclick="selectJob(this)">产品经理</button>
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-[14px] font-bold text-gray-800 mb-3 flex items-center">
                    <span class="w-1 h-4 bg-orange-500 rounded-full mr-2"></span>
                    面试题库
                </h3>
                <div class="space-y-3">
                    <div class="card-touch bg-white rounded-2xl p-3.5 shadow-sm border border-gray-100 cursor-pointer" onclick="startInterview('技术面基础', '考察Java/Go基础语法、面向对象概念')">
                        <div class="flex items-start gap-3">
                            <div class="w-9 h-9 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                                <span class="iconify text-blue-600 text-lg" data-icon="material-symbols:quiz-outline"></span>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <span class="text-[13px] font-bold text-gray-800">技术面基础</span>
                                    <span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[10px]">入门</span>
                                </div>
                                <p class="text-[11px] text-gray-500 mt-1">Java/Go基础语法、面向对象概念</p>
                                <p class="text-[10px] text-gray-400 mt-1">约8题 · 预计15分钟</p>
                            </div>
                        </div>
                    </div>

                    <div class="card-touch bg-white rounded-2xl p-3.5 shadow-sm border border-gray-100 cursor-pointer" onclick="startInterview('系统设计', '考察分布式系统设计、架构思维')">
                        <div class="flex items-start gap-3">
                            <div class="w-9 h-9 bg-orange-50 rounded-lg flex items-center justify-center flex-shrink-0">
                                <span class="iconify text-orange-600 text-lg" data-icon="material-symbols:architecture-rounded"></span>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <span class="text-[13px] font-bold text-gray-800">系统设计</span>
                                    <span class="bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded text-[10px]">进阶</span>
                                </div>
                                <p class="text-[11px] text-gray-500 mt-1">分布式系统设计、架构思维</p>
                                <p class="text-[10px] text-gray-400 mt-1">约5题 · 预计20分钟</p>
                            </div>
                        </div>
                    </div>

                    <div class="card-touch bg-white rounded-2xl p-3.5 shadow-sm border border-gray-100 cursor-pointer" onclick="startInterview('行为面试', '考察沟通能力、团队协作、问题解决')">
                        <div class="flex items-start gap-3">
                            <div class="w-9 h-9 bg-purple-50 rounded-lg flex items-center justify-center flex-shrink-0">
                                <span class="iconify text-purple-600 text-lg" data-icon="material-symbols:psychology-outline"></span>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <span class="text-[13px] font-bold text-gray-800">行为面试</span>
                                    <span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[10px]">入门</span>
                                </div>
                                <p class="text-[11px] text-gray-500 mt-1">沟通能力、团队协作、问题解决</p>
                                <p class="text-[10px] text-gray-400 mt-1">约6题 · 预计10分钟</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-[14px] font-bold text-gray-800 mb-3 flex items-center">
                    <span class="w-1 h-4 bg-green-500 rounded-full mr-2"></span>
                    最近练习
                </h3>
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <span class="iconify text-green-600" data-icon="material-symbols:check-circle-outline"></span>
                            <span class="text-[13px] font-semibold text-gray-800">后端开发 · 技术面基础</span>
                        </div>
                        <span class="text-[10px] text-gray-400">昨天</span>
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1 bg-gray-50 rounded-xl p-2.5 text-center">
                            <p class="text-[16px] font-bold text-green-600">85</p>
                            <p class="text-[10px] text-gray-500">综合得分</p>
                        </div>
                        <div class="flex-1 bg-gray-50 rounded-xl p-2.5 text-center">
                            <p class="text-[16px] font-bold text-blue-600">6/8</p>
                            <p class="text-[10px] text-gray-500">答题正确</p>
                        </div>
                        <div class="flex-1 bg-gray-50 rounded-xl p-2.5 text-center">
                            <p class="text-[16px] font-bold text-orange-600">12'</p>
                            <p class="text-[10px] text-gray-500">用时</p>
                        </div>
                    </div>
                    <a href="#" class="mt-3 flex items-center justify-center gap-1 text-[12px] text-blue-600 font-medium btn-touch">
                        <span>查看详情</span>
                        <span class="iconify text-sm" data-icon="material-symbols:chevron-right-rounded"></span>
                    </a>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="interviewOverlay" onclick="closeInterviewModal()"></div>
        <div class="draggable-modal bg-white rounded-2xl shadow-2xl w-[90%] max-w-sm" id="interviewModal" style="display:none;">
            <div class="p-4 border-b border-gray-100">
                <div class="flex items-center justify-between">
                    <h3 class="text-base font-bold text-gray-800" id="interviewTitle">模拟面试</h3>
                    <button onclick="closeInterviewModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center btn-touch">
                        <span class="iconify text-gray-500" data-icon="material-symbols:close"></span>
                    </button>
                </div>
            </div>
            <div class="p-4" id="interviewContent">
                <div class="flex items-start gap-3 mb-4">
                    <div class="w-8 h-8 bg-orange-50 rounded-full flex items-center justify-center flex-shrink-0">
                        <span class="iconify text-orange-600 text-sm" data-icon="material-symbols:smart-toy-outline"></span>
                    </div>
                    <div class="flex-1 bg-gray-100 rounded-xl rounded-tl-sm p-3">
                        <p class="text-[13px] text-gray-700" id="questionText">请介绍一下你最近做的一个项目，以及你在其中的主要贡献？</p>
                    </div>
                </div>
                <div class="mb-4">
                    <p class="text-[11px] text-gray-400 mb-2">你的回答：</p>
                    <textarea class="w-full h-24 bg-gray-50 rounded-xl p-3 text-[13px] outline-none resize-none" placeholder="请输入你的回答..."></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-gray-100 flex gap-3">
                <button class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 text-[13px] font-medium btn-touch" onclick="skipQuestion()">跳过</button>
                <button class="flex-1 py-2.5 rounded-xl bg-orange-500 text-white text-[13px] font-medium btn-touch" onclick="submitAnswer()">提交回答</button>
            </div>
        </div>

        <div class="android-nav-bar absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-200/50 px-2 flex justify-around items-center z-20">
            <a href="./home.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:home-rounded"></span>
                <span class="text-[10px] mt-0.5 font-medium">首页</span>
            </a>
            <a href="./jobs.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:work-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">职位</span>
            </a>
            <div class="relative -mt-6">
                <a href="ai-assistant.html" class="w-14 h-14 bg-gradient-to-tr from-blue-500 via-blue-600 to-indigo-600 rounded-2xl shadow-lg flex items-center justify-center btn-touch border-[3px] border-white">
                    <span class="iconify text-white text-3xl" data-icon="material-symbols:smart-toy"></span>
                </a>
            </div>
            <a href="./messages.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400 relative">
                <span class="iconify text-2xl" data-icon="material-symbols:chat-bubble-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">消息</span>
                <span class="absolute top-1 right-3 w-2 h-2 bg-red-500 rounded-full"></span>
            </a>
            <a href="./mine.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:person-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">我的</span>
            </a>
        </div>
    </div>

    <script>
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;
        const interviewModal = document.getElementById('interviewModal');

        interviewModal.addEventListener('mousedown', startDrag);
        interviewModal.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            const rect = interviewModal.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;
            interviewModal.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            interviewModal.style.left = (clientX - dragOffsetX) + 'px';
            interviewModal.style.top = (clientY - dragOffsetY) + 'px';
            interviewModal.style.transform = 'none';
        }

        function endDrag() {
            isDragging = false;
            interviewModal.style.transition = '';
        }

        function selectJob(btn) {
            document.querySelectorAll('.job-tag').forEach(t => {
                t.classList.remove('bg-orange-100', 'text-orange-700');
                t.classList.add('bg-gray-100', 'text-gray-600');
            });
            btn.classList.remove('bg-gray-100', 'text-gray-600');
            btn.classList.add('bg-orange-100', 'text-orange-700');
        }

        function startInterview(title, desc) {
            document.getElementById('interviewTitle').textContent = title;
            document.getElementById('questionText').textContent = '请介绍一下你最近做的一个项目，以及你在其中的主要贡献？';
            document.getElementById('interviewOverlay').classList.add('active');
            interviewModal.style.display = 'block';
            interviewModal.style.left = '50%';
            interviewModal.style.top = '50%';
            interviewModal.style.transform = 'translate(-50%, -50%)';
        }

        function closeInterviewModal() {
            document.getElementById('interviewOverlay').classList.remove('active');
            interviewModal.style.display = 'none';
        }

        function submitAnswer() {
            alert('回答已提交！AI正在评分...');
            closeInterviewModal();
        }

        function skipQuestion() {
            alert('已跳过此题');
            closeInterviewModal();
        }
    </script>
</body>
</html>
