<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AI简历优化 - 依托人工智能大模型的大学生就业指导服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #f0f2f5; overscroll-behavior: none; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .android-status-bar { height: env(safe-area-inset-top, 0px); min-height: 24px; background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0)); }
        .android-container { width: 100%; max-width: 480px; height: 100vh; max-height: 926px; margin: 0 auto; background: #f0f2f5; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .ripple { position: relative; overflow: hidden; }
        .ripple::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; background-image: radial-gradient(circle, rgba(25, 118, 210, 0.15) 10%, transparent 10%); background-repeat: no-repeat; background-position: 50% 50%; transform: scale(0); opacity: 0; transition: transform 0.4s ease-out, opacity 0.4s ease-out; }
        .ripple:active::after { transform: scale(2); opacity: 1; transition: 0s; }
        .card-touch { transition: all 0.15s ease-out; }
        .card-touch:active { transform: scale(0.98); background-color: #fef3c7; }
        .btn-touch { transition: all 0.1s ease-out; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .tab-ripple::after { background-image: radial-gradient(circle, rgba(25, 118, 210, 0.2) 10%, transparent 10%); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0); z-index: 100; pointer-events: none; transition: background 0.2s ease; }
        .modal-overlay.active { background: rgba(0,0,0,0.5); pointer-events: auto; }
        .draggable-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 101; cursor: move; touch-action: none; }
        .android-nav-bar { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
</head>
<body>
    <div class="android-status-bar"></div>
    <div class="android-container flex flex-col">
        <div class="flex-shrink-0 px-4 pt-2 pb-3 bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-700 shadow-lg">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <button onclick="window.history.back()" class="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center btn-touch">
                        <span class="iconify text-white text-lg" data-icon="material-symbols:arrow-back-rounded"></span>
                    </button>
                    <h1 class="text-white text-base font-bold leading-relaxed">AI简历优化</h1>
                </div>
            </div>
            <p class="text-blue-100 text-xs mt-1 pl-11">AI智能优化简历，提升投递通过率</p>
        </div>

        <div class="flex-1 overflow-y-auto hide-scrollbar overscroll-contain pb-16 px-4 pt-4">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-4">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                        <span class="iconify text-blue-600 text-xl" data-icon="material-symbols:description-outline"></span>
                    </div>
                    <div>
                        <h3 class="text-[14px] font-bold text-gray-800">我的简历（V6）</h3>
                        <p class="text-[11px] text-gray-500">最近优化：2小时前</p>
                    </div>
                </div>
                <div class="flex items-center justify-between bg-gray-50 rounded-xl p-3">
                    <div class="flex items-center gap-2">
                        <span class="iconify text-green-600" data-icon="material-symbols:check-circle-outline"></span>
                        <span class="text-[12px] text-gray-700">AI匹配度</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[18px] font-bold text-green-600">92%</span>
                        <span class="text-[10px] text-green-600 bg-green-50 px-1.5 py-0.5 rounded">+15%</span>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-[14px] font-bold text-gray-800 mb-3 flex items-center">
                    <span class="w-1 h-4 bg-blue-600 rounded-full mr-2"></span>
                    优化建议
                </h3>
                <div class="space-y-2">
                    <div class="card-touch bg-white rounded-2xl p-3 shadow-sm border border-gray-100 cursor-pointer" data-title="项目经历" data-content="建议使用STAR法则描述项目经历，突出个人贡献和量化成果。例如：将「负责后台开发」改为「独立设计并实现用户认证系统，日均处理10万+请求」" onclick="openImproveModal(this)">
                        <div class="flex items-start gap-3">
                            <div class="w-8 h-8 bg-yellow-50 rounded-lg flex items-center justify-center flex-shrink-0">
                                <span class="iconify text-yellow-600 text-lg" data-icon="material-symbols:lightbulb-outline"></span>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <span class="text-[13px] font-semibold text-gray-800">项目经历</span>
                                    <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                                </div>
                                <p class="text-[11px] text-gray-500 mt-1">使用STAR法则，突出量化成果</p>
                            </div>
                        </div>
                    </div>

                    <div class="card-touch bg-white rounded-2xl p-3 shadow-sm border border-gray-100 cursor-pointer" data-title="技能标签" data-content="建议将技能按掌握程度分类：核心技能（精通）、扩展技能（熟悉）、基础技能（了解）。同时添加与目标岗位匹配的专业术语。" onclick="openImproveModal(this)">
                        <div class="flex items-start gap-3">
                            <div class="w-8 h-8 bg-purple-50 rounded-lg flex items-center justify-center flex-shrink-0">
                                <span class="iconify text-purple-600 text-lg" data-icon="material-symbols:school-outline"></span>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <span class="text-[13px] font-semibold text-gray-800">技能标签</span>
                                    <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                                </div>
                                <p class="text-[11px] text-gray-500 mt-1">按掌握程度分类，添加专业术语</p>
                            </div>
                        </div>
                    </div>

                    <div class="card-touch bg-white rounded-2xl p-3 shadow-sm border border-gray-100 cursor-pointer" data-title="自我评价" data-content="自我评价建议控制在3句话以内，突出你的核心优势和与岗位的匹配度。避免使用空洞的形容词。" onclick="openImproveModal(this)">
                        <div class="flex items-start gap-3">
                            <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                                <span class="iconify text-blue-600 text-lg" data-icon="material-symbols:person-outline"></span>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center justify-between">
                                    <span class="text-[13px] font-semibold text-gray-800">自我评价</span>
                                    <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                                </div>
                                <p class="text-[11px] text-gray-500 mt-1">简洁有力，突出核心优势</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-[14px] font-bold text-gray-800 mb-3 flex items-center">
                    <span class="w-1 h-4 bg-orange-500 rounded-full mr-2"></span>
                    关键词优化
                </h3>
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                    <p class="text-[12px] text-gray-600 mb-3">根据目标职位推荐的关键词：</p>
                    <div class="flex flex-wrap gap-2">
                        <span class="bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full text-[11px] font-medium">分布式系统</span>
                        <span class="bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full text-[11px] font-medium">微服务架构</span>
                        <span class="bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full text-[11px] font-medium">Redis</span>
                        <span class="bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full text-[11px] font-medium">MySQL</span>
                        <span class="bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full text-[11px] font-medium">消息队列</span>
                        <span class="bg-gray-100 text-gray-400 px-2.5 py-1 rounded-full text-[11px] line-through">PPT制作</span>
                        <span class="bg-gray-100 text-gray-400 px-2.5 py-1 rounded-full text-[11px] line-through">Word</span>
                    </div>
                </div>
            </div>

            <button onclick="openOptimizeModal()" class="btn-touch w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl text-[14px] font-bold shadow-lg">
                一键AI优化
            </button>
        </div>

        <div class="modal-overlay" id="improveOverlay" onclick="closeImproveModal()"></div>
        <div class="draggable-modal bg-white rounded-2xl shadow-2xl w-[90%] max-w-sm" id="improveModal" style="display:none;">
            <div class="p-4 border-b border-gray-100">
                <div class="flex items-center justify-between">
                    <h3 class="text-base font-bold text-gray-800" id="improveTitle">优化建议</h3>
                    <button onclick="closeImproveModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center btn-touch">
                        <span class="iconify text-gray-500" data-icon="material-symbols:close"></span>
                    </button>
                </div>
            </div>
            <div class="p-4">
                <p class="text-[13px] text-gray-600 leading-relaxed" id="improveContent"></p>
            </div>
            <div class="p-4 border-t border-gray-100">
                <button onclick="applyImprove()" class="btn-touch w-full py-2.5 rounded-xl bg-blue-600 text-white text-[13px] font-medium">应用建议</button>
            </div>
        </div>

        <div class="modal-overlay" id="optimizeOverlay" onclick="closeOptimizeModal()"></div>
        <div class="draggable-modal bg-white rounded-2xl shadow-2xl w-[90%] max-w-sm" id="optimizeModal" style="display:none;">
            <div class="p-4 border-b border-gray-100">
                <div class="flex items-center justify-between">
                    <h3 class="text-base font-bold text-gray-800">AI优化中</h3>
                    <button onclick="closeOptimizeModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center btn-touch">
                        <span class="iconify text-gray-500" data-icon="material-symbols:close"></span>
                    </button>
                </div>
            </div>
            <div class="p-6 flex flex-col items-center">
                <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                <p class="text-[13px] text-gray-600">正在分析简历内容...</p>
                <p class="text-[11px] text-gray-400 mt-1">预计需要10-15秒</p>
            </div>
        </div>

        <div class="android-nav-bar absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-200/50 px-2 flex justify-around items-center z-20">
            <a href="./home.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:home-rounded"></span>
                <span class="text-[10px] mt-0.5 font-medium">首页</span>
            </a>
            <a href="./jobs.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:work-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">职位</span>
            </a>
            <div class="relative -mt-6">
                <a href="ai-assistant.html" class="w-14 h-14 bg-gradient-to-tr from-blue-500 via-blue-600 to-indigo-600 rounded-2xl shadow-lg flex items-center justify-center btn-touch border-[3px] border-white">
                    <span class="iconify text-white text-3xl" data-icon="material-symbols:smart-toy"></span>
                </a>
            </div>
            <a href="./messages.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400 relative">
                <span class="iconify text-2xl" data-icon="material-symbols:chat-bubble-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">消息</span>
                <span class="absolute top-1 right-3 w-2 h-2 bg-red-500 rounded-full"></span>
            </a>
            <a href="./mine.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:person-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">我的</span>
            </a>
        </div>
    </div>

    <script>
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;
        const improveModal = document.getElementById('improveModal');
        const optimizeModal = document.getElementById('optimizeModal');

        [improveModal, optimizeModal].forEach(modal => {
            modal.addEventListener('mousedown', startDrag);
            modal.addEventListener('touchstart', startDrag, { passive: false });
        });
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            const modal = e.target.closest('.draggable-modal');
            if (!modal) return;
            const rect = modal.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;
            modal.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const modal = document.querySelector('.draggable-modal[style*="display: block"]') || document.querySelector('.draggable-modal');
            if (!modal) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            modal.style.left = (clientX - dragOffsetX) + 'px';
            modal.style.top = (clientY - dragOffsetY) + 'px';
            modal.style.transform = 'none';
        }

        function endDrag() {
            isDragging = false;
            document.querySelectorAll('.draggable-modal').forEach(m => m.style.transition = '');
        }

        function openImproveModal(el) {
            const title = el.getAttribute('data-title');
            const content = el.getAttribute('data-content');
            document.getElementById('improveTitle').textContent = title;
            document.getElementById('improveContent').textContent = content;
            document.getElementById('improveOverlay').classList.add('active');
            improveModal.style.display = 'block';
            improveModal.style.left = '50%';
            improveModal.style.top = '50%';
            improveModal.style.transform = 'translate(-50%, -50%)';
        }

        function closeImproveModal() {
            document.getElementById('improveOverlay').classList.remove('active');
            improveModal.style.display = 'none';
        }

        function applyImprove() {
            closeImproveModal();
            alert('建议已应用！');
        }

        function openOptimizeModal() {
            document.getElementById('optimizeOverlay').classList.add('active');
            optimizeModal.style.display = 'block';
            optimizeModal.style.left = '50%';
            optimizeModal.style.top = '50%';
            optimizeModal.style.transform = 'translate(-50%, -50%)';

            setTimeout(() => {
                closeOptimizeModal();
                alert('简历优化完成！匹配度已提升至95%');
            }, 3000);
        }

        function closeOptimizeModal() {
            document.getElementById('optimizeOverlay').classList.remove('active');
            optimizeModal.style.display = 'none';
        }
    </script>
</body>
</html>
