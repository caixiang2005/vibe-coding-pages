<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 新能源储能系统运行监控与能效分析系统</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0EA5E9; --primary-dark: #0284C7; --primary-light: #E0F2FE;
    --accent: #10B981; --accent-warm: #F59E0B; --danger: #EF4444; --warning: #F97316;
    --bg: #F0F6FF; --sidebar-bg: #0F2744; --card-bg: #FFFFFF;
    --text-primary: #0F2744; --text-secondary: #5A7A99; --text-light: #94A3B8;
    --border: #DCE8F5; --shadow-card: 0 2px 12px rgba(15,39,68,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: 
      radial-gradient(circle at 20% 80%, rgba(14,165,233,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(16,185,129,0.08) 0%, transparent 50%),
      linear-gradient(135deg, #F0F6FF 0%, #E8F4FF 100%);
  }

  .login-container {
    display: flex;
    width: 900px;
    max-width: 95vw;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(15,39,68,0.12);
    overflow: hidden;
    min-height: 520px;
  }

  .login-left {
    flex: 1;
    background: linear-gradient(135deg, #0F2744 0%, #1a4a80 50%, #0EA5E9 100%);
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .login-left::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: 
      radial-gradient(circle at 30% 70%, rgba(14,165,233,0.3) 0%, transparent 40%),
      radial-gradient(circle at 70% 30%, rgba(16,185,129,0.2) 0%, transparent 40%);
  }

  .login-left::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.5;
  }

  .login-left-content {
    position: relative;
    z-index: 1;
  }

  .school-logo {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    margin-bottom: 20px;
    object-fit: contain;
    background: rgba(255,255,255,0.1);
    padding: 10px;
  }

  .school-logo-placeholder {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }

  .school-logo-placeholder i {
    font-size: 32px;
    color: rgba(255,255,255,0.6);
  }

  .school-logo-placeholder span {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
  }

  .login-title {
    color: white;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .login-subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    line-height: 1.6;
  }

  .login-features {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .login-feature {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
  }

  .login-feature i {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .login-left-footer {
    position: relative;
    z-index: 1;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin-top: 20px;
  }

  .login-footer-text {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
  }

  .login-right {
    flex: 1;
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .login-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .login-header h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .login-header p {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--text-primary);
    background: var(--bg);
    transition: all 0.2s;
    outline: none;
  }

  .form-input:focus {
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 3px rgba(14,165,233,0.1);
  }

  .form-input::placeholder {
    color: var(--text-light);
  }

  .input-with-btn {
    display: flex;
    gap: 10px;
  }

  .input-with-btn .form-input {
    flex: 1;
  }

  .send-code-btn {
    padding: 12px 20px;
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    min-width: 110px;
  }

  .send-code-btn:hover:not(:disabled) {
    background: var(--primary);
    color: white;
  }

  .send-code-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #0EA5E9, #0284C7);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    box-shadow: 0 4px 12px rgba(14,165,233,0.3);
  }

  .login-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(14,165,233,0.4);
  }

  .login-btn:active {
    transform: translateY(0);
  }

  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-light);
  }

  .login-footer a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
  }

  .login-footer a:hover {
    text-decoration: underline;
  }

  .remember-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
  }

  .checkbox-label input {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--primary);
  }

  .forgot-link {
    font-size: 13px;
    color: var(--primary);
    text-decoration: none;
    cursor: pointer;
  }

  .forgot-link:hover {
    text-decoration: underline;
  }

  .login-tip {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: #EFF8FF;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .login-tip i {
    color: var(--primary);
    margin-top: 2px;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .shake {
    animation: shake 0.3s ease-in-out;
  }

  .form-input.error {
    border-color: var(--danger);
    animation: shake 0.3s ease-in-out;
  }

  @media (max-width: 768px) {
    .login-container {
      flex-direction: column;
      width: 100%;
      max-width: 100%;
      border-radius: 0;
      min-height: 100vh;
    }

    .login-left {
      padding: 30px;
      min-height: 200px;
    }

    .login-features {
      display: none;
    }

    .login-right {
      padding: 30px 24px;
    }
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-left">
    <div class="login-left-content">
      <!-- 学校Logo -->
      <img src="static/avatar.jpg" alt="学校Logo" class="school-logo">
      <div class="login-title">新能源储能系统运行监控与能效分析系统</div>
      <div class="login-subtitle">安全、高效、智能的储能系统管理平台</div>
      
      <div class="login-features">
        <div class="login-feature">
          <i class="fa-solid fa-chart-line"></i>
          <span>实时监控与数据分析</span>
        </div>
        <div class="login-feature">
          <i class="fa-solid fa-bolt"></i>
          <span>能效优化与峰谷套利</span>
        </div>
        <div class="login-feature">
          <i class="fa-solid fa-shield-halved"></i>
          <span>智能告警与安全管理</span>
        </div>
        <div class="login-feature">
          <i class="fa-solid fa-file-lines"></i>
          <span>可视化报表与导出</span>
        </div>
      </div>
    </div>
    
    <div class="login-left-footer">
      <div class="login-footer-text">华南农业大学 · 能源管理系统 v2.4</div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-header">
      <h2>欢迎登录</h2>
      <p>请使用手机号验证码登录系统</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">手机号码</label>
        <input type="tel" class="form-input" id="phone" placeholder="请输入11位手机号" maxlength="11">
      </div>

      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="input-with-btn">
          <input type="text" class="form-input" id="code" placeholder="请输入6位验证码" maxlength="6">
          <button type="button" class="send-code-btn" id="sendCodeBtn">发送验证码</button>
        </div>
      </div>

      <div class="login-tip">
        <i class="fa-solid fa-circle-info"></i>
        <span>为保障账号安全，首次登录需验证手机号。验证码有效期5分钟，每60秒可重新发送。</span>
      </div>

      <div class="remember-row">
        <label class="checkbox-label">
          <input type="checkbox" id="remember">
          <span>30天内免登录</span>
        </label>
        <a class="forgot-link">遇到问题？</a>
      </div>

      <button type="submit" class="login-btn">登 录</button>
    </form>

    <div class="login-footer">
      登录即表示同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
    </div>
  </div>
</div>

<script>
  const phoneInput = document.getElementById('phone');
  const codeInput = document.getElementById('code');
  const sendCodeBtn = document.getElementById('sendCodeBtn');
  const loginForm = document.getElementById('loginForm');

  let countdown = 0;
  let countdownTimer = null;

  // 验证手机号格式
  function validatePhone(phone) {
    return /^1[3-9]\d{9}$/.test(phone);
  }

  // 发送验证码
  sendCodeBtn.addEventListener('click', function() {
    const phone = phoneInput.value.trim();
    
    if (!phone) {
      phoneInput.classList.add('error');
      setTimeout(() => phoneInput.classList.remove('error'), 300);
      alert('请输入手机号码');
      return;
    }

    if (!validatePhone(phone)) {
      phoneInput.classList.add('error');
      setTimeout(() => phoneInput.classList.remove('error'), 300);
      alert('请输入正确的手机号码');
      return;
    }

    // 开始倒计时
    countdown = 60;
    sendCodeBtn.disabled = true;
    sendCodeBtn.textContent = `${countdown}s`;

    countdownTimer = setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        clearInterval(countdownTimer);
        sendCodeBtn.disabled = false;
        sendCodeBtn.textContent = '发送验证码';
      } else {
        sendCodeBtn.textContent = `${countdown}s`;
      }
    }, 1000);

    // 模拟发送验证码（实际应调用后端API）
    console.log('发送验证码到:', phone);
    alert(`验证码已发送至 ${phone.slice(0,3)}****${phone.slice(-4)}`);
  });

  // 表单提交
  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const phone = phoneInput.value.trim();
    const code = codeInput.value.trim();

    if (!phone) {
      phoneInput.classList.add('error');
      setTimeout(() => phoneInput.classList.remove('error'), 300);
      return;
    }

    if (!validatePhone(phone)) {
      phoneInput.classList.add('error');
      setTimeout(() => phoneInput.classList.remove('error'), 300);
      alert('请输入正确的手机号码');
      return;
    }

    if (!code || code.length !== 6) {
      codeInput.classList.add('error');
      setTimeout(() => codeInput.classList.remove('error'), 300);
      alert('请输入6位验证码');
      return;
    }

    // 直接跳转到 index.html
    window.location.href = 'index.html';
  });

  // 输入时移除错误状态
  phoneInput.addEventListener('input', function() {
    this.classList.remove('error');
  });

  codeInput.addEventListener('input', function() {
    this.classList.remove('error');
  });

  // 手机号输入限制（只能输入数字）
  phoneInput.addEventListener('keypress', function(e) {
    if (!/\d/.test(e.key)) {
      e.preventDefault();
    }
  });

  // 验证码输入限制（只能输入数字）
  codeInput.addEventListener('keypress', function(e) {
    if (!/\d/.test(e.key)) {
      e.preventDefault();
    }
  });
</script>

</body>
</html>
