    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-image: url('./static/bg.jpeg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
        }

        .macos-blur {
            backdrop-filter: blur(20px);
            background-color: rgba(255, 255, 255, 0.7);
        }

        .sidebar-item-active {
            background-color: rgba(0, 0, 0, 0.05);
            color: #007AFF;
            font-weight: 500;
        }

        .window-shadow {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d1d1;
            border-radius: 10px;
        }

        /* Flow Chart Styles */
        .flow-grid {
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .flow-node {
            position: absolute;
            background: white;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: move;
        }

        .flow-node-diamond {
            width: 100px;
            height: 100px;
            transform: rotate(45deg);
            border-color: #f59e0b;
        }
        
        .flow-node-diamond span {
            transform: rotate(-45deg);
        }
        
        .flow-node-start {
            border-radius: 9999px;
            border-color: #10b981;
            background-color: #ecfdf5;
        }
    </style>
</head>

                let lf = null;

                const lfTitleInput = document.getElementById('lf-title');

                const lfStatusSelect = document.getElementById('lf-status');
                const lfConditionInput = document.getElementById('lf-condition');
                const lfDescTextarea = document.getElementById('lf-desc');
                const lfSelectedType = document.getElementById('lf-selected-type');

                lfTitleInput.addEventListener('input', applySelectedEdits);
                lfOwnerInput.addEventListener('input', applySelectedEdits);
                lfStatusSelect.addEventListener('change', applySelectedEdits);
                lfConditionInput.addEventListener('input', applySelectedEdits);

                function renderList() {
                    const grid = document.getElementById('flow-grid');
                    grid.innerHTML = '';
                    
                    Object.keys(flowData).forEach(id => {

                            <div class="flex items-center justify-between">
                                <span class="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded">业务流程</span>
                                <span class="text-xs text-gray-400">点击编辑</span>
                            </div>

                        grid.appendChild(card);

                }

                function openFlow(id) {
                    currentId = id;
                    document.getElementById('list-view').classList.add('hidden');
                    document.getElementById('editor-view').classList.remove('hidden');
                    
                    if (lf === null) {
                         lf = new LogicFlow({
                            container: document.querySelector('#logicflow_container'),
                            grid: true,
                        });
                        bindFlowEditorUI();
                    }

                    const item = flowData[id];
                    document.getElementById('flow-title-input').value = item.name;

                    if (item.graphData) {
                        lf.render(item.graphData);
                    } else {
                        lf.render();
                    }

                    clearFlowSelection();
                }

                function saveFlow() {
                    if (!currentId || !lf) return;
                    
                    const graphData = lf.getGraphData();
                    const name = document.getElementById('flow-title-input').value;
                    
                    flowData[currentId].graphData = graphData;
                    flowData[currentId].name = name;
                    flowData[currentId].updated = '刚刚';
                    
                    alert('保存成功！');
                }

                function closeFlow() {
                    document.getElementById('editor-view').classList.add('hidden');
                    document.getElementById('list-view').classList.remove('hidden');
                    renderList();
                }
                
                function createNewFlow() {
                    const id = 'flow-' + Date.now();
                    flowData[id] = {
                        name: '新建业务流程',
                        author: '当前用户',
                        updated: '刚刚',
                        graphData: { nodes: [], edges: [] }
                    };
                    openFlow(id);
                }

                function zoomIn() {
                    if (lf) lf.zoom(true);
                }

                function zoomOut() {
                    if (lf) lf.zoom(false);
                }

                function bindFlowEditorUI() {
                    if (flowUiBound || !lf) return;
                    flowUiBound = true;

                    lf.on('element:click', ({ data }) => {
                        if (!data || !data.id) return;
                        const kind = data.sourceNodeId && data.targetNodeId ? 'edge' : 'node';
                        showFlowProperties({ id: data.id, kind }, data);
                    });

                    lf.on('blank:click', () => {
                        clearFlowSelection();
                    });

                    setupFlowDragAndDrop();
                }

                function setupFlowDragAndDrop() {
                    const draggables = document.querySelectorAll('.lf-draggable');
                    const dropzone = document.getElementById('lf-dropzone');

                    draggables.forEach(d => {
                        d.addEventListener('dragstart', (e) => {
                            e.dataTransfer.setData('nodeType', d.dataset.nodeType);
                            e.dataTransfer.setData('nodeText', d.dataset.nodeText);
                        });
                    });

                    dropzone.addEventListener('dragover', (e) => {
                        e.preventDefault();
                    });

                    dropzone.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if (!lf) return;

                        const nodeType = e.dataTransfer.getData('nodeType');
                        const nodeText = e.dataTransfer.getData('nodeText') || '新节点';
                        if (!nodeType) return;

                        const point = getFlowPointByClient(e.clientX, e.clientY);
                        const nodeId = `node_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
                        lf.addNode({
                            id: nodeId,
                            type: nodeType,
                            x: point.x,
                            y: point.y,
                            text: nodeText,
                            properties: {
                                owner: '',
                                status: '',
                                desc: ''
                            }
                        });
                    });
                }

                function getFlowPointByClient(clientX, clientY) {
                    const candidate = [
                        lf && typeof lf.getPointByClient === 'function' ? () => lf.getPointByClient({ x: clientX, y: clientY }) : null,
                        lf && lf.graphModel && typeof lf.graphModel.getPointByClient === 'function' ? () => lf.graphModel.getPointByClient({ x: clientX, y: clientY }) : null
                    ].filter(Boolean);

                    if (candidate.length) {
                        try {
                            const p = candidate[0]();
                            if (p && typeof p.x === 'number' && typeof p.y === 'number') return p;
                        } catch (e) {}
                    }

                    const rect = document.getElementById('lf-dropzone').getBoundingClientRect();
                    return { x: clientX - rect.left, y: clientY - rect.top };
                }

                function clearFlowSelection() {
                    selectedElement = null;
                    document.getElementById('lf-prop-empty').classList.remove('hidden');
                    document.getElementById('lf-prop-form').classList.add('hidden');
                }

                function showFlowProperties(sel, rawData) {
                    selectedElement = sel;

                    document.getElementById('lf-prop-empty').classList.add('hidden');
                    document.getElementById('lf-prop-form').classList.remove('hidden');

                    const isEdge = sel.kind === 'edge';
                    document.getElementById('lf-node-fields').classList.toggle('hidden', isEdge);
                    document.getElementById('lf-edge-fields').classList.toggle('hidden', !isEdge);

                    lfSelectedType.innerText = isEdge ? '连线' : '节点';

                    const textValue = rawData && rawData.text && typeof rawData.text === 'string'
                        ? rawData.text
                        : (rawData && rawData.text && rawData.text.value ? rawData.text.value : '');
                    lfTitleInput.value = textValue || '';

                    const props = (rawData && rawData.properties) ? rawData.properties : {};

                    lfOwnerInput.value = props.owner || '';
                    lfStatusSelect.value = props.status || '';
                    lfDescTextarea.value = props.desc || '';
                    lfConditionInput.value = props.condition || '';
                }

                function applySelectedEdits() {
                    if (!selectedElement || !lf) return;

                    const { id, kind } = selectedElement;
                    const title = lfTitleInput.value || '';

                    if (typeof lf.updateText === 'function') {
                        try { lf.updateText(id, title); } catch (e) {}
                    } else {
                        const model = kind === 'edge' && typeof lf.getEdgeModelById === 'function'
                            ? lf.getEdgeModelById(id)
                            : (typeof lf.getNodeModelById === 'function' ? lf.getNodeModelById(id) : null);

                        if (model && typeof model.updateText === 'function') {
                            try { model.updateText(title); } catch (e) {}
                        }
                    }

                    const nextProps = {
                        owner: lfOwnerInput.value || '',
                        status: lfStatusSelect.value || '',
                        desc: lfDescTextarea.value || ''
                    };

                    if (kind === 'edge') {
                        nextProps.condition = lfConditionInput.value || '';
                    }

                    if (typeof lf.setProperties === 'function') {
                        try { lf.setProperties(id, nextProps); } catch (e) {}
                    } else {
                        const model = kind === 'edge' && typeof lf.getEdgeModelById === 'function'
                            ? lf.getEdgeModelById(id)
                            : (typeof lf.getNodeModelById === 'function' ? lf.getNodeModelById(id) : null);
                        if (model && typeof model.setProperties === 'function') {
                            try { model.setProperties(nextProps); } catch (e) {}
                        }
                    }
                }

                function deleteSelectedElement() {
                    if (!selectedElement || !lf) return;
                    const { id, kind } = selectedElement;

                    if (kind === 'edge') {
                        if (typeof lf.deleteEdge === 'function') {
                            try { lf.deleteEdge(id); } catch (e) {}
                        } else if (typeof lf.deleteElement === 'function') {
                            try { lf.deleteElement(id); } catch (e) {}
                        }
                    } else {
                        if (typeof lf.deleteNode === 'function') {
                            try { lf.deleteNode(id); } catch (e) {}
                        } else if (typeof lf.deleteElement === 'function') {
                            try { lf.deleteElement(id); } catch (e) {}
                        }
                    }

                    clearFlowSelection();
                }

                // Initial render
                window.onload = renderList;
            </script>
        </div>
    </div>
</body>
