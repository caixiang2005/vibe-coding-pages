<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>课程详情 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--shadow-lg:0 8px 32px rgba(74,108,247,0.12);--radius:16px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch;padding-bottom:70px}
    .page::-webkit-scrollbar{display:none}
    .detail-cover{height:180px;position:relative;overflow:hidden}
    .detail-cover img{width:100%;height:100%;object-fit:cover}
    .detail-cover-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.7) 100%)}
    .detail-back{position:absolute;top:12px;left:12px;width:34px;height:34px;border-radius:10px;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;backdrop-filter:blur(8px)}
    .detail-back:active{transform:scale(0.9)}
    .detail-title{position:absolute;bottom:16px;left:16px;right:16px}
    .detail-title h1{color:#fff;font-size:18px;font-weight:700;margin-bottom:6px}
    .detail-title-meta{color:rgba(255,255,255,0.85);font-size:12px;display:flex;gap:12px}
    .detail-body{padding:16px}
    .info-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
    .info-row{display:flex;margin-bottom:12px}
    .info-row:last-child{margin:0}
    .info-label{font-size:13px;color:var(--text-light);width:70px;flex-shrink:0}
    .info-value{font-size:13px;color:var(--text);flex:1}
    .chapter-title{font-size:15px;font-weight:700;color:var(--text);margin:16px 0 10px;display:flex;align-items:center;gap:6px}
    .chapter-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s}
    .chapter-item:active{transform:scale(0.98);background:#F8FAFF}
    .chapter-num{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
    .chapter-num.done{background:var(--accent-green);color:#fff}
    .chapter-num.current{background:var(--primary);color:#fff}
    .chapter-num.lock{background:var(--border);color:var(--text-light)}
    .chapter-info{flex:1}
    .chapter-name{font-size:14px;color:var(--text);font-weight:500}
    .chapter-duration{font-size:11px;color:var(--text-light);margin-top:2px}
    .chapter-icon{color:var(--text-light);font-size:16px}
    .video-placeholder{background:#0F172A;border-radius:var(--radius);height:200px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:16px}
    .video-placeholder img{width:100%;height:100%;object-fit:cover;opacity:0.6}
    .play-btn{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--primary);box-shadow:0 4px 20px rgba(0,0,0,0.3);cursor:pointer}
    .play-btn:active{transform:scale(0.9)}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="detail-cover">
        <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=600&h=300&fit=crop" alt="">
        <div class="detail-cover-overlay"></div>
        <div class="detail-back" onclick="location.href='course_list.html'"><i class="ri-arrow-left-s-line"></i></div>
        <div class="detail-title">
          <h1>基础模块·集合与函数</h1>
          <div class="detail-title-meta">
            <span><i class="ri-play-circle-line"></i> 12/18课时</span>
            <span><i class="ri-user-line"></i> 286人学习</span>
            <span><i class="ri-star-line"></i> 4.8分</span>
          </div>
        </div>
      </div>
      <div class="detail-body">
        <div class="video-placeholder" onclick="showToast('视频播放功能开发中')">
          <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=400&h=200&fit=crop" alt="">
          <div class="play-btn"><i class="ri-play-fill"></i></div>
        </div>
        <div class="info-card">
          <div class="info-row">
            <div class="info-label">课程简介</div>
            <div class="info-value">本课程涵盖集合的概念、表示方法、基本运算，以及函数的概念、表示方法和性质等内容。</div>
          </div>
          <div class="info-row">
            <div class="info-label">课程教师</div>
            <div class="info-value">王明华·数学高级教师</div>
          </div>
          <div class="info-row">
            <div class="info-label">更新时间</div>
            <div class="info-value">2024-03-15</div>
          </div>
        </div>
        <div class="chapter-title"><i class="ri-list-check-2"></i> 课程章节</div>
        <div class="chapter-item" onclick="showToast('正在播放：第一章')">
          <div class="chapter-num current"><i class="ri-play-fill"></i></div>
          <div class="chapter-info">
            <div class="chapter-name">1. 集合的概念与表示</div>
            <div class="chapter-duration">25分钟 · 正在学习</div>
          </div>
          <div class="chapter-icon"><i class="ri-play-circle-fill" style="color:var(--primary)"></i></div>
        </div>
        <div class="chapter-item" onclick="showToast('正在播放：第二章')">
          <div class="chapter-num done"><i class="ri-check-line"></i></div>
          <div class="chapter-info">
            <div class="chapter-name">2. 集合的基本运算</div>
            <div class="chapter-duration">30分钟 · 已完成</div>
          </div>
          <div class="chapter-icon"><i class="ri-arrow-right-s-line"></i></div>
        </div>
        <div class="chapter-item" onclick="showToast('正在播放：第三章')">
          <div class="chapter-num done"><i class="ri-check-line"></i></div>
          <div class="chapter-info">
            <div class="chapter-name">3. 函数的概念与表示</div>
            <div class="chapter-duration">35分钟 · 已完成</div>
          </div>
          <div class="chapter-icon"><i class="ri-arrow-right-s-line"></i></div>
        </div>
        <div class="chapter-item" onclick="showToast('正在播放：第四章')">
          <div class="chapter-num lock"><i class="ri-lock-line"></i></div>
          <div class="chapter-info">
            <div class="chapter-name">4. 函数的性质</div>
            <div class="chapter-duration">40分钟 · 未开始</div>
          </div>
          <div class="chapter-icon"><i class="ri-lock-line"></i></div>
        </div>
        <div class="chapter-item" onclick="showToast('正在播放：第五章')">
          <div class="chapter-num lock"><i class="ri-lock-line"></i></div>
          <div class="chapter-info">
            <div class="chapter-name">5. 指数函数与对数函数</div>
            <div class="chapter-duration">45分钟 · 未开始</div>
          </div>
          <div class="chapter-icon"><i class="ri-lock-line"></i></div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script>
    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    }
  </script>
</body>
</html>
