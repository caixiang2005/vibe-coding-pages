<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>课程学习 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--shadow-lg:0 8px 32px rgba(74,108,247,0.12);--radius:16px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}
    .sub-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .sub-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
    .sub-back:active{transform:scale(0.9)}
    .sub-title{color:#fff;font-size:17px;font-weight:700;flex:1}
    .sub-body{padding:16px}
    .tabs{display:flex;gap:0;background:var(--card);padding:4px;border-radius:12px;margin-bottom:16px;box-shadow:var(--shadow)}
    .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--text-light);border-radius:10px;cursor:pointer;transition:all 0.3s}
    .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(74,108,247,0.3)}
    .course-card{background:var(--card);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s}
    .course-card:active{transform:scale(0.98)}
    .course-cover{height:110px;position:relative;overflow:hidden}
    .course-cover img{width:100%;height:100%;object-fit:cover}
    .course-cover-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.6))}
    .course-badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:600;color:#fff}
    .course-badge.orange{background:var(--accent-orange)}
    .course-badge.green{background:var(--accent-green)}
    .course-badge.blue{background:var(--primary)}
    .course-progress{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.3)}
    .course-progress-fill{height:100%;background:var(--accent-green)}
    .course-info{padding:12px 14px}
    .course-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
    .course-meta{display:flex;gap:12px;flex-wrap:wrap}
    .course-meta span{font-size:11px;color:var(--text-light);display:flex;align-items:center;gap:3px}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="sub-header">
        <div class="sub-back" onclick="goBack()"><i class="ri-arrow-left-s-line"></i></div>
        <div class="sub-title">课程学习</div>
      </div>
      <div class="sub-body">
        <div class="tabs">
          <div class="tab active" onclick="switchTab(this)">全部</div>
          <div class="tab" onclick="switchTab(this)">进行中</div>
          <div class="tab" onclick="switchTab(this)">已完结</div>
        </div>
        <div class="course-card" onclick="location.href='course_detail.html'">
          <div class="course-cover">
            <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=400&h=200&fit=crop" alt="">
            <div class="course-cover-overlay"></div>
            <div class="course-badge orange">进行中</div>
            <div class="course-progress"><div class="course-progress-fill" style="width:65%"></div></div>
          </div>
          <div class="course-info">
            <div class="course-title">基础模块·集合与函数</div>
            <div class="course-meta">
              <span><i class="ri-play-circle-line"></i> 12/18 课时</span>
              <span><i class="ri-time-line"></i> 6 小时</span>
              <span><i class="ri-fire-line"></i> 286 人学习</span>
            </div>
          </div>
        </div>
        <div class="course-card" onclick="showToast('正在加载课程...')">
          <div class="course-cover">
            <img src="https://images.unsplash.com/photo-1596495577886-d920f1fb7238?w=400&h=200&fit=crop" alt="">
            <div class="course-cover-overlay"></div>
            <div class="course-badge blue">未开始</div>
          </div>
          <div class="course-info">
            <div class="course-title">基础模块·不等式</div>
            <div class="course-meta">
              <span><i class="ri-play-circle-line"></i> 0/21 课时</span>
              <span><i class="ri-time-line"></i> 8 小时</span>
              <span><i class="ri-fire-line"></i> 198 人学习</span>
            </div>
          </div>
        </div>
        <div class="course-card" onclick="showToast('正在加载课程...')">
          <div class="course-cover">
            <img src="https://images.unsplash.com/photo-1509228468518-180dd4864904?w=400&h=200&fit=crop" alt="">
            <div class="course-cover-overlay"></div>
            <div class="course-badge green">已完结</div>
          </div>
          <div class="course-info">
            <div class="course-title">基础模块·代数式与运算</div>
            <div class="course-meta">
              <span><i class="ri-play-circle-line"></i> 20/20 课时</span>
              <span><i class="ri-time-line"></i> 10 小时</span>
              <span><i class="ri-fire-line"></i> 452 人学习</span>
            </div>
          </div>
        </div>
        <div class="course-card" onclick="showToast('正在加载课程...')">
          <div class="course-cover">
            <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=400&h=200&fit=crop" alt="">
            <div class="course-cover-overlay"></div>
            <div class="course-badge orange">进行中</div>
            <div class="course-progress"><div class="course-progress-fill" style="width:30%"></div></div>
          </div>
          <div class="course-info">
            <div class="course-title">基础模块·数列</div>
            <div class="course-meta">
              <span><i class="ri-play-circle-line"></i> 7/23 课时</span>
              <span><i class="ri-time-line"></i> 9 小时</span>
              <span><i class="ri-fire-line"></i> 167 人学习</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script>
    function switchTab(el){
      el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      el.classList.add('active');
    }
    function goBack(){
      if(window.history.length>1){
        window.history.back();
      }else{
        location.href='home.html';
      }
    }
    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    }
  </script>
</body>
</html>
