<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>学习小组 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--radius:16px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}
    .sub-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .sub-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
    .sub-back:active{transform:scale(0.9)}
    .sub-title{color:#fff;font-size:17px;font-weight:700;flex:1}
    .sub-body{padding:16px}
    .group-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s}
    .group-card:active{transform:scale(0.98)}
    .group-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .group-name{font-size:15px;font-weight:700;color:var(--text)}
    .group-tag{background:#E8EDFF;color:var(--primary);font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}
    .group-members{display:flex;align-items:center;margin-bottom:10px}
    .group-avatar{width:28px;height:28px;border-radius:50%;border:2px solid #fff;margin-right:-8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
    .group-more{margin-left:8px;font-size:11px;color:var(--text-light)}
    .group-desc{font-size:12px;color:var(--text-light);line-height:1.5;margin-bottom:10px}
    .group-footer{display:flex;justify-content:space-between;align-items:center}
    .group-activity{font-size:11px;color:var(--text-light)}
    .group-join{font-size:12px;color:var(--primary);font-weight:600}
    .join-btn{background:var(--primary);color:#fff;padding:4px 12px;border-radius:6px;font-size:12px;border:none;cursor:pointer}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="sub-header">
        <div class="sub-back" onclick="goBack()"><i class="ri-arrow-left-s-line"></i></div>
        <div class="sub-title">学习小组</div>
      </div>
      <div class="sub-body">
        <div class="group-card">
          <div class="group-header">
            <div class="group-name">2024 高考数学冲刺群</div>
            <div class="group-tag">热门</div>
          </div>
          <div class="group-members">
            <div class="group-avatar" style="background:#FFD93D">张</div>
            <div class="group-avatar" style="background:#FF6B6B">李</div>
            <div class="group-avatar" style="background:#4A6CF7">王</div>
            <div class="group-avatar" style="background:#2ED573">陈</div>
            <div class="group-more">+156 人</div>
          </div>
          <div class="group-desc">专注高考数学复习，每日分享习题和学习资料，欢迎加入！</div>
          <div class="group-footer">
            <div class="group-activity"><i class="ri-time-line"></i> 10 分钟前活跃</div>
            <button class="join-btn" onclick="joinGroup(this)">加入</button>
          </div>
        </div>
        
        <div class="group-card">
          <div class="group-header">
            <div class="group-name">函数专题讨论组</div>
            <div class="group-tag">推荐</div>
          </div>
          <div class="group-members">
            <div class="group-avatar" style="background:#A66CFF">刘</div>
            <div class="group-avatar" style="background:#FF9F43">赵</div>
            <div class="group-avatar" style="background:#00B4D8">孙</div>
            <div class="group-more">+82 人</div>
          </div>
          <div class="group-desc">专门讨论函数相关知识点，包括一次函数、二次函数、指数函数、对数函数等。</div>
          <div class="group-footer">
            <div class="group-activity"><i class="ri-time-line"></i> 1 小时前活跃</div>
            <button class="join-btn" onclick="joinGroup(this)">加入</button>
          </div>
        </div>
        
        <div class="group-card">
          <div class="group-header">
            <div class="group-name">数列学习交流群</div>
            <div class="group-tag">活跃</div>
          </div>
          <div class="group-members">
            <div class="group-avatar" style="background:#FF6B6B">周</div>
            <div class="group-avatar" style="background:#2ED573">吴</div>
            <div class="group-avatar" style="background:#FFD93D">郑</div>
            <div class="group-more">+64 人</div>
          </div>
          <div class="group-desc">等差数列、等比数列学习讨论，分享解题技巧和学习方法。</div>
          <div class="group-footer">
            <div class="group-activity"><i class="ri-time-line"></i> 2 小时前活跃</div>
            <button class="join-btn" onclick="joinGroup(this)">加入</button>
          </div>
        </div>
        
        <div class="group-card">
          <div class="group-header">
            <div class="group-name">三角函数攻坚小组</div>
            <div class="group-tag">精品</div>
          </div>
          <div class="group-members">
            <div class="group-avatar" style="background:#4A6CF7">冯</div>
            <div class="group-avatar" style="background:#A66CFF">褚</div>
            <div class="group-avatar" style="background:#FF9F43">卫</div>
            <div class="group-more">+48 人</div>
          </div>
          <div class="group-desc">攻克三角函数难点，包括诱导公式、图像性质、解三角形等。</div>
          <div class="group-footer">
            <div class="group-activity"><i class="ri-time-line"></i> 昨天活跃</div>
            <button class="join-btn" onclick="joinGroup(this)">加入</button>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script>
    function joinGroup(btn){
      if(btn.textContent==='已加入'){
        btn.textContent='加入';
        btn.style.background='var(--primary)';
        showToast('已退出小组');
      }else{
        btn.textContent='已加入';
        btn.style.background='var(--accent-green)';
        showToast('加入成功！');
      }
    }
    
    function goBack(){
      if(window.history.length>1){
        window.history.back();
      }else{
        location.href='home.html';
      }
    }
    
    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    }
  </script>
</body>
</html>
