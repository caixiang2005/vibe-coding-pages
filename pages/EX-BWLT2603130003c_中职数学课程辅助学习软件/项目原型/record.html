<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>学习记录 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--radius:16px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}
    .sub-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .sub-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
    .sub-back:active{transform:scale(0.9)}
    .sub-title{color:#fff;font-size:17px;font-weight:700;flex:1}
    .sub-body{padding:16px}
    .tabs{display:flex;gap:0;background:var(--card);padding:4px;border-radius:12px;margin-bottom:16px;box-shadow:var(--shadow)}
    .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--text-light);border-radius:10px;cursor:pointer;transition:all 0.3s}
    .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(74,108,247,0.3)}
    .record-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
    .record-date{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
    .record-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
    .record-item:last-child{border:none}
    .record-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .record-info{flex:1}
    .record-title{font-size:13px;color:var(--text);font-weight:500}
    .record-time{font-size:11px;color:var(--text-light);margin-top:2px}
    .record-duration{font-size:12px;color:var(--primary);font-weight:600}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="sub-header">
        <div class="sub-back" onclick="goBack()"><i class="ri-arrow-left-s-line"></i></div>
        <div class="sub-title">学习记录</div>
      </div>
      <div class="sub-body">
        <div class="tabs">
          <div class="tab active" onclick="switchTab(this,'today')">今天</div>
          <div class="tab" onclick="switchTab(this,'week')">本周</div>
          <div class="tab" onclick="switchTab(this,'month')">本月</div>
        </div>
        
        <div class="record-card">
          <div class="record-date"><i class="ri-calendar-line"></i> 2024 年 3 月 22 日</div>
          <div class="record-item">
            <div class="record-icon" style="background:#E8EDFF;color:var(--primary)"><i class="ri-book-open-line"></i></div>
            <div class="record-info">
              <div class="record-title">集合的概念与表示</div>
              <div class="record-time">15:30 - 16:00</div>
            </div>
            <div class="record-duration">30 分钟</div>
          </div>
          <div class="record-item">
            <div class="record-icon" style="background:#FEF3C7;color:var(--accent-orange)"><i class="ri-file-list-3-line"></i></div>
            <div class="record-info">
              <div class="record-title">每日一练</div>
              <div class="record-time">14:00 - 14:25</div>
            </div>
            <div class="record-duration">25 分钟</div>
          </div>
          <div class="record-item">
            <div class="record-icon" style="background:#ECFDF5;color:var(--accent-green)"><i class="ri-checkbox-circle-line"></i></div>
            <div class="record-info">
              <div class="record-title">错题本复习</div>
              <div class="record-time">10:15 - 10:45</div>
            </div>
            <div class="record-duration">30 分钟</div>
          </div>
        </div>
        
        <div class="record-card">
          <div class="record-date"><i class="ri-calendar-line"></i> 2024 年 3 月 21 日</div>
          <div class="record-item">
            <div class="record-icon" style="background:#E8EDFF;color:var(--primary)"><i class="ri-book-open-line"></i></div>
            <div class="record-info">
              <div class="record-title">集合的基本运算</div>
              <div class="record-time">16:00 - 16:45</div>
            </div>
            <div class="record-duration">45 分钟</div>
          </div>
          <div class="record-item">
            <div class="record-icon" style="background:#F0F4FF;color:var(--accent-purple)"><i class="ri-functions"></i></div>
            <div class="record-info">
              <div class="record-title">公式手册学习</div>
              <div class="record-time">14:30 - 15:00</div>
            </div>
            <div class="record-duration">30 分钟</div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script>
    function switchTab(el,period){
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      el.classList.add('active');
      showToast('显示'+period+'记录');
    }
    
    function goBack(){
      if(window.history.length>1){
        window.history.back();
      }else{
        location.href='home.html';
      }
    }
    
    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    }
  </script>
</body>
</html>
