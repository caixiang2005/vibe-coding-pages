            { id: 11, title: '闸门安装调试', location: '排涝站 · 1号', status: 'doing', priority: 'high', progress: 75, person: '刘强', deadline: '03-19', doneTime: null },
            { id: 12, title: '边坡绿化种植', location: '河道一标段 · K1+500', status: 'pending', priority: 'low', progress: 5, person: '周玉玲', deadline: '04-10', doneTime: null },

        ];

        let currentFilter = 'all';
        let currentPage = 1;
        const pageSize = 8;

        function getFilteredTasks() {
            let tasks = [...allTasks];
            if (currentFilter !== 'all') {
                tasks = tasks.filter(t => t.status === currentFilter);
            }
            return tasks;
        }

        function renderTasks() {
            const filtered = getFilteredTasks();
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            let tasks = filtered.filter(t => t.title.toLowerCase().includes(searchValue) || t.location.toLowerCase().includes(searchValue));
            
            const totalTasks = tasks.length;
            const totalPages = Math.max(1, Math.ceil(totalTasks / pageSize));
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageTasks = tasks.slice(start, end);

            const taskList = document.getElementById('taskList');
            taskList.innerHTML = pageTasks.map(task => {
                const statusBadge = task.status === 'done' ? '<span class="px-2 py-1 rounded text-xs font-medium bg-green-100 text-green-700">已完成</span>' : task.status === 'pending' ? '<span class="px-2 py-1 rounded text-xs font-medium bg-gray-100 text-gray-600">待处理</span>' : '<span class="px-2 py-1 rounded text-xs font-medium bg-blue-100 text-blue-700">进行中</span>';
                const timeInfo = task.status === 'done' ? `<span><i class="fa-solid fa-check-circle mr-1"></i>${task.doneTime} 完成</span>` : `<span><i class="fa-solid fa-clock mr-1"></i>截止 ${task.deadline}</span>`;
                const checkbox = task.status === 'done' ? '<div class="w-5 h-5 rounded border-2 border-green-500 flex items-center justify-center"><i class="fa-solid fa-check text-xs text-green-500"></i></div>' : task.status === 'pending' ? '<div class="w-5 h-5 rounded border-2 border-gray-300 flex items-center justify-center"></div>' : '<div class="w-5 h-5 rounded border-2 border-blue-400 flex items-center justify-center"></div>';
                const titleClass = task.status === 'done' ? 'line-through text-gray-400' : 'text-gray-800';
                
                return `<div class="bg-white rounded-xl shadow-sm border border-black/5 p-4 task-card cursor-pointer" onclick="window.location.href='./task_detail.html'">
                    <div class="flex items-start justify-between">
                        <div class="flex items-start space-x-3">
                            <div onclick="event.stopPropagation()">${checkbox}</div>
                            <div>
                                <h3 class="font-medium ${titleClass}">${task.title}</h3>
                                <p class="text-xs text-gray-500 mt-1">${task.location}</p>
                            </div>
                        </div>
                        ${statusBadge}
                    </div>
                    <div class="mt-3 flex items-center justify-between">
                        <div class="flex items-center space-x-4 text-xs text-gray-500">
                            <span><i class="fa-solid fa-user mr-1"></i>${task.person}</span>
                            <span>${timeInfo}</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <div class="progress-bar w-24"><div class="progress" style="width: ${task.progress}%"></div></div>
                            <span class="text-xs text-gray-500">${task.progress}%</span>
                        </div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('pageInfo').textContent = `共 ${totalTasks} 条记录，第 ${currentPage} 页，共 ${totalPages} 页`;
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            let html = `<button class="px-3 py-1 text-xs rounded ${currentPage === 1 ? 'bg-gray-100 text-gray-400' : 'bg-white text-gray-600 hover:bg-gray-100'}" ${currentPage === 1 ? 'disabled' : 'onclick="changePage(' + (currentPage - 1) + ')"'}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="px-3 py-1 text-xs rounded ${i === currentPage ? 'bg-blue-500 text-white' : 'bg-white text-gray-600 hover:bg-gray-100'}" onclick="changePage(${i})">${i}</button>`;
            }
            html += `<button class="px-3 py-1 text-xs rounded ${currentPage === totalPages ? 'bg-gray-100 text-gray-400' : 'bg-white text-gray-600 hover:bg-gray-100'}" ${currentPage === totalPages ? 'disabled' : 'onclick="changePage(' + (currentPage + 1) + ')"'}>下一页</button>`;
            document.getElementById('pagination').innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.max(1, Math.ceil(getFilteredTasks().length / pageSize));
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTasks();
        }

        function filterTasks(type, btn) {
            currentFilter = type;
            currentPage = 1;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-blue-500', 'text-white');
                b.classList.add('bg-white', 'text-gray-600');
            });
            btn.classList.remove('bg-white', 'text-gray-600');
            btn.classList.add('bg-blue-500', 'text-white');
            renderTasks();
        }

        function handleSearch(value) {
            currentPage = 1;
            renderTasks();
        }

        function handleSort(value) {
            renderTasks();
        }

        function toggleDarkMode() { 
            document.body.classList.toggle('dark-mode'); 
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            showToast('深色模式切换'); 
        }
        
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            
            if (modalId === 'notificationModal') {
                const btn = document.querySelector('button[onclick*="notificationModal"]');
                if (btn) {
                    const rect = btn.getBoundingClientRect();
                    const windowEl = document.querySelector('.macos-window');
                    const windowRect = windowEl.getBoundingClientRect();
                    let relativeTop = rect.bottom - windowRect.top + 8;
                    let relativeRight = windowRect.right - rect.right;
                    
                    const modalWidth = 400;
                    const modalHeight = modal.scrollHeight || 400;
                    
                    if (relativeRight + modalWidth > windowRect.width) {
                        relativeRight = windowRect.width - modalWidth - 10;
                    }
                    
                    if (relativeTop + modalHeight > windowRect.height) {
                        relativeTop = rect.top - windowRect.top - modalHeight - 8;
                    }
                    
                    modal.style.top = relativeTop + 'px';
                    modal.style.right = relativeRight + 'px';
                    modal.style.left = 'auto';
                    modal.style.transform = 'none';
                }
            } else {
                modal.style.top = '50%'; modal.style.left = '50%';
                modal.style.transform = 'translate(-50%, -50%)';
            }
            modal.classList.add('active');
            currentModal = modal;
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            currentModal = null;
        }

        function handleSubmit(modalId, msg) { closeModal(modalId); showToast(msg); }
        function showToast(msg) { const toast = document.getElementById('toast'); document.getElementById('toastMsg').innerText = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }

        document.querySelectorAll('.modal-header').forEach(header => {
            header.addEventListener('mousedown', function(e) {
                if (e.target.tagName === 'BUTTON' || e.target.tagName === 'I') return;
                const modal = header.parentElement;
                if (modal.id === 'notificationModal') return;
                isDragging = true;
                const rect = modal.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;
                modal.style.transform = 'none';
            });
        });

        document.addEventListener('mousemove', function(e) {
            if (isDragging && currentModal) {
                currentModal.style.left = (e.clientX - dragOffsetX) + 'px';
                currentModal.style.top = (e.clientY - dragOffsetY) + 'px';
            }
        });

        document.addEventListener('mouseup', function() {
            isDragging = false;
        });

        renderTasks();
    </script>
</body>
</html>
