        :root {

            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .macos-window {
            position: relative;

            height: 800px;
            background: var(--macos-bg-light);
            border-radius: 12px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.3);

            overflow: hidden;

            border: 0.5px solid rgba(0, 0, 0, 0.1);

        .sidebar-blur {

        }

        .traffic-lights .light { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .light-red { background: #FF5F57; border: 0.5px solid #E0443E; }
        .light-yellow { background: #FEBC2E; border: 0.5px solid #D89F24; }
        .light-green { background: #28C840; border: 0.5px solid #1AAB29; }

        .nav-item.active { background: rgba(0, 0, 0, 0.05); border-radius: 6px; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }

        .dark-mode .macos-window { background: #1C1C1E; color: #FFFFFF; }
        .dark-mode .sidebar-blur { background: rgba(44, 44, 46, 0.7); }
        .dark-mode .nav-item.active { background: rgba(255, 255, 255, 0.1); color: #F2F2F7 !important; }
        .dark-mode .nav-item.active .fa { color: #F2F2F7 !important; }
        .dark-mode .bg-white { background: #2C2C2E !important; color: white; }
        .dark-mode .text-gray-500 { color: #8E8E93; }
        .dark-mode .text-gray-600 { color: #AEAEB2; }

        .btn-primary {
            background: linear-gradient(135deg, #007AFF 0%, #0056CC 100%);
            transition: all 0.2s ease;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }

        .card-hover { transition: all 0.2s ease; cursor: pointer; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1); }

        .macos-modal { position: absolute; background: white; border-radius: 12px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25); z-index: 1000; display: none; overflow: hidden; }
        .macos-modal.active { display: block; }
        .modal-header { background: #EBEBEB; padding: 10px 16px; cursor: move; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #d1d1d1; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; }

        .progress-bar { height: 6px; background: #E5E7EB; border-radius: 3px; overflow: hidden; }
        .progress-bar .progress { height: 100%; background: linear-gradient(90deg, #007AFF, #34C759); border-radius: 3px; transition: width 0.5s ease; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(0, 0, 0, 0.8); color: white; padding: 12px 24px; border-radius: 8px; z-index: 2000; transition: transform 0.3s ease; display: flex; align-items: center; gap: 10px; }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }

        .filter-btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; transition: all 0.2s; }
        .filter-btn.active { background: #007AFF; color: white; }
        .filter-btn:not(.active):hover { background: #f3f4f6; }
    </style>
</head>

            { id: 20, name: '水闸除险加固', location: 'K8+200', status: 'completed', progress: 100, person: '刘强', date: '2026-03-06' },
            { id: 21, name: '沉砂池清淤', location: 'K1+800', status: 'active', progress: 72, person: '王天明', date: '2026-03-14' },
            { id: 22, name: '生态浮岛安装', location: 'K7+000 ~ K7+300', status: 'active', progress: 58, person: '李华', date: '2026-03-13' },
            { id: 23, name: '巡检道路硬化', location: 'K3+000 ~ K3+500', status: 'warning', progress: 48, person: '周玉玲', date: '2026-03-17' },

        ];

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            const type = document.getElementById('filterType') ? document.getElementById('filterType').value : 'all';
            
            const filtered = type === 'all' ? allProjects : allProjects.filter(p => p.status === type);
            
            let html = '';
            filtered.forEach(p => {
                const statusClass = p.status === 'active' ? 'status-active' : (p.status === 'warning' ? 'status-warning' : 'status-completed');
                const statusText = p.status === 'active' ? '在建' : (p.status === 'warning' ? '预警' : '已完工');
                const progressColor = p.status === 'warning' ? 'background: linear-gradient(90deg, #FF9500, #FF3B30);' : '';
                const progressTextColor = p.status === 'warning' ? 'text-red-600' : 'text-blue-600';
                
                html += `
                <div class="bg-white rounded-xl shadow-sm border border-black/5 overflow-hidden card-hover" data-status="${p.status}" onclick="window.location.href='./engineering_detail.html'">
                    <div class="p-4">
                        <div class="flex items-start justify-between mb-3">
                            <div><h3 class="font-bold text-gray-800">${p.name}</h3><p class="text-xs text-gray-500 mt-1">${p.location}</p></div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="mb-3">
                            <div class="flex justify-between text-xs text-gray-500 mb-1"><span>施工进度</span><span class="font-medium ${progressTextColor}">${p.progress}%</span></div>
                            <div class="progress-bar"><div class="progress" style="width: ${p.progress}%; ${progressColor}"></div></div>
                        </div>
                        <div class="flex items-center justify-between text-xs">
                            <span class="text-gray-500"><i class="fa-solid fa-user mr-1"></i>${p.person}</span>
                            <span class="text-gray-400">${p.date}</span>
                        </div>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
            
            const counts = { all: allProjects.length, active: allProjects.filter(p => p.status === 'active').length, warning: allProjects.filter(p => p.status === 'warning').length, completed: allProjects.filter(p => p.status === 'completed').length };
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const type = btn.getAttribute('data-type');
                btn.innerHTML = type === 'all' ? `全部 (${counts.all})` : type === 'active' ? `在建 (${counts.active})` : type === 'warning' ? `预警 (${counts.warning})` : `已完工 (${counts.completed})`;
            });
        }

        function toggleDarkMode() { 
            document.body.classList.toggle('dark-mode'); 
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            showToast('深色模式切换'); 
        }
        
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        function filterProjects(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active'); b.classList.add('bg-white'); });
            btn.classList.add('active'); btn.classList.remove('bg-white');
            
            let filterType = type;
            if (type === 'all') filterType = 'all';
            else if (type === 'active') filterType = 'active';
            else if (type === 'warning') filterType = 'warning';
            else if (type === 'completed') filterType = 'completed';
            
            document.getElementById('filterType').value = filterType;
            renderProjects();
            
            const typeNames = { all: '全部', active: '在建', warning: '预警', completed: '已完工' };
            showToast('已筛选：' + typeNames[type]);
        }

        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            
            if (modalId === 'notificationModal') {
                const btn = document.querySelector('button[onclick*="notificationModal"]');
                if (btn) {
                    const rect = btn.getBoundingClientRect();
                    const windowEl = document.querySelector('.macos-window');
                    const windowRect = windowEl.getBoundingClientRect();
                    let relativeTop = rect.bottom - windowRect.top + 8;
                    let relativeRight = windowRect.right - rect.right;
                    
                    const modalWidth = 400;
                    const modalHeight = modal.scrollHeight || 400;
                    
                    if (relativeRight + modalWidth > windowRect.width) {
                        relativeRight = windowRect.width - modalWidth - 10;
                    }
                    
                    if (relativeTop + modalHeight > windowRect.height) {
                        relativeTop = rect.top - windowRect.top - modalHeight - 8;
                    }
                    
                    modal.style.top = relativeTop + 'px';
                    modal.style.right = relativeRight + 'px';
                    modal.style.left = 'auto';
                    modal.style.transform = 'none';
                }
            } else {
                modal.style.top = '50%'; modal.style.left = '50%'; modal.style.transform = 'translate(-50%, -50%)';
            }
            modal.classList.add('active');
            currentModal = modal;
        }

        function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); currentModal = null; }
        function closeAllModals() { document.querySelectorAll('.macos-modal').forEach(m => m.classList.remove('active')); }
        function handleSubmit(modalId, msg) { closeModal(modalId); showToast(msg); }
        function showToast(msg) { const toast = document.getElementById('toast'); document.getElementById('toastMsg').innerText = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }

        document.querySelectorAll('.modal-header').forEach(h => {
            h.addEventListener('mousedown', e => {
                if (e.target.tagName === 'BUTTON') return;
                const m = h.parentElement;
                if (m.id === 'notificationModal') return;
                isDragging = true;
                const r = m.getBoundingClientRect();
                dragOffsetX = e.clientX - r.left; dragOffsetY = e.clientY - r.top;
                m.style.transform = 'none';
            });
        });
        document.addEventListener('mousemove', e => { if (isDragging && currentModal) { currentModal.style.left = (e.clientX - dragOffsetX) + 'px'; currentModal.style.top = (e.clientY - dragOffsetY) + 'px'; } });
        document.addEventListener('mouseup', () => isDragging = false);
        
        renderProjects();
    </script>
</body>

</html>
