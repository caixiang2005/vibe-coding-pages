<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精品剧目</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #C9A84C; --gold-light: #E8CC7A; --gold-dark: #A07830;
    --red: #C0392B; --red-light: #E74C3C;
    --bg: #FDF8F0; --bg2: #F5EFE0;
    --text: #2C1810; --text2: #6B4C3B; --text3: #9C7B6B;
    --white: #FFFFFF; --card-shadow: 0 4px 20px rgba(44,24,16,0.12);
  }
  body { font-family: 'Noto Sans SC', sans-serif; background: #E8E0D0; display: flex; justify-content: center; }
  .phone-frame {
    width: 100%; height: 100vh; background: var(--bg);
    overflow: hidden; overflow-y: auto; display: flex; flex-direction: column;
  }
  .status-bar {
    background: linear-gradient(135deg, #8B1A1A 0%, #C9A84C 100%);
    color: white; padding: 12px 24px 8px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; font-weight: 500;
  }
  .status-bar .time { font-weight: 700; font-size: 15px; }
  .status-icons { display: flex; gap: 6px; }
  .page-header {
    background: linear-gradient(135deg, #8B1A1A 0%, #C0392B 50%, #C9A84C 100%);
    padding: 14px 20px 18px;
    display: flex; align-items: center; gap: 14px;
  }
  .back-btn {
    width: 36px; height: 36px; background: rgba(255,255,255,0.15);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px; cursor: pointer; text-decoration: none;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .page-title { color: white; font-size: 18px; font-weight: 700; font-family: 'Noto Serif SC', serif; flex: 1; }
  .header-action { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; text-decoration: none; cursor: pointer; transition: all 0.2s; }
  .header-action:active { transform: scale(0.9); }

  /* Filter tabs */
  .filter-row {
    background: white; padding: 0 20px;
    display: flex; border-bottom: 1px solid #EDE0C8;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-tab {
    padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text3);
    white-space: nowrap; cursor: pointer; border-bottom: 2.5px solid transparent;
    text-decoration: none; display: block; transition: all 0.2s;
  }
  .filter-tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 700; }

  /* Sort + view */
  .toolbar {
    background: white; padding: 10px 20px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #F0E8D8;
  }
  .sort-btns { display: flex; gap: 8px; }
  .sort-btn {
    padding: 5px 12px; border-radius: 16px; font-size: 12px;
    border: 1.5px solid #EDE0C8; color: var(--text2); cursor: pointer;
    display: flex; align-items: center; gap: 4px; transition: all 0.2s;
  }
  .sort-btn:active { transform: scale(0.95); }
  .sort-btn.active { background: var(--red); color: white; border-color: var(--red); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .view-btn:active { transform: scale(0.9); }
  .view-btn.active { background: var(--bg2); color: var(--red); }

  .content { flex: 1; overflow-y: auto; padding: 12px 20px 90px; }
  .content::-webkit-scrollbar { display: none; }

  /* Card List */
  .repo-list { display: flex; flex-direction: column; gap: 14px; }
  .repo-card {
    background: white; border-radius: 16px; overflow: hidden;
    box-shadow: var(--card-shadow); border: 1px solid #F0E8D8;
    display: flex; gap: 0; cursor: pointer; text-decoration: none;
    transition: all 0.2s;
  }
  .repo-card:active { transform: scale(0.98); }
  .repo-card .cover {
    width: 110px; height: 90px; object-fit: cover; flex-shrink: 0;
  }
  .repo-card .info { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .repo-card .name { font-size: 15px; font-weight: 700; color: var(--text); font-family: 'Noto Serif SC', serif; }
  .repo-card .artist { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .repo-card .bottom { display: flex; align-items: center; justify-content: space-between; }
  .tag { display: inline-block; font-size: 10px; background: #FEF0E0; color: var(--gold-dark); padding: 2px 8px; border-radius: 8px; font-weight: 500; }
  .repo-card .rating { font-size: 12px; color: var(--gold); font-weight: 600; }
  .repo-card .views { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 3px; }

  /* Section header within list */
  .list-section-title {
    font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 700;
    color: var(--text); padding: 4px 0 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .list-section-title::before { content: ''; width: 3px; height: 16px; background: linear-gradient(to bottom, var(--red), var(--gold)); border-radius: 2px; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; background: white; border-top: 1px solid #EDE0C8;
    display: flex; padding: 8px 0 20px; box-shadow: 0 -4px 20px rgba(44,24,16,0.08); z-index: 100;
  }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; text-decoration: none; padding: 4px 0; }
  .nav-item i { font-size: 20px; color: #BDB0A0; }
  .nav-item span { font-size: 10px; color: #BDB0A0; font-weight: 500; }
  .nav-item.active i { color: var(--red); }
  .nav-item.active span { color: var(--red); font-weight: 700; }
</style>
</head>
<body>
<div class="phone-frame">

<script>
function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;animation:fadeIn 0.3s';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'fadeOut 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 1500);
}

function switchFilter(el) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  showToast('已切换分类');
}

function switchSort(el) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function switchView(el, type) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  showToast('已切换视图');
}
</script>
<style>
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%,-50%) scale(0.8); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</body>
