<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修改密码</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #C9A84C; --gold-dark: #A07830; --red: #C0392B; --bg: #FDF8F0; --text: #2C1810; --text2: #6B4C3B; --text3: #9C7B6B; }
  body { font-family: 'Noto Sans SC', sans-serif; background: #E8E0D0; display: flex; justify-content: center; }
  .phone-frame { width: 100%; height: 100vh; background: var(--bg); overflow: hidden; display: flex; flex-direction: column; }
  .status-bar { background: linear-gradient(135deg,#8B1A1A,#C9A84C); color:white; padding:12px 24px 8px; display:flex; justify-content:space-between; align-items:center; font-size:12px; }
  .status-bar .time { font-weight:700; font-size:15px; }
  .status-icons { display:flex; gap:6px; }

  .page-header { background: linear-gradient(135deg,#8B1A1A 0%,#C0392B 50%,#C9A84C 100%); padding:14px 20px 20px; display:flex; align-items:center; gap:14px; }
  .back-btn { width:36px; height:36px; background:rgba(255,255,255,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:16px; text-decoration:none; border:1px solid rgba(255,255,255,0.2); cursor:pointer; }
  .page-title { color:white; font-size:18px; font-weight:700; font-family:'Noto Serif SC',serif; flex:1; }

  .content { flex:1; overflow-y:auto; padding:20px; }
  .content::-webkit-scrollbar { display:none; }

  .tips { background:#FFF9E6; border-radius:12px; padding:12px 14px; margin-bottom:20px; display:flex; align-items:flex-start; gap:10px; }
  .tips i { color:var(--gold-dark); font-size:16px; margin-top:2px; }
  .tips-text { font-size:12px; color:var(--text2); line-height:1.6; }

  .form-card { background:white; border-radius:16px; padding:20px; border:1px solid #F0E8D8; }
  .form-item { margin-bottom:16px; }
  .form-item:last-child { margin-bottom:0; }
  .form-label { font-size:13px; color:var(--text2); margin-bottom:8px; display:block; }
  .form-input-wrap { display:flex; align-items:center; background:var(--bg); border-radius:12px; border:1.5px solid #EDE0C8; overflow:hidden; transition:all 0.2s; }
  .form-input-wrap:focus-within { border-color:var(--red); }
  .form-input { flex:1; padding:12px 14px; border:none; background:transparent; font-size:14px; color:var(--text); outline:none; }
  .form-input::placeholder { color:var(--text3); }
  .form-icon { padding:0 12px; color:var(--text3); font-size:16px; }
  .form-btn { width:100%; padding:12px; background:var(--bg); border:1.5px solid #EDE0C8; border-radius:12px; font-size:13px; color:var(--text3); cursor:pointer; }
  .form-btn:active { background:#F5EFE0; }

  .code-wrap { display:flex; gap:10px; }
  .code-wrap .form-input-wrap { flex:1; }
  .code-btn { padding:0 14px; background:var(--red); color:white; border:none; border-radius:10px; font-size:12px; cursor:pointer; white-space:nowrap; }
  .code-btn:disabled { background:#ccc; }

  .submit-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--red),#A02020); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; margin-top:24px; }
  .submit-btn:active { opacity:0.9; transform:scale(0.98); }
  .submit-btn:disabled { background:#ccc; cursor:not-allowed; }

  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width: 100%; background:white; border-top:1px solid #EDE0C8; display:flex; padding:8px 0 20px; box-shadow:0 -4px 20px rgba(44,24,16,0.08); z-index:100; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; text-decoration:none; padding:4px 0; }
  .nav-item i { font-size:20px; color:#BDB0A0; }
  .nav-item span { font-size:10px; color:#BDB0A0; font-weight:500; }
  .nav-item.active i { color:var(--red); }
  .nav-item.active span { color:var(--red); font-weight:700; }
</style>
</head>
<body>
<div class="phone-frame">
  
  <div class="page-header">
    <a href="profile.html" class="back-btn"><i class="fa fa-arrow-left"></i></a>
    <div class="page-title">修改密码</div>
  </div>

  <div class="content">
    <div class="tips">
      <i class="fa-solid fa-circle-info"></i>
      <div class="tips-text">密码长度为8-20位，必须包含字母和数字，定期更换密码可提高账户安全性。</div>
    </div>

    <div class="form-card">
      <div class="form-item">
        <label class="form-label">当前密码</label>
        <div class="form-input-wrap">
          <i class="form-icon fa fa-lock"></i>
          <input type="password" class="form-input" placeholder="请输入当前密码" id="oldPwd">
        </div>
      </div>

      <div class="form-item">
        <label class="form-label">新密码</label>
        <div class="form-input-wrap">
          <i class="form-icon fa fa-lock"></i>
          <input type="password" class="form-input" placeholder="请输入新密码" id="newPwd">
        </div>
      </div>

      <div class="form-item">
        <label class="form-label">确认新密码</label>
        <div class="form-input-wrap">
          <i class="form-icon fa fa-lock"></i>
          <input type="password" class="form-input" placeholder="请再次输入新密码" id="confirmPwd">
        </div>
      </div>

      <div class="form-item">
        <label class="form-label">验证码</label>
        <div class="code-wrap">
          <div class="form-input-wrap">
            <input type="text" class="form-input" placeholder="请输入验证码" id="code">
          </div>
          <button class="code-btn" onclick="sendCode()">获取验证码</button>
        </div>
      </div>
    </div>

    <button class="submit-btn" onclick="submitPwd()">确认修改</button>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>首页</span></a>
    <a href="repertoire.html" class="nav-item"><i class="fa-solid fa-film"></i><span>剧目</span></a>
    <a href="study.html" class="nav-item"><i class="fa-solid fa-graduation-cap"></i><span>学习</span></a>
    <a href="exam.html" class="nav-item"><i class="fa-solid fa-pen-to-square"></i><span>练习</span></a>
    <a href="profile.html" class="nav-item active"><i class="fa-regular fa-circle-user"></i><span>我的</span></a>
  </div>
</div>

<script>
let countdown = 60;

function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;animation:fadeIn 0.3s';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.animation = 'fadeOut 0.3s'; setTimeout(() => toast.remove(), 300); }, 1500);
}

function sendCode() {
  const btn = document.querySelector('.code-btn');
  if (countdown > 0) return;
  btn.disabled = true;
  btn.textContent = countdown + 's';
  showToast('验证码已发送');
  var timer = setInterval(() => {
    countdown--;
    btn.textContent = countdown + 's';
    if (countdown <= 0) {
      clearInterval(timer);
      btn.disabled = false;
      btn.textContent = '获取验证码';
      countdown = 60;
    }
  }, 1000);
}

function submitPwd() {
  const oldPwd = document.getElementById('oldPwd').value;
  const newPwd = document.getElementById('newPwd').value;
  const confirmPwd = document.getElementById('confirmPwd').value;
  
  if (!oldPwd || !newPwd || !confirmPwd) {
    showToast('请填写完整信息');
    return;
  }
  if (newPwd.length < 8 || newPwd.length > 20) {
    showToast('密码长度为8-20位');
    return;
  }
  if (newPwd !== confirmPwd) {
    showToast('两次密码输入不一致');
    return;
  }
  showToast('密码修改成功');
  setTimeout(() => { window.location.href = 'profile.html'; }, 1500);
}
</script>
<style>
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%,-50%) scale(0.8); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</body>
</html>
