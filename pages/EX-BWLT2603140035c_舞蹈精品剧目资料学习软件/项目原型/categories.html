<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国古典舞 - 分类浏览</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8CC7A;
    --red: #C0392B;
    --red-light: #E74C3C;
    --bg: #FDF8F0;
    --bg2: #F5EFE0;
    --text: #2C1810;
    --text2: #6B4C3B;
    --text3: #9C7B6B;
    --white: #FFFFFF;
    --card-shadow: 0 4px 20px rgba(44,24,16,0.12);
  }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: #E8E0D0;
    display: flex; justify-content: center;
    align-items: flex-start;
    min-height: 100vh; padding: 20px;
  }
  .phone-frame {
    width: 100%; min-height: 852px;
    background: var(--bg);
    border-radius: 48px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35), 0 0 0 10px #1a1a1a, 0 0 0 12px #333;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .status-bar {
    background: linear-gradient(135deg, #8B1A1A 0%, #C9A84C 100%);
    color: white;
    padding: 12px 24px 8px;
    display: flex; justify-content: space-between;
    align-items: center; font-size: 12px;
  }
  .status-bar .time { font-weight: 700; font-size: 15px; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Hero Header for category */
  .cat-hero {
    position: relative;
    height: 180px; overflow: hidden;
  }
  .cat-hero-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .cat-hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(139,26,26,0.5) 0%, rgba(44,24,16,0.85) 100%);
    display: flex; flex-direction: column;
    justify-content: flex-end; padding: 0 20px 20px;
  }
  .cat-back {
    position: absolute;
    top: 14px; left: 16px;
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 15px;
    text-decoration: none; border: none; cursor: pointer;
  }
  .cat-title-en {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .cat-title-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px; font-weight: 700;
    color: white; margin-bottom: 6px;
  }
  .cat-desc-row {
    display: flex; gap: 16px; align-items: center;
  }
  .cat-stat {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: rgba(255,255,255,0.75);
  }
  .cat-stat i { color: var(--gold-light); font-size: 11px; }

  /* Category selector */
  .cat-selector {
    background: white;
    display: flex; overflow-x: auto;
    scrollbar-width: none;
    padding: 12px 16px;
    gap: 8px;
    border-bottom: 1px solid #EDE0C8;
  }
  .cat-selector::-webkit-scrollbar { display: none; }
  .cat-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    text-decoration: none;
    transition: all 0.2s;
  }
  .cat-chip.active {
    background: var(--red); color: white;
  }
  .cat-chip.inactive {
    background: var(--bg2); color: var(--text2);
  }
  .cat-chip-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor; opacity: 0.5;
  }

  /* Filter & sort */
  .filter-bar {
    background: var(--bg);
    padding: 10px 16px;
    display: flex; align-items: center;
    justify-content: space-between;
  }
  .count-label { font-size: 13px; color: var(--text3); }
  .sort-group { display: flex; gap: 6px; }
  .sort-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text2);
    background: white; border: 1px solid #E8D8C0;
    border-radius: 14px; padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sort-btn:active { transform: scale(0.95); }
  .sort-btn.active { color: var(--red); border-color: rgba(192,57,43,0.4); }

  /* Content */
  .content {
    flex: 1; overflow-y: auto;
    padding: 12px 16px 90px;
    scrollbar-width: none;
  }
  .content::-webkit-scrollbar { display: none; }

  /* Featured banner */
  .featured-banner {
    background: linear-gradient(135deg, rgba(139,26,26,0.07), rgba(201,168,76,0.12));
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 16px; overflow: hidden;
    margin-bottom: 16px;
    display: flex; height: 120px;
    text-decoration: none;
    position: relative;
  }
  .fb-img { width: 120px; object-fit: cover; display: block; }
  .fb-content { flex: 1; padding: 14px; }
  .fb-badge {
    display: inline-block;
    background: var(--red);
    color: white; font-size: 10px;
    padding: 2px 8px; border-radius: 8px;
    margin-bottom: 6px;
  }
  .fb-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px; font-weight: 700;
    color: var(--text); margin-bottom: 4px;
  }
  .fb-sub { font-size: 12px; color: var(--text3); }
  .fb-arrow {
    position: absolute; right: 12px; bottom: 12px;
    width: 26px; height: 26px;
    background: var(--red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 10px;
  }

  /* Section title */
  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px; font-weight: 700;
    color: var(--text);
    margin: 4px 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 4px; height: 18px;
    background: var(--red); border-radius: 2px;
  }

  /* Repertoire list - full width cards */
  .rep-list { display: flex; flex-direction: column; gap: 12px; }
  .rep-card {
    background: white;
    border-radius: 16px;
    display: flex; gap: 0;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    text-decoration: none;
    transition: transform 0.2s;
  }
  .rep-card:active { transform: scale(0.98); }
  .rep-img {
    width: 100px; height: 110px;
    object-fit: cover; flex-shrink: 0;
  }
  .rep-body { flex: 1; padding: 12px; }
  .rep-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
  .rep-tag {
    font-size: 10px; padding: 2px 7px;
    border-radius: 8px;
  }
  .rep-tag.classical { background: rgba(201,168,76,0.15); color: #A07830; }
  .rep-tag.folk { background: rgba(83,155,83,0.15); color: #2E7D32; }
  .rep-tag.ballet { background: rgba(33,150,243,0.1); color: #1565C0; }
  .rep-tag.modern { background: rgba(156,39,176,0.1); color: #6A1B9A; }
  .rep-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px; font-weight: 700;
    color: var(--text); margin-bottom: 3px;
  }
  .rep-artist { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .rep-bottom { display: flex; align-items: center; justify-content: space-between; }
  .rep-rating {
    display: flex; align-items: center; gap: 3px;
    font-size: 12px; color: var(--gold);
  }
  .rep-rating span { color: var(--text2); font-weight: 600; }
  .rep-progress-row {
    display: flex; align-items: center; gap: 6px;
  }
  .rep-prog-bar {
    width: 60px; height: 4px;
    background: var(--bg2); border-radius: 2px;
    overflow: hidden;
  }
  .rep-prog-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--red), var(--gold));
  }
  .rep-prog-txt { font-size: 11px; color: var(--text3); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; background: white;
    border-top: 1px solid #EDE0C8;
    display: flex; padding: 8px 0 20px;
    box-shadow: 0 -4px 20px rgba(44,24,16,0.08);
    z-index: 100;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    cursor: pointer; text-decoration: none; padding: 4px 0;
    transition: all 0.2s;
  }
  .nav-item i { font-size: 20px; color: #BDB0A0; }
  .nav-item span { font-size: 10px; color: #BDB0A0; font-weight: 500; }
  .nav-item.active i { color: var(--red); }
  .nav-item.active span { color: var(--red); font-weight: 700; }
</style>
</head>

<script>
function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;animation:fadeIn 0.3s';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'fadeOut 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 1500);
}

function switchCat(el) {
  document.querySelectorAll('.cat-chip').forEach(c => {
    c.classList.remove('active');
    c.classList.add('inactive');
  });
  el.classList.remove('inactive');
  el.classList.add('active');
  showToast('已切换分类');
}

function switchSort(el) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
</script>
<style>

@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
</style>
