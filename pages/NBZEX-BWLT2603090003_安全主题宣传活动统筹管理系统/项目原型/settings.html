        .traffic-light-red { background: #FF5F57; }
        .traffic-light-yellow { background: #FEBC2E; }
        .traffic-light-green { background: #28C840; }
        .sidebar-item-active { background: color-mix(in srgb, var(--mac-accent) 14%, transparent); color: var(--mac-accent); font-weight: 600; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .mac-modal { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(30px); border-radius: 16px; box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25); min-width: 400px; max-width: 600px; transform: scale(0.9) translateY(20px); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); overflow: hidden; }
        .modal-overlay.active .mac-modal { transform: scale(1) translateY(0); }
        .modal-titlebar { background: rgba(246, 246, 248, 0.8); padding: 14px 16px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--mac-separator); position: relative; }
        .modal-titlebar .traffic-lights { position: absolute; left: 16px; }
        .modal-content { padding: 24px; }
        .btn-primary { background: var(--mac-accent); color: white; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background: #0077ED; transform: translateY(-1px); }
        .btn-secondary { background: rgba(120, 120, 128, 0.12); color: var(--mac-text); padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-secondary:hover { background: rgba(120, 120, 128, 0.2); }
        .action-btn { padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; border: none; display: inline-flex; align-items: center; gap: 6px; }
        .action-btn-blue { background: rgba(10, 132, 255, 0.1); color: #0A84FF; }

        .toggle-switch { position: relative; width: 44px; height: 24px; background: rgba(120, 120, 128, 0.2); border-radius: 12px; cursor: pointer; transition: all 0.3s; }

    <script>
        function showModal(title, content, buttons = []) {
            const container = document.getElementById('modal-container');
            let buttonsHtml = '';
            buttons.forEach(btn => {
                buttonsHtml += `<button class="${btn.class || 'btn-secondary'}" onclick="${btn.onclick}">${btn.text}</button>`;
            });
            container.innerHTML = `
                <div class="modal-overlay active" onclick="closeModal(event)">
                    <div class="mac-modal" onclick="event.stopPropagation()">
                        <div class="modal-titlebar">
                            <div class="traffic-lights">
                                <div class="traffic-light traffic-light-red" onclick="closeModal()"></div>
                                <div class="traffic-light traffic-light-yellow"></div>
                                <div class="traffic-light traffic-light-green"></div>
                            </div>
                            <div class="text-[13px] font-semibold tracking-tight text-[color:var(--mac-text)] ml-4">${title}</div>
                        </div>
                        <div class="modal-content">
                            ${content}
                            <div class="flex justify-center gap-3 mt-6">
                                ${buttonsHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            const container = document.getElementById('modal-container');
            const overlay = container.querySelector('.modal-overlay');
            if (overlay) {
                overlay.classList.remove('active');
                setTimeout(() => container.innerHTML = '', 300);
            }
        }
        function toggleSwitch(el) {
            el.classList.toggle('active');
        }
        function showChangePwdModal() {
            showModal('修改密码', `
                <div class="text-left space-y-4">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">当前密码</label>
                        <input type="password" class="form-input" placeholder="请输入当前密码" />
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">新密码</label>
                        <input type="password" class="form-input" placeholder="请输入新密码" />
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">确认新密码</label>
                        <input type="password" class="form-input" placeholder="请再次输入新密码" />
                    </div>
                    <p class="text-xs text-gray-400">密码长度至少8位，包含字母和数字</p>
                </div>
            `, [
                { text: '取消', class: 'btn-secondary', onclick: 'closeModal()' },
                { text: '确认修改', class: 'btn-primary', onclick: 'closeModal(); showSuccessModal("修改成功", "密码已成功修改")' }
            ]);
        }
        function showTwoFactorModal() {
            showModal('两步验证', `
                <div class="text-left space-y-4">
                    <p class="text-sm text-gray-600">两步验证为您的账号提供额外的安全保护。</p>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-sm font-medium">手机验证码</span>
                            <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                        </div>
                        <p class="text-xs text-gray-500">通过短信接收验证码</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <div class="flex items-center justify-between">
                            <span class="text-sm font-medium">邮箱验证码</span>
                            <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
                        </div>
                    </div>
                </div>
            `, [
                { text: '取消', class: 'btn-secondary', onclick: 'closeModal()' },
                { text: '保存设置', class: 'btn-primary', onclick: 'closeModal(); showSuccessModal("保存成功", "两步验证设置已更新")' }
            ]);
        }
        function showLoginHistoryModal() {
            showModal('登录历史', `
                <div class="text-left space-y-3">
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div>
                            <p class="text-sm font-medium">当前登录</p>
                            <p class="text-xs text-gray-500">Windows · Chrome · 2026-03-19 14:30</p>
                        </div>
                        <span class="status-badge bg-green-50 text-green-600">当前</span>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div>
                            <p class="text-sm font-medium">昨日登录</p>
                            <p class="text-xs text-gray-500">Windows · Chrome · 2026-03-18 09:15</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                        <div>
                            <p class="text-sm font-medium">前几日登录</p>
                            <p class="text-xs text-gray-500">Windows · Chrome · 2026-03-17 16:45</p>
                        </div>
                    </div>
                </div>
            `, [{ text: '关闭', class: 'btn-primary', onclick: 'closeModal()' }]);
        }
        function showExportDataModal() {
            showModal('导出数据', `
                <div class="text-left space-y-4">
                    <p class="text-sm text-gray-500 mb-2">选择导出内容：</p>
                    <div class="space-y-2">
                        <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100">
                            <input type="checkbox" class="mr-3" checked />
                            <span class="text-sm">活动数据</span>
                        </label>
                        <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100">
                            <input type="checkbox" class="mr-3" checked />
                            <span class="text-sm">任务数据</span>
                        </label>
                        <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100">
                            <input type="checkbox" class="mr-3" />
                            <span class="text-sm">资源文件</span>
                        </label>
                        <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100">
                            <input type="checkbox" class="mr-3" />
                            <span class="text-sm">系统设置</span>
                        </label>
                    </div>
                </div>
            `, [
                { text: '取消', class: 'btn-secondary', onclick: 'closeModal()' },
                { text: '导出', class: 'btn-primary', onclick: 'closeModal(); showSuccessModal("导出成功", "数据已导出为Excel文件")' }
            ]);
        }
        function showInfoModal(title, message) {
            showModal(title, `
                <div class="text-center">
                    <i class="fas fa-info-circle text-4xl text-blue-500 mb-4"></i>
                    <p class="text-gray-600">${message}</p>
                </div>
            `, [{ text: '确定', class: 'btn-primary', onclick: 'closeModal()' }]);
        }
        function showConfirmLogout() {
            showModal('退出登录', `
                <div class="text-center">
                    <i class="fas fa-sign-out-alt text-4xl text-orange-500 mb-4"></i>
                    <p class="text-gray-600">确定要退出登录吗？</p>
                </div>
            `, [
                { text: '取消', class: 'btn-secondary', onclick: 'closeModal()' },
                { text: '退出', class: 'btn-primary', onclick: 'closeModal(); showLogoutSuccess()' }
            ]);
        }
        function showLogoutSuccess() {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="modal-overlay active" onclick="closeModal(event)">
                    <div class="mac-modal" onclick="event.stopPropagation()" style="min-width: 320px;">
                        <div class="modal-titlebar">
                            <div class="traffic-lights">
                                <div class="traffic-light traffic-light-red" onclick="closeModal()"></div>
                                <div class="traffic-light traffic-light-yellow"></div>
                                <div class="traffic-light traffic-light-green"></div>
                            </div>
                            <div class="text-[13px] font-semibold tracking-tight text-[color:var(--mac-text)] ml-4">已退出</div>
                        </div>
                        <div class="modal-content text-center">
                            <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
                            <p class="text-gray-600 mb-4">您已成功退出登录</p>
                            <button class="btn-primary" onclick="window.location.href='main.html'">返回首页</button>
                        </div>
                    </div>
                </div>
            `;
        }
        function showSuccessModal(title, message) {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="modal-overlay active" onclick="closeModal(event)">
                    <div class="mac-modal" onclick="event.stopPropagation()" style="min-width: 320px;">
                        <div class="modal-titlebar">
                            <div class="traffic-lights">
                                <div class="traffic-light traffic-light-red" onclick="closeModal()"></div>
                                <div class="traffic-light traffic-light-yellow"></div>
                                <div class="traffic-light traffic-light-green"></div>
                            </div>
                            <div class="text-[13px] font-semibold tracking-tight text-[color:var(--mac-text)] ml-4">${title}</div>
                        </div>
                        <div class="modal-content text-center">
                            <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
                            <p class="text-gray-600 mb-4">${message}</p>
                            <button class="btn-primary" onclick="closeModal()">确定</button>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
