<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>帮助与反馈 - 水利项目质量验收审核软件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        body { background-color: #f0f4f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .android-container { width: 100%; height: 100vh; overflow-y: auto; overflow-x: hidden; }
        .android-container::-webkit-scrollbar { display: none; }
        .btn-primary { background: #2563eb; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; width: 100%; }
        .btn-primary:active { background: #1d4ed8; transform: scale(0.96); }
        .faq-item { background: #f9fafb; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .faq-question { padding: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .faq-answer { padding: 0 14px 14px; font-size: 13px; color: #6b7280; display: none; }
        .faq-item.open .faq-answer { display: block; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-900">
    <div class="android-container bg-gray-50 flex flex-col">
        <header class="bg-blue-700 text-white pt-12 pb-5 px-5 rounded-b-3xl shadow-lg">
            <div class="flex items-center justify-between">
                <a href="profile.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-600 active:bg-blue-500">
                    <span class="iconify text-xl" data-icon="material-symbols:arrow-back"></span>
                </a>
                <h1 class="text-base font-bold text-center flex-1">水利项目质量验收审核软件</h1>
                <div class="w-10"></div>
            </div>
            <p class="text-center text-blue-200 text-xs mt-1">帮助与反馈</p>
        </header>

        <main class="flex-1 px-4 py-4 pb-8">
            <h4 class="text-sm font-bold text-gray-800 mb-3">常见问题</h4>

            <div class="faq-item">
                <div class="faq-question" onclick="toggleFaq(this)">
                    <span class="text-sm text-gray-800">如何提交验收申请？</span>
                    <span class="iconify text-gray-400" data-icon="material-symbols:expand-more"></span>
                </div>
                <div class="faq-answer">
                    进入「验收」页面，点击右上角「新建」按钮，填写工程信息后提交即可。
                </div>
            </div>

            <div class="faq-item">
                <div class="faq-question" onclick="toggleFaq(this)">
                    <span class="text-sm text-gray-800">如何生成质量报告？</span>
                    <span class="iconify text-gray-400" data-icon="material-symbols:expand-more"></span>
                </div>
                <div class="faq-answer">
                    进入「报告生成」页面，选择报告类型，填写项目信息后点击生成。
                </div>
            </div>

            <div class="faq-item">
                <div class="faq-question" onclick="toggleFaq(this)">
                    <span class="text-sm text-gray-800">如何查看物联设备数据？</span>
                    <span class="iconify text-gray-400" data-icon="material-symbols:expand-more"></span>
                </div>
                <div class="faq-answer">
                    进入「物联监控」页面，点击设备卡片可查看详细数据和历史趋势。
                </div>
            </div>

            <div class="faq-item">
                <div class="faq-question" onclick="toggleFaq(this)">
                    <span class="text-sm text-gray-800">如何上报质量问题？</span>
                    <span class="iconify text-gray-400" data-icon="material-symbols:expand-more"></span>
                </div>
                <div class="faq-answer">
                    进入「问题整改」页面，点击右下角「+」按钮，填写问题信息后提交。
                </div>
            </div>

            <div class="faq-item">
                <div class="faq-question" onclick="toggleFaq(this)">
                    <span class="text-sm text-gray-800">忘记密码怎么办？</span>
                    <span class="iconify text-gray-400" data-icon="material-symbols:expand-more"></span>
                </div>
                <div class="faq-answer">
                    在登录页面点击「忘记密码」，输入注册手机号验证后可重置密码。
                </div>
            </div>

            <div class="mt-6">
                <h4 class="text-sm font-bold text-gray-800 mb-3">提交反馈</h4>
                <div class="bg-white rounded-xl shadow-sm p-4">
                    <textarea class="w-full p-3 border border-gray-200 rounded-lg text-sm resize-none" rows="4" placeholder="请描述您遇到的问题或建议..."></textarea>
                    <button class="btn-primary mt-3" onclick="submitFeedback()">提交反馈</button>
                </div>
            </div>

            <div class="mt-4 text-center">
                <p class="text-xs text-gray-400">如有更多问题，请联系客服：400-888-6666</p>
            </div>
        </main>
    </div>

    <script>
        function toggleFaq(el) {
            var item = el.parentElement;
            var icon = el.querySelector('.iconify');
            if (item.classList.contains('open')) {
                item.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
            } else {
                item.classList.add('open');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function submitFeedback() {
            alert('反馈已提交，感谢您的建议！');
        }
    </script>
</body>
</html>
