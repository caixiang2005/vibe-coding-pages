<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>编辑资料 - 水利项目质量验收审核软件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        body { background-color: #f0f4f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .android-container { width: 100%; height: 100vh; overflow-y: auto; overflow-x: hidden; }
        .android-container::-webkit-scrollbar { display: none; }
        .btn-press:active { transform: scale(0.96); transition: transform 0.1s; }
        .input-field { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-primary { background: #2563eb; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; width: 100%; }
        .btn-primary:active { background: #1d4ed8; transform: scale(0.96); }
        .btn-secondary { background: #f3f4f6; color: #374151; padding: 12px 20px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; flex: 1; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: #6b7280; margin-bottom: 6px; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-900">
    <div class="android-container bg-gray-50 flex flex-col">
        <header class="bg-blue-700 text-white pt-12 pb-5 px-5 rounded-b-3xl shadow-lg">
            <div class="flex items-center justify-between">
                <a href="profile-info.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-600 active:bg-blue-500">
                    <span class="iconify text-xl" data-icon="material-symbols:arrow-back"></span>
                </a>
                <h1 class="text-base font-bold text-center flex-1">水利项目质量验收审核软件</h1>
                <div class="w-10"></div>
            </div>
            <p class="text-center text-blue-200 text-xs mt-1">编辑资料</p>
        </header>

        <main class="flex-1 px-4 py-4 pb-8">
            <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
                <div class="flex justify-center mb-4">
                    <div class="relative">
                        <div class="w-20 h-20 rounded-full border-4 border-blue-100 overflow-hidden">
                            <img src="https://i01piccdn.sogoucdn.com/6de4845d273e3386" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute bottom-0 right-0 w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                            <span class="iconify text-white text-sm" data-icon="material-symbols:camera-alt"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-4">
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="input-field" value="文丹" id="editName">
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="input-field" value="13812345678" id="editPhone">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="input-field" value="wendan@waterproject.cn" id="editEmail">
                </div>
                <div class="form-group">
                    <label class="form-label">部门</label>
                    <select class="input-field" id="editDept">
                        <option>质检部</option>
                        <option>项目部</option>
                        <option>工程部</option>
                        <option>安全部</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">职位</label>
                    <input type="text" class="input-field" value="质量主管" id="editPosition">
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <a href="profile-info.html" class="btn-secondary text-center flex-1">取消</a>
                <button class="btn-primary flex-1" onclick="saveProfile()">保存</button>
            </div>
        </main>
    </div>

    <script>
        function saveProfile() {
            var name = document.getElementById('editName').value;
            if (!name) {
                alert('请输入姓名');
                return;
            }
            alert('保存成功！');
            window.location.href = 'profile-info.html';
        }
    </script>
</body>
</html>
