<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>修改密码 - 水利项目质量验收审核软件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        body { background-color: #f0f4f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .android-container { width: 100%; height: 100vh; overflow-y: auto; overflow-x: hidden; }
        .android-container::-webkit-scrollbar { display: none; }
        .input-field { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-primary { background: #2563eb; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; width: 100%; }
        .btn-primary:active { background: #1d4ed8; transform: scale(0.96); }
        .btn-secondary { background: #f3f4f6; color: #374151; padding: 12px 20px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; flex: 1; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; color: #6b7280; margin-bottom: 8px; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 6px; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-900">
    <div class="android-container bg-gray-50 flex flex-col">
        <header class="bg-blue-700 text-white pt-12 pb-5 px-5 rounded-b-3xl shadow-lg">
            <div class="flex items-center justify-between">
                <a href="profile.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-600 active:bg-blue-500">
                    <span class="iconify text-xl" data-icon="material-symbols:arrow-back"></span>
                </a>
                <h1 class="text-base font-bold text-center flex-1">水利项目质量验收审核软件</h1>
                <div class="w-10"></div>
            </div>
            <p class="text-center text-blue-200 text-xs mt-1">修改密码</p>
        </header>

        <main class="flex-1 px-4 py-4 pb-8">
            <div class="bg-white rounded-xl shadow-sm p-5">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-blue-100 rounded-full mx-auto flex items-center justify-center mb-3">
                        <span class="iconify text-3xl text-blue-600" data-icon="material-symbols:lock"></span>
                    </div>
                    <h2 class="text-lg font-bold text-gray-800">设置新密码</h2>
                    <p class="text-sm text-gray-500 mt-1">密码长度8-20位，需包含字母和数字</p>
                </div>

                <div class="form-group">
                    <label class="form-label">原密码</label>
                    <input type="password" class="input-field" id="oldPassword" placeholder="请输入原密码">
                </div>
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="password" class="input-field" id="newPassword" placeholder="请输入新密码">
                </div>
                <div class="form-group">
                    <label class="form-label">确认新密码</label>
                    <input type="password" class="input-field" id="confirmPassword" placeholder="请再次输入新密码">
                </div>

                <div class="mt-6">
                    <button class="btn-primary" onclick="changePassword()">确认修改</button>
                </div>
            </div>

            <div class="mt-4">
                <a href="profile.html" class="btn-secondary text-center block">取消</a>
            </div>
        </main>
    </div>

    <script>
        function changePassword() {
            var oldPwd = document.getElementById('oldPassword').value;
            var newPwd = document.getElementById('newPassword').value;
            var confirmPwd = document.getElementById('confirmPassword').value;

            if (!oldPwd) {
                alert('请输入原密码');
                return;
            }
            if (!newPwd) {
                alert('请输入新密码');
                return;
            }
            if (newPwd.length < 8 || newPwd.length > 20) {
                alert('密码长度需8-20位');
                return;
            }
            if (!/[a-zA-Z]/.test(newPwd) || !/[0-9]/.test(newPwd)) {
                alert('密码需包含字母和数字');
                return;
            }
            if (newPwd !== confirmPwd) {
                alert('两次密码输入不一致');
                return;
            }
            alert('密码修改成功！');
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
