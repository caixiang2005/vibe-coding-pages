        let currentDays = 90;

        function selectDate(btn, days) {
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDays = days;
            updateData(days);
            initCharts();
        }

        function updateData(days) {
            const data = dataConfig[days];
            document.getElementById('compliance-rate').textContent = data.complianceRate;
            document.getElementById('compliance-change').innerHTML = data.complianceChange;
            document.getElementById('exceed-count').textContent = data.exceedCount;
            document.getElementById('exceed-change').textContent = data.exceedChange;
            document.getElementById('reduction').textContent = data.reduction;
            document.getElementById('reduction-change').textContent = data.reductionChange;
            document.getElementById('equipment-rate').textContent = data.equipmentRate;
            document.getElementById('equipment-change').textContent = data.equipmentChange;

            const tbody = document.getElementById('exceed-records');
            tbody.innerHTML = data.records.map(r => `
                <tr class="hover:bg-gray-50 dark:hover:bg-white/5">
                    <td class="px-4 py-3">${r.time}</td>
                    <td class="px-4 py-3">${r.company}</td>
                    <td class="px-4 py-3">${r.point}</td>
                    <td class="px-4 py-3">${r.pollutant}</td>
                    <td class="px-4 py-3 text-red-500">${r.value}</td>
                    <td class="px-4 py-3 text-red-500">${r.times}</td>
                    <td class="px-4 py-3"><span class="px-2 py-0.5 ${r.statusClass} text-xs rounded">${r.status}</span></td>
                </tr>
            `).join('');
        }

            const data = dataConfig[currentDays];
            
            const trendChart = echarts.init(document.getElementById('emission-trend-chart'));
            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                legend: { data: ['排放量', '减排量'], textStyle: { color: textColor } },
                xAxis: { 
                    type: 'category', 
                    boundaryGap: false,
                    data: data.trendLabels,
                    axisLabel: { color: textColor }
                },
                yAxis: { axisLabel: { color: textColor }, splitLine: { lineStyle: { opacity: 0.1 } } },
                series: [
                    { name: '排放量', type: 'line', data: data.emissionData, smooth: true, itemStyle: { color: '#007AFF' } },
                    { name: '减排量', type: 'line', data: data.reductionData, smooth: true, itemStyle: { color: '#34C759' } }
                ]
            });
            
            const pieChart = echarts.init(document.getElementById('compliance-chart'));
            pieChart.setOption({
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: data.complianceData,
                    label: { show: true, formatter: '{b}: {d}%' }
                }]
            });
        }

        function toggleDarkMode() {
            var macWindow = document.querySelector('.mac-window');
            macWindow.classList.toggle('dark');
            var icon = document.getElementById('dark-mode-icon');
            if (macWindow.classList.contains('dark')) {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('darkMode', 'true');
            } else {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('darkMode', 'false');
            }
            initCharts();
        }

        function initDarkMode() {
            var macWindow = document.querySelector('.mac-window');
            var icon = document.getElementById('dark-mode-icon');
            var isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                macWindow.classList.add('dark');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }

        function exportData() {
            const toast = document.getElementById('window-toast');
            toast.textContent = '数据导出成功！';
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            initDarkMode();
            updateData(90);
            initCharts();
        });
    </script>
</body>
</html>
