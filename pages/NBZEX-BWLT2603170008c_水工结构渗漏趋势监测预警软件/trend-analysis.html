                                <option selected>移动平均</option>
                                <option>指数平滑</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>数据粒度</label>
                            <select>
                                <option>每小时</option>
                                <option selected>每天</option>
                                <option>每周</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>预测周期</label>
                            <select>
                                <option>3 天</option>
                                <option selected>7 天</option>
                                <option>14 天</option>
                                <option>30 天</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>置信区间</label>
                            <select>
                                <option>90%</option>
                                <option selected>95%</option>
                                <option>99%</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn-ok" onclick="runAnalysis()">开始分析</button>
                <button class="btn-cancel" onclick="closeModal('trendModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 对比分析弹窗 -->
    <div class="modal-mask" id="compareModal">
        <div class="modal-box" style="width:620px;">
            <div class="modal-head">
                <span>多点对比分析</span>
                <button class="modal-close" onclick="closeModal('compareModal')">×</button>
            </div>
            <div class="modal-content">
                <div class="form-section">
                    <div class="section-title">对比监测点选择</div>
                    <div class="form-group">
                        <label class="req">监测点 1</label>
                        <select>
                            <option value="">请选择</option>
                            <option selected>JC-ZB-001 主坝左岸坡脚</option>
                            <option>JC-ZB-002 主坝中部基础</option>
                            <option>JC-ZB-003 主坝右岸帷幕后</option>
                            <option>JC-FB-001 副坝廊道排水孔</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="req">监测点 2</label>
                        <select>
                            <option value="">请选择</option>
                            <option>JC-ZB-001 主坝左岸坡脚</option>
                            <option>JC-ZB-002 主坝中部基础</option>
                            <option selected>JC-ZB-003 主坝右岸帷幕后</option>
                            <option>JC-FB-001 副坝廊道排水孔</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>监测点 3</label>
                        <select>
                            <option value="">不选择</option>
                            <option>JC-ZB-001 主坝左岸坡脚</option>
                            <option>JC-ZB-002 主坝中部基础</option>
                            <option>JC-ZB-003 主坝右岸帷幕后</option>
                        </select>
                    </div>
                </div>
                <div class="form-section">
                    <div class="section-title">分析参数</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="req">对比参数</label>
                            <select>
                                <option selected>渗流量</option>
                                <option>水压力</option>
                                <option>浊度</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="req">时间范围</label>
                            <select>
                                <option>最近 7 天</option>
                                <option selected>最近 14 天</option>
                                <option>最近 30 天</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn-ok" onclick="runCompare()">开始对比</button>
                <button class="btn-cancel" onclick="closeModal('compareModal')">取消</button>
            </div>
        </div>
    </div>

    <script>
        function toast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show ' + (type || ''); setTimeout(() => t.classList.remove('show'), 2000); }
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function runAnalysis() { closeModal('trendModal'); toast('分析完成', 'success'); }
        function runCompare() { closeModal('compareModal'); toast('对比完成', 'success'); }
        function exitApp() { if (confirm('确定要退出程序吗？')) { window.location.href = 'login.html'; } }
        document.querySelectorAll('.modal-mask').forEach(m => { m.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); }); });
    </script>
</body>
</html>
