<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帮助与反馈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #C9A84C; --gold-dark: #A07830; --red: #C0392B; --bg: #FDF8F0; --text: #2C1810; --text2: #6B4C3B; --text3: #9C7B6B; }
  body { font-family: 'Noto Sans SC', sans-serif; background: #E8E0D0; display: flex; justify-content: center; }
  .phone-frame { width: 100%; height: 100vh; background: var(--bg); overflow: hidden; overflow-y: auto; display: flex; flex-direction: column; }
  .status-bar { background: linear-gradient(135deg,#8B1A1A,#C9A84C); color:white; padding:12px 24px 8px; display:flex; justify-content:space-between; align-items:center; font-size:12px; }
  .status-bar .time { font-weight:700; font-size:15px; }
  .status-icons { display:flex; gap:6px; }

  .page-header { background: linear-gradient(135deg,#8B1A1A 0%,#C0392B 50%,#C9A84C 100%); padding:14px 20px 20px; display:flex; align-items:center; gap:14px; }
  .back-btn { width:36px; height:36px; background:rgba(255,255,255,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:16px; text-decoration:none; border:1px solid rgba(255,255,255,0.2); cursor:pointer; }
  .page-title { color:white; font-size:18px; font-weight:700; font-family:'Noto Serif SC',serif; flex:1; }

  .content { flex:1; overflow-y:auto; padding:16px 20px 90px; }
  .content::-webkit-scrollbar { display:none; }

  .section-title { font-family:'Noto Serif SC',serif; font-size:14px; font-weight:700; color:var(--text); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .section-title::before { content:''; width:3px; height:14px; background:linear-gradient(to bottom,var(--red),var(--gold)); border-radius:2px; }

  .help-card { background:white; border-radius:16px; padding:16px; margin-bottom:12px; border:1px solid #F0E8D8; }
  .help-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #F0E8D8; cursor:pointer; transition:all 0.2s; }
  .help-item:last-child { border-bottom:none; padding-bottom:0; }
  .help-item:first-child { padding-top:0; }
  .help-item:active { background:#FEF9EE; margin:0 -16px; padding-left:16px; padding-right:16px; border-radius:8px; }
  .help-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; color:white; flex-shrink:0; }
  .help-icon.blue { background:#2980B9; }
  .help-icon.green { background:#27AE60; }
  .help-icon.gold { background:var(--gold); }
  .help-icon.red { background:var(--red); }
  .help-info { flex:1; }
  .help-name { font-size:14px; font-weight:600; color:var(--text); }
  .help-desc { font-size:11px; color:var(--text3); margin-top:2px; }
  .help-arrow { color:#C8B8A8; font-size:14px; }

  .feedback-form { background:white; border-radius:16px; padding:16px; margin-top:12px; border:1px solid #F0E8D8; }
  .form-label { font-size:13px; color:var(--text2); margin-bottom:8px; display:block; }
  .form-textarea { width:100%; height:100px; background:var(--bg); border:1.5px solid #EDE0C8; border-radius:12px; padding:12px; font-size:14px; color:var(--text); resize:none; outline:none; font-family:'Noto Sans SC',sans-serif; }
  .form-textarea:focus { border-color:var(--red); }
  .form-textarea::placeholder { color:var(--text3); }
  .form-input { width:100%; padding:12px; background:var(--bg); border:1.5px solid #EDE0C8; border-radius:12px; font-size:14px; color:var(--text); outline:none; margin-bottom:10px; }
  .form-input:focus { border-color:var(--red); }
  .form-input::placeholder { color:var(--text3); }

  .submit-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--red),#A02020); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; margin-top:16px; }
  .submit-btn:active { opacity:0.9; transform:scale(0.98); }

  .contact-card { background:white; border-radius:16px; padding:20px; margin-top:12px; border:1px solid #F0E8D8; text-align:center; }
  .contact-title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:12px; }
  .contact-item { display:flex; align-items:center; justify-content:center; gap:8px; padding:8px 0; font-size:13px; color:var(--text2); }
  .contact-item i { color:var(--red); }

  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width: 100%; background:white; border-top:1px solid #EDE0C8; display:flex; padding:8px 0 20px; box-shadow:0 -4px 20px rgba(44,24,16,0.08); z-index:100; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; text-decoration:none; padding:4px 0; }
  .nav-item i { font-size:20px; color:#BDB0A0; }
  .nav-item span { font-size:10px; color:#BDB0A0; font-weight:500; }
  .nav-item.active i { color:var(--red); }
  .nav-item.active span { color:var(--red); font-weight:700; }
</style>
</head>
<body>
<div class="phone-frame">
  
  <div class="page-header">
    <a href="profile.html" class="back-btn"><i class="fa fa-arrow-left"></i></a>
    <div class="page-title">帮助与反馈</div>
  </div>

  <div class="content">
    <div class="section-title">常见问题</div>
    <div class="help-card">
      <div class="help-item" onclick="showAnswer('q1')">
        <div class="help-icon blue"><i class="fa-solid fa-circle-question"></i></div>
        <div class="help-info">
          <div class="help-name">如何收藏剧目？</div>
          <div class="help-desc">点击剧目详情页的收藏按钮即可</div>
        </div>
        <i class="fa fa-chevron-right help-arrow"></i>
      </div>
      <div class="help-item" onclick="showAnswer('q2')">
        <div class="help-icon green"><i class="fa-solid fa-graduation-cap"></i></div>
        <div class="help-info">
          <div class="help-name">如何开始学习？</div>
          <div class="help-desc">在剧目详情页点击"播放学习"按钮</div>
        </div>
        <i class="fa fa-chevron-right help-arrow"></i>
      </div>
      <div class="help-item" onclick="showAnswer('q3')">
        <div class="help-icon gold"><i class="fa-solid fa-key"></i></div>
        <div class="help-info">
          <div class="help-name">忘记密码怎么办？</div>
          <div class="help-desc">在登录页面点击"忘记密码"找回</div>
        </div>
        <i class="fa fa-chevron-right help-arrow"></i>
      </div>
      <div class="help-item" onclick="showAnswer('q4')">
        <div class="help-icon red"><i class="fa-solid fa-video"></i></div>
        <div class="help-info">
          <div class="help-name">视频无法播放？</div>
          <div class="help-desc">请检查网络连接或尝试刷新</div>
        </div>
        <i class="fa fa-chevron-right help-arrow"></i>
      </div>
    </div>

    <div class="section-title">意见反馈</div>
    <div class="feedback-form">
      <label class="form-label">问题类型</label>
      <input type="text" class="form-input" placeholder="请简要描述问题类型" id="feedbackType">
      <label class="form-label">详细描述</label>
      <textarea class="form-textarea" placeholder="请详细描述您遇到的问题或建议..." id="feedbackContent"></textarea>
      <label class="form-label">联系方式（选填）</label>
      <input type="text" class="form-input" placeholder="手机号或邮箱" id="contact">
      <button class="submit-btn" onclick="submitFeedback()">提交反馈</button>
    </div>

    <div class="contact-card">
      <div class="contact-title">联系我们</div>
      <div class="contact-item"><i class="fa-solid fa-phone"></i> 客服热线：400-888-8888</div>
      <div class="contact-item"><i class="fa-solid fa-envelope"></i> 邮箱：support@dancemaster.com</div>
      <div class="contact-item"><i class="fa-solid fa-clock"></i> 服务时间：周一至周五 9:00-18:00</div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>首页</span></a>
    <a href="repertoire.html" class="nav-item"><i class="fa-solid fa-film"></i><span>剧目</span></a>
    <a href="study.html" class="nav-item"><i class="fa-solid fa-graduation-cap"></i><span>学习</span></a>
    <a href="exam.html" class="nav-item"><i class="fa-solid fa-pen-to-square"></i><span>练习</span></a>
    <a href="profile.html" class="nav-item active"><i class="fa-regular fa-circle-user"></i><span>我的</span></a>
  </div>
</div>

<script>
function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;animation:fadeIn 0.3s';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.animation = 'fadeOut 0.3s'; setTimeout(() => toast.remove(), 300); }, 1500);
}

function showAnswer(q) {
  showToast('查看答案');
}

function submitFeedback() {
  const type = document.getElementById('feedbackType').value;
  const content = document.getElementById('feedbackContent').value;
  if (!type || !content) {
    showToast('请填写完整信息');
    return;
  }
  showToast('反馈已提交，感谢您的建议');
  setTimeout(() => {
    document.getElementById('feedbackType').value = '';
    document.getElementById('feedbackContent').value = '';
    document.getElementById('contact').value = '';
  }, 1500);
}
</script>
<style>
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%,-50%) scale(0.8); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</body>
</html>
