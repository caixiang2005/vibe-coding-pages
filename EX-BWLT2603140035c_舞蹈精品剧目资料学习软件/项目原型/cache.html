<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清除缓存</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #C9A84C; --gold-dark: #A07830; --red: #C0392B; --bg: #FDF8F0; --text: #2C1810; --text2: #6B4C3B; --text3: #9C7B6B; }
  body { font-family: 'Noto Sans SC', sans-serif; background: #E8E0D0; display: flex; justify-content: center; }
  .phone-frame { width: 100%; height: 100vh; background: var(--bg); overflow: hidden; display: flex; flex-direction: column; }
  .status-bar { background: linear-gradient(135deg,#8B1A1A,#C9A84C); color:white; padding:12px 24px 8px; display:flex; justify-content:space-between; align-items:center; font-size:12px; }
  .status-bar .time { font-weight:700; font-size:15px; }
  .status-icons { display:flex; gap:6px; }

  .page-header { background: linear-gradient(135deg,#8B1A1A 0%,#C0392B 50%,#C9A84C 100%); padding:14px 20px 20px; display:flex; align-items:center; gap:14px; }
  .back-btn { width:36px; height:36px; background:rgba(255,255,255,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:16px; text-decoration:none; border:1px solid rgba(255,255,255,0.2); cursor:pointer; }
  .page-title { color:white; font-size:18px; font-weight:700; font-family:'Noto Serif SC',serif; flex:1; }

  .content { flex:1; overflow-y:auto; padding:20px; }
  .content::-webkit-scrollbar { display:none; }

  .stat-card { background:white; border-radius:16px; padding:24px; text-align:center; border:1px solid #F0E8D8); margin-bottom:20px; }
  .stat-num { font-size:48px; font-weight:700; color:var(--red); font-family:'Noto Serif SC',serif; }
  .stat-unit { font-size:16px; color:var(--text3); }
  .stat-label { font-size:13px; color:var(--text3); margin-top:6px; }

  .section-title { font-family:'Noto Serif SC',serif; font-size:14px; font-weight:700; color:var(--text); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .section-title::before { content:''; width:3px; height:14px; background:linear-gradient(to bottom,var(--red),var(--gold)); border-radius:2px; }

  .cache-card { background:white; border-radius:16px; padding:16px; margin-bottom:12px; border:1px solid #F0E8D8; }
  .cache-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #F0E8D8; }
  .cache-item:last-child { border-bottom:none; padding-bottom:0; }
  .cache-item:first-child { padding-top:0; }
  .cache-name { font-size:13px; color:var(--text2); display:flex; align-items:center; gap:8px; }
  .cache-name i { color:var(--text3); width:20px; }
  .cache-size { font-size:13px; color:var(--text); font-weight:500; }

  .clear-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--red),#A02020); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; margin-top:24px; }
  .clear-btn:active { opacity:0.9; transform:scale(0.98); }

  .tip-card { background:#FFF9E6; border-radius:12px; padding:14px; margin-top:16px; display:flex; gap:10px; }
  .tip-card i { color:var(--gold-dark); font-size:18px; flex-shrink:0; margin-top:2px; }
  .tip-text { font-size:12px; color:var(--text2); line-height:1.6; }

  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width: 100%; background:white; border-top:1px solid #EDE0C8; display:flex; padding:8px 0 20px; box-shadow:0 -4px 20px rgba(44,24,16,0.08); z-index:100; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; text-decoration:none; padding:4px 0; }
  .nav-item i { font-size:20px; color:#BDB0A0; }
  .nav-item span { font-size:10px; color:#BDB0A0; font-weight:500; }
  .nav-item.active i { color:var(--red); }
  .nav-item.active span { color:var(--red); font-weight:700; }
</style>
</head>
<body>
<div class="phone-frame">
  
  <div class="page-header">
    <a href="profile.html" class="back-btn"><i class="fa fa-arrow-left"></i></a>
    <div class="page-title">清除缓存</div>
  </div>

  <div class="content">
    <div class="stat-card">
      <div><span class="stat-num" id="cacheSize">23.5</span><span class="stat-unit">MB</span></div>
      <div class="stat-label">当前缓存大小</div>
    </div>

    <div class="section-title">缓存明细</div>
    <div class="cache-card">
      <div class="cache-item">
        <span class="cache-name"><i class="fa-solid fa-image"></i> 图片缓存</span>
        <span class="cache-size">12.3 MB</span>
      </div>
      <div class="cache-item">
        <span class="cache-name"><i class="fa-solid fa-video"></i> 视频缓存</span>
        <span class="cache-size">8.6 MB</span>
      </div>
      <div class="cache-item">
        <span class="cache-name"><i class="fa-solid fa-file-lines"></i> 文档缓存</span>
        <span class="cache-size">1.8 MB</span>
      </div>
      <div class="cache-item">
        <span class="cache-name"><i class="fa-solid fa-database"></i> 数据缓存</span>
        <span class="cache-size">0.8 MB</span>
      </div>
    </div>

    <button class="clear-btn" onclick="clearCache()">
      <i class="fa-solid fa-trash"></i> 一键清除缓存
    </button>

    <div class="tip-card">
      <i class="fa-solid fa-lightbulb"></i>
      <div class="tip-text">
        清理缓存不会影响您的学习记录和收藏内容。清理后需要重新加载图片和视频，建议在WiFi环境下操作。
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>首页</span></a>
    <a href="repertoire.html" class="nav-item"><i class="fa-solid fa-film"></i><span>剧目</span></a>
    <a href="study.html" class="nav-item"><i class="fa-solid fa-graduation-cap"></i><span>学习</span></a>
    <a href="exam.html" class="nav-item"><i class="fa-solid fa-pen-to-square"></i><span>练习</span></a>
    <a href="profile.html" class="nav-item active"><i class="fa-regular fa-circle-user"></i><span>我的</span></a>
  </div>
</div>

<script>
function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;animation:fadeIn 0.3s';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.animation = 'fadeOut 0.3s'; setTimeout(() => toast.remove(), 300); }, 1500);
}

function clearCache() {
  showToast('正在清除缓存...');
  setTimeout(() => {
    document.getElementById('cacheSize').textContent = '0';
    showToast('缓存已清除');
  }, 1500);
}
</script>
<style>
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%,-50%) scale(0.8); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</body>
</html>
