        function getStatusColor(status) {
            const colors = {
                '重大': { bg: 'bg-red-50', border: 'border-red-200', badge: 'bg-red-100 text-red-600', text: 'text-red-600' },
                '一般': { bg: 'bg-orange-50', border: 'border-orange-200', badge: 'bg-orange-100 text-orange-600', text: 'text-orange-600' },
                '跟进': { bg: 'bg-blue-50', border: 'border-blue-200', badge: 'bg-blue-100 text-blue-600', text: 'text-blue-600' },
                '轻微': { bg: 'bg-slate-50', border: 'border-slate-200', badge: 'bg-slate-100 text-slate-600', text: 'text-slate-500' },
                '完成': { bg: 'bg-green-50', border: 'border-green-200', badge: 'bg-green-100 text-green-600', text: 'text-green-600' }
            };
            return colors[status] || colors['轻微'];
        }

        function getProgressColor(progress) {
            if (progress >= 80) return 'bg-blue-500';
            if (progress >= 50) return 'bg-green-500';
            return 'bg-slate-400';
        }

        function getDaysRemaining(endDate) {
            const end = new Date(endDate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            end.setHours(0, 0, 0, 0);
            const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function getDaysOverdue(endDate) {
            const end = new Date(endDate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            end.setHours(0, 0, 0, 0);
            const diff = Math.ceil((today - end) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function getPriorityIcon(status) {
            if (status === '重大') return '<i class="fa-solid fa-circle-exclamation text-red-500"></i>';
            if (status === '一般') return '<i class="fa-solid fa-circle-exclamation text-orange-500"></i>';
            return '<i class="fa-solid fa-circle text-slate-400"></i>';
        }

        function getProgressPhase(progress) {
            if (progress >= 80) return { text: '即将完成', color: 'text-green-600', bg: 'bg-green-50' };
            if (progress >= 50) return { text: '稳步推进', color: 'text-blue-600', bg: 'bg-blue-50' };
            if (progress >= 25) return { text: '正在处理', color: 'text-indigo-600', bg: 'bg-indigo-50' };
            return { text: '刚刚启动', color: 'text-slate-500', bg: 'bg-slate-50' };
        }

        function renderPendingCard(task) {

            const overdueClass = isOverdue ? 'text-red-600' : (daysRemaining <= 2 ? 'text-orange-500' : 'text-slate-500');

            return `

                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center space-x-2">
                            <span class="status-badge ${colors.badge}">${task.status}</span>
                            <span class="text-[10px] text-slate-400 flex items-center">
                                ${getPriorityIcon(task.status)}
                                <span class="ml-1">优先级</span>
                            </span>
                        </div>
                        ${isOverdue ? '<span class="text-[10px] px-2 py-0.5 bg-red-100 text-red-600 font-bold rounded-full">已逾期 ' + daysOverdue + ' 天</span>' : ''}
                    </div>
                    <h6 class="text-sm font-bold text-slate-800 mb-3 leading-snug line-clamp-2">${task.title}</h6>
                    <div class="flex items-center text-[11px] text-slate-500 mb-3 space-x-3">
                        <span class="flex items-center"><i class="fa-solid fa-building mr-1 text-slate-400"></i>${task.project}</span>
                        <span class="flex items-center"><i class="fa-solid fa-user mr-1 text-slate-400"></i>${task.person}</span>
                    </div>
                    <div class="bg-slate-50/80 rounded-lg p-3 mb-3">
                        <div class="flex items-center justify-between text-[11px] ${overdueClass}">
                            <span class="flex items-center">
                                <i class="fa-solid fa-calendar mr-1"></i>
                                ${isOverdue ? '逾期 ' + daysOverdue + ' 天' : (daysRemaining === 0 ? '今天到期' : '剩余 ' + daysRemaining + ' 天')}

                            <span>截止：${task.endDate}</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between pt-2 border-t border-slate-100">
                        <span class="text-[10px] text-slate-400">
                            <i class="fa-solid fa-clock mr-1"></i>发现于 ${task.startDate}

                        <button onclick="event.stopPropagation(); quickAssign(${task.id})" class="text-[11px] text-[#005792] font-semibold hover:underline flex items-center">
                            <i class="fa-solid fa-paper-plane mr-1"></i>立即分派
                        </button>
                    </div>
                </div>`;
        }

        function renderProcessingCard(task) {

        function renderContent() {
            const content = document.getElementById('taskContent');

            if (currentTab === 'all') {
                html = `

                            </div>
                        </div>
                        <div class="glass-card rounded-2xl overflow-hidden">

                                    <i class="fa-solid fa-check-circle text-green-500 mr-2"></i>
                                    已完成任务
                                    <span class="ml-2 px-2 py-0.5 bg-green-100 text-green-600 text-[10px] rounded-full">${allTasks.completed.length} 项</span>

                                <span class="text-[11px] text-slate-500">近30天完成 ${allTasks.completed.length} 项</span>

                            </div>

                    </div>`;
            } else if (currentTab === 'pending') {

                    </div>`;
            } else if (currentTab === 'processing') {

                                <span class="ml-2 px-2 py-0.5 bg-blue-100 text-blue-600 text-[10px] rounded-full">${allTasks.processing.length} 项</span>
                                <span class="ml-auto text-[11px] text-slate-500 font-normal">跟踪整改进展</span>
                            </h5>
                        </div>
                        <div class="p-4">
                            ${allTasks.processing.length > 0 ? '<div class="card-grid">' + allTasks.processing.map(t => renderProcessingCard(t)).join('') + '</div>' : renderEmptyState('暂无处理中任务')}
                        </div>
                    </div>`;
            } else if (currentTab === 'completed') {
                html = `

                        <div class="p-4 border-b border-slate-100 bg-gradient-to-r from-green-50 to-emerald-50">

                        <div class="p-4">
                            ${allTasks.completed.length > 0 ? allTasks.completed.map(t => renderCompletedCard(t)).join('') : renderEmptyState('暂无已完成任务')}

        function updateCounts() {
            const total = allTasks.pending.length + allTasks.processing.length + allTasks.completed.length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = allTasks.pending.length;
            document.getElementById('processingCount').textContent = allTasks.processing.length;
            document.getElementById('completedCount').textContent = allTasks.completed.length;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            renderContent();
        }

        function openDetailModal(task) {
            selectedTaskData = task;
            document.getElementById('detailTitle').textContent = task.title;
            document.getElementById('detailProject').innerHTML = '<i class="fa-solid fa-building mr-1"></i>所属项目：' + task.project;
            document.getElementById('detailPerson').textContent = task.person;
            document.getElementById('detailStart').textContent = task.startDate;
            document.getElementById('detailEnd').textContent = task.endDate;
            document.getElementById('detailState').textContent = task.state;
            document.getElementById('detailDesc').textContent = task.desc;

            const statusEl = document.getElementById('detailStatus');
            const colors = getStatusColor(task.status);
            statusEl.className = 'status-badge ' + colors.badge;
            statusEl.textContent = task.status;

            const levelEl = document.getElementById('detailLevel');
            if (task.state === '已完成') {
                levelEl.textContent = '已完成';
                document.getElementById('detailProgressArea').classList.add('hidden');
                document.getElementById('detailFooter').classList.remove('hidden');
                document.getElementById('detailActionBtn').classList.add('hidden');
            } else if (task.state === '处理中') {
                levelEl.textContent = '处理中';
                document.getElementById('detailProgressArea').classList.remove('hidden');
                document.getElementById('detailProgressBar').style.width = task.progress + '%';
                document.getElementById('detailProgressBar').className = getProgressColor(task.progress) + ' h-2 rounded-full transition-all';
                document.getElementById('detailProgressText').textContent = task.progress + '%';
                document.getElementById('detailFooter').classList.remove('hidden');
                document.getElementById('detailActionBtn').classList.add('hidden');
            } else {
                levelEl.textContent = '待分派';
                document.getElementById('detailProgressArea').classList.add('hidden');
                document.getElementById('detailFooter').classList.remove('hidden');
                document.getElementById('detailActionBtn').classList.remove('hidden');
                document.getElementById('detailActionBtn').textContent = '分派任务';
                document.getElementById('detailActionBtn').onclick = assignTask;
            }

            document.getElementById('detailModal').classList.remove('hidden');
            isDraggingDetail = false;
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function assignTask() {
            if (!selectedTaskData) return;
            alert('任务分派成功！\n\n任务：' + selectedTaskData.title + '\n责任人：' + selectedTaskData.person + '\n\n已发送分派通知给相关人员。');
            closeDetailModal();
        }

        function quickAssign(taskId) {
            const task = allTasks.pending.find(t => t.id === taskId);
            if (task) {
                alert('任务分派成功！\n\n任务：' + task.title + '\n责任人：' + task.person + '\n\n已发送分派通知。');
            }
        }

        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            isDraggingAdd = false;
            document.getElementById('addTitle').value = '';
            document.getElementById('addLevel').value = '';
            document.getElementById('addProject').value = '';
            document.getElementById('addPerson').value = '';
            document.getElementById('addStartDate').value = '';
            document.getElementById('addEndDate').value = '';
            document.getElementById('addDesc').value = '';
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
        }

        function submitAdd() {
            const title = document.getElementById('addTitle').value.trim();
            const level = document.getElementById('addLevel').value;
            const project = document.getElementById('addProject').value;
            const person = document.getElementById('addPerson').value.trim();
            const startDate = document.getElementById('addStartDate').value;
            const endDate = document.getElementById('addEndDate').value;

            if (!title) { alert('请输入问题标题！'); return; }
            if (!level) { alert('请选择紧急程度！'); return; }
            if (!project) { alert('请选择所属项目！'); return; }
            if (!person) { alert('请输入责任人！'); return; }
            if (!startDate) { alert('请选择发现日期！'); return; }
            if (!endDate) { alert('请选择截止日期！'); return; }
            if (new Date(startDate) > new Date(endDate)) { alert('截止日期不能早于发现日期！'); return; }

            alert('任务提交成功！\n\n问题标题：' + title + '\n紧急程度：' + level + '\n所属项目：' + project + '\n责任人：' + person + '\n发现日期：' + startDate + '\n截止日期：' + endDate);
            closeAddModal();
        }

        function openFilterModal() {
            document.getElementById('filterModal').classList.remove('hidden');
            isDraggingFilter = false;
        }

        function closeFilterModal() {
            document.getElementById('filterModal').classList.add('hidden');
        }

        function resetFilter() {
            document.getElementById('filterMajor').checked = true;
            document.getElementById('filterGeneral').checked = true;
            document.getElementById('filterMinor').checked = true;
            document.getElementById('filterProject').value = '';
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            document.getElementById('filterSort').value = 'deadline';
            document.getElementById('filterStatus').textContent = '筛选';
        }

        function applyFilter() {
            const major = document.getElementById('filterMajor').checked;
            const general = document.getElementById('filterGeneral').checked;
            const minor = document.getElementById('filterMinor').checked;
            const project = document.getElementById('filterProject').value;
            const hasFilter = (!major || !general || !minor || project || document.getElementById('filterStartDate').value || document.getElementById('filterEndDate').value);

            document.getElementById('filterStatus').textContent = hasFilter ? '已筛选' : '筛选';
            alert('筛选条件已应用！\n\n紧急程度：' + (major ? '重大 ' : '') + (general ? '一般 ' : '') + (minor ? '轻微' : '') + '\n项目：' + (project || '全部') + '\n排序：' + (document.getElementById('filterSort').value === 'deadline' ? '按截止日期' : (document.getElementById('filterSort').value === 'priority' ? '按紧急程度' : '按发现时间')));
            closeFilterModal();
        }

        document.getElementById('addModalHeader').addEventListener('mousedown', function(e) {
            isDraggingAdd = true;
            addOffsetX = e.clientX - this.parentElement.getBoundingClientRect().left;
            addOffsetY = e.clientY - this.parentElement.getBoundingClientRect().top;
        });

        document.getElementById('detailModalHeader').addEventListener('mousedown', function(e) {
            isDraggingDetail = true;
            detailOffsetX = e.clientX - this.parentElement.getBoundingClientRect().left;
            detailOffsetY = e.clientY - this.parentElement.getBoundingClientRect().top;
        });

        document.getElementById('filterModalHeader').addEventListener('mousedown', function(e) {
            isDraggingFilter = true;
            filterOffsetX = e.clientX - this.parentElement.getBoundingClientRect().left;
            filterOffsetY = e.clientY - this.parentElement.getBoundingClientRect().top;
        });

        document.addEventListener('mousemove', function(e) {
            if (isDraggingAdd) {
                const modal = document.querySelector('#addModal .modal-box');
                modal.style.margin = '0';
                modal.style.position = 'fixed';
                modal.style.left = (e.clientX - addOffsetX) + 'px';
                modal.style.top = (e.clientY - addOffsetY) + 'px';
            }
            if (isDraggingDetail) {
                const modal = document.querySelector('#detailModal .modal-box');
                modal.style.margin = '0';
                modal.style.position = 'fixed';
                modal.style.left = (e.clientX - detailOffsetX) + 'px';
                modal.style.top = (e.clientY - detailOffsetY) + 'px';
            }
            if (isDraggingFilter) {
                const modal = document.querySelector('#filterModal .modal-box');
                modal.style.margin = '0';
                modal.style.position = 'fixed';
                modal.style.left = (e.clientX - filterOffsetX) + 'px';
                modal.style.top = (e.clientY - filterOffsetY) + 'px';
            }
        });

        document.addEventListener('mouseup', function() {
            isDraggingAdd = false;
            isDraggingDetail = false;
            isDraggingFilter = false;
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            if (!keyword) {
                renderContent();
                return;
            }
            const filtered = {
                pending: allTasks.pending.filter(t => t.title.toLowerCase().includes(keyword) || t.person.includes(keyword)),
                processing: allTasks.processing.filter(t => t.title.toLowerCase().includes(keyword) || t.person.includes(keyword)),
                completed: allTasks.completed.filter(t => t.title.toLowerCase().includes(keyword) || t.person.includes(keyword))
            };
            const content = document.getElementById('taskContent');
            let html = '';
            if (currentTab === 'all') {
                html = `
                    <div class="space-y-5">
                        <div class="glass-card rounded-2xl overflow-hidden">
                            <div class="p-4 border-b border-slate-100 bg-gradient-to-r from-red-50 to-orange-50">
                                <h5 class="text-sm font-bold text-slate-800 flex items-center">
                                    <i class="fa-solid fa-circle-exclamation text-red-500 mr-2"></i>
                                    待分派任务
                                    <span class="ml-2 px-2 py-0.5 bg-red-100 text-red-600 text-[10px] rounded-full">${filtered.pending.length} 项</span>
                                </h5>
                            </div>
                            <div class="p-4">
                                ${filtered.pending.length > 0 ? '<div class="card-grid">' + filtered.pending.map(t => renderPendingCard(t)).join('') + '</div>' : renderEmptyState('无匹配结果')}
                            </div>
                        </div>
                        <div class="glass-card rounded-2xl overflow-hidden">
                            <div class="p-4 border-b border-slate-100 bg-gradient-to-r from-blue-50 to-indigo-50">
                                <h5 class="text-sm font-bold text-slate-800 flex items-center">
                                    <i class="fa-solid fa-spinner fa-spin text-blue-500 mr-2"></i>
                                    处理中任务
                                    <span class="ml-2 px-2 py-0.5 bg-blue-100 text-blue-600 text-[10px] rounded-full">${filtered.processing.length} 项</span>
                                </h5>
                            </div>
                            <div class="p-4">
                                ${filtered.processing.length > 0 ? '<div class="card-grid">' + filtered.processing.map(t => renderProcessingCard(t)).join('') + '</div>' : renderEmptyState('无匹配结果')}
                            </div>
                        </div>
                        <div class="glass-card rounded-2xl overflow-hidden">
                            <div class="p-4 border-b border-slate-100 bg-gradient-to-r from-green-50 to-emerald-50">
                                <h5 class="text-sm font-bold text-slate-800 flex items-center">
                                    <i class="fa-solid fa-check-circle text-green-500 mr-2"></i>
                                    已完成任务
                                    <span class="ml-2 px-2 py-0.5 bg-green-100 text-green-600 text-[10px] rounded-full">${filtered.completed.length} 项</span>
                                </h5>
                            </div>
                            <div class="p-4 max-h-[200px] overflow-y-auto">
                                ${filtered.completed.length > 0 ? filtered.completed.map(t => renderCompletedCard(t)).join('') : renderEmptyState('无匹配结果')}
                            </div>
                        </div>
                    </div>`;
            } else if (currentTab === 'pending') {
                html = `
                    <div class="glass-card rounded-2xl overflow-hidden">
                        <div class="p-4 border-b border-slate-100 bg-gradient-to-r from-red-50 to-orange-50">
                            <h5 class="text-sm font-bold text-slate-800 flex items-center">
                                <i class="fa-solid fa-circle-exclamation text-red-500 mr-2"></i>
                                待分派任务
                                <span class="ml-2 px-2 py-0.5 bg-red-100 text-red-600 text-[10px] rounded-full">${filtered.pending.length} 项</span>
                            </h5>
                        </div>
                        <div class="p-4">
                            ${filtered.pending.length > 0 ? '<div class="card-grid">' + filtered.pending.map(t => renderPendingCard(t)).join('') + '</div>' : renderEmptyState('无匹配结果')}
                        </div>
                    </div>`;
            } else if (currentTab === 'processing') {
                html = `
                    <div class="glass-card rounded-2xl overflow-hidden">
                        <div class="p-4 border-b border-slate-100 bg-gradient-to-r from-blue-50 to-indigo-50">
                            <h5 class="text-sm font-bold text-slate-800 flex items-center">
                                <i class="fa-solid fa-spinner fa-spin text-blue-500 mr-2"></i>
                                处理中任务
                                <span class="ml-2 px-2 py-0.5 bg-blue-100 text-blue-600 text-[10px] rounded-full">${filtered.processing.length} 项</span>
                            </h5>
                        </div>
                        <div class="p-4">
                            ${filtered.processing.length > 0 ? '<div class="card-grid">' + filtered.processing.map(t => renderProcessingCard(t)).join('') + '</div>' : renderEmptyState('无匹配结果')}
                        </div>
                    </div>`;
            } else if (currentTab === 'completed') {
                html = `
                    <div class="glass-card rounded-2xl overflow-hidden">
                        <div class="p-4 border-b border-slate-100 bg-gradient-to-r from-green-50 to-emerald-50">
                            <h5 class="text-sm font-bold text-slate-800 flex items-center">
                                <i class="fa-solid fa-check-circle text-green-500 mr-2"></i>
                                已完成任务
                                <span class="ml-2 px-2 py-0.5 bg-green-100 text-green-600 text-[10px] rounded-full">${filtered.completed.length} 项</span>
                            </h5>
                        </div>
                        <div class="p-4">
                            ${filtered.completed.length > 0 ? filtered.completed.map(t => renderCompletedCard(t)).join('') : renderEmptyState('无匹配结果')}
                        </div>
                    </div>`;
            }
            content.innerHTML = html;
        });

        window.addEventListener('load', function() {
            updateCounts();
            renderContent();
        });
    </script>
</body>
</html>
