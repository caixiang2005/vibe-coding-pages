<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>用户管理 - 短视频素材剪接合成制作管理平台</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --window-bg: rgba(20, 20, 22, 0.92);
            --sidebar-bg: rgba(26, 26, 28, 0.92);
            --surface: rgba(34, 34, 38, 0.72);
            --surface-2: rgba(46, 46, 50, 0.76);
            --border: rgba(255, 255, 255, 0.10);
            --text: rgba(255, 255, 255, 0.92);
            --text-2: rgba(255, 255, 255, 0.68);
            --text-3: rgba(255, 255, 255, 0.42);
            --accent: #3b82f6;
            --accent-2: #60a5fa;
            --danger: #ff5f57;
            --warn: #febc2e;
            --ok: #28c840;
            --radius-xl: 18px;
            --radius-lg: 14px;
            --shadow-window: 0 30px 110px rgba(0, 0, 0, 0.62);
            --ring: 0 0 0 1px rgba(255, 255, 255, 0.12), 0 0 0 4px rgba(59, 130, 246, 0.18);
        }

        body {
            background: url('./bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
        }

        .app-shell { min-height: 100vh; display: flex; }
        .app-window {
            width: 100%;
            min-height: 100vh;
            background: var(--window-bg);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(22px) saturate(1.15);
        }

        .titlebar {
            height: 46px;
            background: rgba(12, 12, 12, 0.92);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 14px;
        }

        .traffic-lights { display: flex; gap: 8px; }
        .traffic-light { width: 12px; height: 12px; border-radius: 999px; }
        .traffic-light.red { background: var(--danger); }
        .traffic-light.yellow { background: var(--warn); }
        .traffic-light.green { background: var(--ok); }

        .titlebar-center { position: absolute; left: 50%; transform: translateX(-50%); }
        .app-title { display: flex; align-items: center; gap: 10px; font-weight: 650; font-size: 13px; color: var(--text-2); }

        .titlebar-right { margin-left: auto; display: flex; gap: 10px; }

        .btn {
            height: 34px;
            padding: 0 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 120ms ease, background 120ms ease;
        }
        .btn:hover { background: var(--surface-2); }
        .btn:active { transform: translateY(1px); }
        .btn-primary {
            border-color: rgba(59, 130, 246, 0.55);
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.92), rgba(37, 99, 235, 0.92));
            color: white;
        }
        .btn-danger {
            border-color: rgba(239, 68, 68, 0.55);
            background: linear-gradient(180deg, rgba(239, 68, 68, 0.92), rgba(220, 38, 38, 0.92));
            color: white;
        }
        .btn-sm { height: 28px; font-size: 11px; padding: 0 10px; }

        .app-body { flex: 1; display: flex; }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-header { padding: 8px; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.95), rgba(168, 85, 247, 0.75));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .brand-name { font-weight: 700; font-size: 13px; color: var(--text); line-height: 1.3; }

        .nav-group-title { padding: 10px 10px 6px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; color: var(--text-3); }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 10px;
            border-radius: 12px;
            color: var(--text-2);
            text-decoration: none;
            transition: background 120ms ease, color 120ms ease;
        }
        .nav-item:hover { background: var(--surface); color: var(--text); }
        .nav-item.active { background: rgba(59, 130, 246, 0.16); border: 1px solid rgba(59, 130, 246, 0.35); color: rgba(96, 165, 250, 0.95); }
        .nav-item i { width: 18px; text-align: center; }

        .content { flex: 1; display: flex; flex-direction: column; }
        .content-toolbar {
            padding: 16px 18px 12px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .content-title h2 { font-size: 18px; font-weight: 800; color: var(--text); }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            width: 260px;
        }
        .search-box input { background: transparent; border: none; outline: none; width: 100%; font-size: 13px; color: var(--text); }
        .search-box input::placeholder { color: var(--text-3); }

        .scroll-area { flex: 1; overflow: auto; padding: 18px; }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .stat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .stat-icon.blue { background: rgba(59, 130, 246, 0.18); color: rgba(96, 165, 250, 0.95); }
        .stat-icon.green { background: rgba(34, 197, 94, 0.18); color: rgba(74, 222, 128, 0.95); }
        .stat-icon.orange { background: rgba(249, 115, 22, 0.18); color: rgba(251, 146, 60, 0.95); }
        .stat-icon.purple { background: rgba(168, 85, 247, 0.18); color: rgba(217, 70, 239, 0.95); }
        .stat-info h4 { font-size: 22px; font-weight: 800; color: var(--text); }
        .stat-info p { font-size: 12px; color: var(--text-3); margin-top: 2px; }

        .users-table {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 60px 1fr 180px 140px 140px 120px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 800;
            color: var(--text-3);
            letter-spacing: 0.5px;
        }

        .table-row {
            display: grid;
            grid-template-columns: 60px 1fr 180px 140px 140px 120px;
            padding: 14px 16px;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 120ms ease;
        }
        .table-row:hover { background: rgba(255,255,255,0.03); }
        .table-row:last-child { border-bottom: none; }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
        }

        .user-info h4 { font-size: 13px; font-weight: 700; color: var(--text); }
        .user-info p { font-size: 11px; color: var(--text-3); margin-top: 2px; }

        .user-role {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .role-admin { background: rgba(239, 68, 68, 0.15); color: rgba(248, 113, 113, 0.95); }
        .role-editor { background: rgba(59, 130, 246, 0.15); color: rgba(96, 165, 250, 0.95); }
        .role-viewer { background: rgba(107, 114, 128, 0.15); color: rgba(156, 163, 175, 0.95); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-active::before { background: var(--ok); }
        .status-inactive::before { background: var(--text-3); }

        .action-btns { display: flex; gap: 6px; }
        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 120ms ease;
        }
        .action-btn:hover { background: var(--surface); color: var(--text); }
        .action-btn.edit:hover { border-color: rgba(59, 130, 246, 0.5); color: var(--accent); }
        .action-btn.delete:hover { border-color: rgba(239, 68, 68, 0.5); color: var(--danger); }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            border-top: 1px solid var(--border);
        }
        .page-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 120ms ease;
        }
        .page-btn:hover { background: var(--surface); color: var(--text); }
        .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--window-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            width: 440px;
            max-width: 90vw;
        }

        .modal-header {
            height: 52px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            cursor: move;
        }
        .modal-title { font-size: 14px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .modal-close { width: 28px; height: 28px; border-radius: 8px; border: none; background: transparent; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--surface); }

        .modal-body { padding: 18px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--text-2); margin-bottom: 6px; }
        .form-input {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            outline: none;
        }
        .form-input:focus { border-color: rgba(59, 130, 246, 0.5); box-shadow: var(--ring); }
        .form-select {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .modal-footer {
            padding: 14px 18px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: transform 300ms ease, opacity 300ms ease;
            z-index: 1001;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(40, 200, 64, 0.4); }
        .toast.success i { color: var(--ok); }
        .toast.error { border-color: rgba(239, 68, 68, 0.4); }
        .toast.error i { color: var(--danger); }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.16); border-radius: 999px; }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="app-window">
            <div class="titlebar">
                <div class="traffic-lights">
                    <div class="traffic-light red"></div>
                    <div class="traffic-light yellow"></div>
                    <div class="traffic-light green"></div>
                </div>
                <div class="titlebar-center">
                    <div class="app-title">
                        <i class="fas fa-users" style="color: var(--accent);"></i>
                        用户管理
                    </div>
                </div>
                <div class="titlebar-right">
                    <button class="btn btn-primary" onclick="openModal('addUserModal')">
                        <i class="fas fa-user-plus"></i> 添加用户
                    </button>
                </div>
            </div>

            <div class="app-body">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <div class="brand">
                            <div class="brand-icon"><i class="fas fa-film"></i></div>
                            <div class="brand-name">短视频素材剪接合成<br>制作管理平台</div>
                        </div>
                    </div>

                    <div class="nav-group-title">导航</div>
                    <a href="dashboard.html" class="nav-item"><i class="fas fa-desktop"></i> <span>工作台</span></a>
                    <a href="media_library.html" class="nav-item"><i class="fas fa-photo-video"></i> <span>素材库</span></a>
                    <a href="projects.html" class="nav-item"><i class="fas fa-folder-open"></i> <span>项目管理</span></a>
                    <a href="export.html" class="nav-item"><i class="fas fa-file-export"></i> <span>导出设置</span></a>

                    <div class="nav-group-title">系统</div>
                    <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i> <span>系统设置</span></a>
                    <a href="users.html" class="nav-item active"><i class="fas fa-users"></i> <span>用户管理</span></a>
                </div>

                <div class="content">
                    <div class="content-toolbar">
                        <div class="content-title"><h2>用户管理</h2></div>
                        <div class="search-box">
                            <i class="fas fa-search" style="color: var(--text-3);"></i>
                            <input type="text" placeholder="搜索用户..." />
                        </div>
                    </div>

                    <div class="scroll-area">
                        <div class="stats-row">
                            <div class="stat-card">
                                <div class="stat-icon blue"><i class="fas fa-users"></i></div>
                                <div class="stat-info"><h4>12</h4><p>总用户数</p></div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon green"><i class="fas fa-user-check"></i></div>
                                <div class="stat-info"><h4>10</h4><p>活跃用户</p></div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon orange"><i class="fas fa-user-edit"></i></div>
                                <div class="stat-info"><h4>5</h4><p>编辑者</p></div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon purple"><i class="fas fa-user-shield"></i></div>
                                <div class="stat-info"><h4>2</h4><p>管理员</p></div>
                            </div>
                        </div>

                        <div class="users-table">
                            <div class="table-header">
                                <div>头像</div>
                                <div>用户信息</div>
                                <div>角色</div>
                                <div>状态</div>
                                <div>最后登录</div>
                                <div>操作</div>
                            </div>
                            <div id="usersTable"></div>
                            <div class="pagination">
                                <button class="page-btn"><i class="fas fa-chevron-left"></i></button>
                                <button class="page-btn active">1</button>
                                <button class="page-btn">2</button>
                                <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addUserModal">
        <div class="modal">
            <div class="modal-header" id="addUserModalHeader">
                <div class="modal-title"><i class="fas fa-user-plus" style="color: var(--accent);"></i> 添加用户</div>
                <button class="modal-close" onclick="closeModal('addUserModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="newUserName" placeholder="输入用户名" />
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="newUserEmail" placeholder="输入邮箱地址" />
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select class="form-select" id="newUserRole">
                        <option value="viewer">查看者</option>
                        <option value="editor">编辑者</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('addUserModal')">取消</button>
                <button class="btn btn-primary" onclick="addUser()">
                    <i class="fas fa-check"></i> 添加
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editUserModal">
        <div class="modal">
            <div class="modal-header" id="editUserModalHeader">
                <div class="modal-title"><i class="fas fa-user-edit" style="color: var(--accent);"></i> 编辑用户</div>
                <button class="modal-close" onclick="closeModal('editUserModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUserId" />
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="editUserName" />
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="editUserEmail" />
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select class="form-select" id="editUserRole">
                        <option value="viewer">查看者</option>
                        <option value="editor">编辑者</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('editUserModal')">取消</button>
                <button class="btn btn-primary" onclick="saveUser()">
                    <i class="fas fa-save"></i> 保存
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">操作成功</span>
    </div>

    <script>
        const users = [
            { id: 1, name: '梁秀华', email: 'liangxiuhua@email.com', role: 'admin', status: 'active', lastLogin: '2026-03-18 13:24', initials: '梁' },
            { id: 2, name: '李明', email: 'liming@email.com', role: 'editor', status: 'active', lastLogin: '2026-03-18 10:15', initials: '李' },
            { id: 3, name: '王芳', email: 'wangfang@email.com', role: 'editor', status: 'active', lastLogin: '2026-03-17 16:30', initials: '王' },
            { id: 4, name: '张伟', email: 'zhangwei@email.com', role: 'viewer', status: 'active', lastLogin: '2026-03-16 09:45', initials: '张' },
            { id: 5, name: '刘洋', email: 'liuyang@email.com', role: 'editor', status: 'active', lastLogin: '2026-03-15 14:20', initials: '刘' },
            { id: 6, name: '陈静', email: 'chenjing@email.com', role: 'viewer', status: 'inactive', lastLogin: '2026-03-10 11:00', initials: '陈' },
        ];

        const roleNames = { admin: '管理员', editor: '编辑者', viewer: '查看者' };

        function renderUsers() {
            const table = document.getElementById('usersTable');
            table.innerHTML = users.map(u => `
                <div class="table-row">
                    <div class="user-avatar">${u.initials}</div>
                    <div class="user-info">
                        <h4>${u.name}</h4>
                        <p>${u.email}</p>
                    </div>
                    <div><span class="user-role role-${u.role}">${roleNames[u.role]}</span></div>
                    <div><span class="status-badge status-${u.status}">${u.status === 'active' ? '在线' : '离线'}</span></div>
                    <div style="font-size: 12px; color: var(--text-3);">${u.lastLogin}</div>
                    <div class="action-btns">
                        <button class="action-btn edit" onclick="editUser(${u.id})" title="编辑"><i class="fas fa-pen"></i></button>
                        <button class="action-btn delete" onclick="deleteUser(${u.id})" title="删除"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); document.body.style.overflow = ''; }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function addUser() {
            const name = document.getElementById('newUserName').value;
            const email = document.getElementById('newUserEmail').value;
            const role = document.getElementById('newUserRole').value;
            if (!name || !email) { showToast('请填写完整信息', 'error'); return; }
            users.push({ id: Date.now(), name, email, role, status: 'active', lastLogin: '从未', initials: name[0] });
            renderUsers();
            closeModal('addUserModal');
            showToast('用户添加成功');
            document.getElementById('newUserName').value = '';
            document.getElementById('newUserEmail').value = '';
        }

        function editUser(id) {
            const u = users.find(x => x.id === id);
            document.getElementById('editUserId').value = id;
            document.getElementById('editUserName').value = u.name;
            document.getElementById('editUserEmail').value = u.email;
            document.getElementById('editUserRole').value = u.role;
            openModal('editUserModal');
        }

        function saveUser() {
            const id = parseInt(document.getElementById('editUserId').value);
            const u = users.find(x => x.id === id);
            u.name = document.getElementById('editUserName').value;
            u.email = document.getElementById('editUserEmail').value;
            u.role = document.getElementById('editUserRole').value;
            u.initials = u.name[0];
            renderUsers();
            closeModal('editUserModal');
            showToast('用户信息已更新');
        }

        function deleteUser(id) {
            const u = users.find(x => x.id === id);
            if (confirm('确定要删除用户 "' + u.name + '" 吗？')) {
                const idx = users.findIndex(x => x.id === id);
                users.splice(idx, 1);
                renderUsers();
                showToast('用户已删除');
            }
        }

        document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); }));

        function initDragModal(modalId, headerId) {
            const modal = document.getElementById(modalId), header = document.getElementById(headerId);
            let isDragging = false, offsetX, offsetY;
            header.addEventListener('mousedown', e => {
                if (e.target.closest('.modal-close')) return;
                isDragging = true;
                offsetX = e.clientX - modal.offsetLeft;
                offsetY = e.clientY - modal.offsetTop;
                modal.style.transition = 'none';
            });
            document.addEventListener('mousemove', e => { if (isDragging) { modal.style.left = (e.clientX - offsetX) + 'px'; modal.style.top = (e.clientY - offsetY) + 'px'; }});
            document.addEventListener('mouseup', () => { isDragging = false; modal.style.transition = ''; });
        }

        initDragModal('addUserModal', 'addUserModalHeader');
        initDragModal('editUserModal', 'editUserModalHeader');

        renderUsers();
    </script>
</body>
</html>
