<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>我的 - 依托人工智能大模型的大学生就业指导服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #f0f2f5; overscroll-behavior: none; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .android-status-bar { height: env(safe-area-inset-top, 0px); min-height: 24px; background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0)); }
        .android-container { width: 100%; max-width: 480px; height: 100vh; max-height: 926px; margin: 0 auto; background: #f0f2f5; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .nav-active { color: #1976d2; }
        .ripple { position: relative; overflow: hidden; }
        .ripple::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; background-image: radial-gradient(circle, rgba(25, 118, 210, 0.15) 10%, transparent 10%); background-repeat: no-repeat; background-position: 50% 50%; transform: scale(0); opacity: 0; transition: transform 0.4s ease-out, opacity 0.4s ease-out; }
        .ripple:active::after { transform: scale(2); opacity: 1; transition: 0s; }
        .card-touch { transition: all 0.15s ease-out; }
        .card-touch:active { transform: scale(0.98); background-color: #f5f5f5; }
        .btn-touch { transition: all 0.1s ease-out; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.9; }
        .tab-ripple::after { background-image: radial-gradient(circle, rgba(25, 118, 210, 0.2) 10%, transparent 10%); }
        .android-nav-bar { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
</head>
<body>
    <div class="android-status-bar"></div>
    <div class="android-container flex flex-col">
        <div class="flex-1 overflow-y-auto hide-scrollbar overscroll-contain pb-16">
            <div class="px-4 pt-2 pb-4 bg-gradient-to-br from-indigo-700 via-blue-700 to-indigo-700 rounded-b-[28px] shadow-lg">
                <h1 class="text-white text-lg font-bold mb-3 leading-relaxed">我的</h1>
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <img alt="User Avatar" class="w-14 h-14 rounded-full border-2 border-white/50 object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-03-19/95c0a599be5e4e56ac90c26969ab648f.jpg" />
                        <div class="text-white">
                            <p class="text-lg font-bold">龚翔</p>
                            <p class="text-xs text-blue-100">华南理工大学 · 计算机科学 · 2026届</p>
                            <div class="mt-1 flex items-center space-x-2">
                                <span class="text-[10px] bg-yellow-300 text-yellow-900 px-1.5 py-0.5 rounded-full">VIP 学员</span>
                                <span class="text-[10px] bg-white/20 px-1.5 py-0.5 rounded-full">已连续活跃 23 天</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-4">
                    <div class="bg-white/10 rounded-xl p-2.5 border border-white/10">
                        <p class="text-[10px] text-blue-100">累计投递</p>
                        <p class="text-white text-sm font-bold mt-1">58</p>
                    </div>
                    <div class="bg-white/10 rounded-xl p-2.5 border border-white/10">
                        <p class="text-[10px] text-blue-100">面试完成</p>
                        <p class="text-white text-sm font-bold mt-1">11</p>
                    </div>
                    <div class="bg-white/10 rounded-xl p-2.5 border border-white/10">
                        <p class="text-[10px] text-blue-100">Offer数量</p>
                        <p class="text-white text-sm font-bold mt-1">2</p>
                    </div>
                </div>
            </div>

            <div class="px-4 pt-4">
                <a href="application-status.html" class="card-touch block bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-4">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-[14px] font-bold text-gray-800">求职进行中</h3>
                        <div class="flex items-center gap-2">
                            <span class="text-[11px] text-blue-600 font-medium">查看全部</span>
                            <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                        </div>
                    </div>
                    <div class="space-y-2.5">
                        <div class="flex items-center justify-between bg-gray-50 rounded-xl p-3">
                            <div>
                                <p class="text-[13px] font-semibold text-gray-800">腾讯 · 后端开发工程师</p>
                                <p class="text-[10px] text-gray-500 mt-0.5">流程：在线笔试已提交，等待面试安排</p>
                            </div>
                            <span class="text-[10px] text-green-700 bg-green-50 px-2 py-1 rounded-lg">笔试通过</span>
                        </div>
                        <div class="flex items-center justify-between bg-gray-50 rounded-xl p-3">
                            <div>
                                <p class="text-[13px] font-semibold text-gray-800">百度 · 大模型算法实习生</p>
                                <p class="text-[10px] text-gray-500 mt-0.5">流程：一面已结束，等待面评反馈</p>
                            </div>
                            <span class="text-[10px] text-orange-700 bg-orange-50 px-2 py-1 rounded-lg">待反馈</span>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex items-center justify-between py-2 border-b border-gray-100">
                            <div class="flex items-center space-x-2">
                                <span class="iconify text-lg text-gray-500" data-icon="material-symbols:article-outline"></span>
                                <span class="text-[13px] text-gray-700">我的简历（V6）</span>
                            </div>
                            <span class="text-[11px] text-blue-600">更新于 今天 09:40</span>
                        </div>
                        <div class="flex items-center justify-between py-2 border-b border-gray-100">
                            <div class="flex items-center space-x-2">
                                <span class="iconify text-lg text-gray-500" data-icon="material-symbols:folder-open-outline"></span>
                                <span class="text-[13px] text-gray-700">作品集（3份）</span>
                            </div>
                            <span class="text-[11px] text-gray-500">最近上传 2 天前</span>
                        </div>
                        <div class="flex items-center justify-between py-2">
                            <div class="flex items-center space-x-2">
                                <span class="iconify text-lg text-gray-500" data-icon="material-symbols:verified-user-outline-rounded"></span>
                                <span class="text-[13px] text-gray-700">学历认证状态</span>
                            </div>
                            <span class="text-[11px] text-green-600">已通过</span>
                        </div>
                    </div>
                </a>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 mb-4">
                    <a href="notify-settings.html" class="card-touch flex items-center justify-between py-3 px-4 border-b border-gray-100 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <div class="w-9 h-9 bg-blue-50 rounded-lg flex items-center justify-center">
                                <span class="iconify text-blue-600 text-lg" data-icon="material-symbols:notifications-outline"></span>
                            </div>
                            <span class="text-[14px] text-gray-800">消息通知</span>
                        </div>
                        <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                    </a>
                    <a href="privacy-settings.html" class="card-touch flex items-center justify-between py-3 px-4 border-b border-gray-100 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <div class="w-9 h-9 bg-purple-50 rounded-lg flex items-center justify-center">
                                <span class="iconify text-purple-600 text-lg" data-icon="material-symbols:lock-outline"></span>
                            </div>
                            <span class="text-[14px] text-gray-800">隐私设置</span>
                        </div>
                        <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                    </a>
                    <a href="security-settings.html" class="card-touch flex items-center justify-between py-3 px-4 cursor-pointer">
                        <div class="flex items-center space-x-3">
                            <div class="w-9 h-9 bg-green-50 rounded-lg flex items-center justify-center">
                                <span class="iconify text-green-600 text-lg" data-icon="material-symbols:security"></span>
                            </div>
                            <span class="text-[14px] text-gray-800">账号与安全</span>
                        </div>
                        <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                    </a>
                </div>
            </div>
        </div>

        <div class="android-nav-bar absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-200/50 px-2 flex justify-around items-center z-20">
            <a href="./home.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:home-rounded"></span>
                <span class="text-[10px] mt-0.5 font-medium">首页</span>
            </a>
            <a href="./jobs.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:work-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">职位</span>
            </a>
            <div class="relative -mt-6">
                <a href="ai-assistant.html" class="w-14 h-14 bg-gradient-to-tr from-blue-500 via-blue-600 to-indigo-600 rounded-2xl shadow-lg flex items-center justify-center btn-touch border-[3px] border-white">
                    <span class="iconify text-white text-3xl" data-icon="material-symbols:smart-toy"></span>
                </a>
            </div>
            <a href="./messages.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400 relative">
                <span class="iconify text-2xl" data-icon="material-symbols:chat-bubble-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">消息</span>
                <span class="absolute top-1 right-3 w-2 h-2 bg-red-500 rounded-full"></span>
            </a>
            <a href="./mine.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 nav-active">
                <span class="iconify text-2xl" data-icon="material-symbols:person-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">我的</span>
