<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>账号与安全 - 依托人工智能大模型的大学生就业指导服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #e8edf5;
        }
        .android-container {
            width: 100%;
            height: 100vh;
            background: #f6f8fc;
            position: relative;
            overflow: hidden;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .nav-active { color: #2563eb; }
        .menu-item {
            transition: all 0.2s ease;
        }
        .menu-item:active {
            background-color: #f3f4f6;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0);
            z-index: 100;
            pointer-events: none;
        }
        .modal-overlay.active {
            background: rgba(0,0,0,0.4);
            pointer-events: auto;
        }
        .draggable-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 101;
            cursor: move;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div class="android-status-bar"></div>
    <div class="android-container flex flex-col">
        <div class="flex-shrink-0 px-4 pt-2 pb-3 bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-700 shadow-lg">
            <div class="flex items-center gap-2">
                <button onclick="window.history.back()" class="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center btn-touch">
                    <span class="iconify text-white text-lg" data-icon="material-symbols:arrow-back-rounded"></span>
                </button>
                <h1 class="text-white text-base font-bold">依托人工智能大模型的大学生就业指导服务平台</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto hide-scrollbar pb-20 px-4 pt-4">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-4">
                <div class="menu-item flex items-center justify-between p-4 border-b border-gray-100 cursor-pointer" onclick="openChangeModal('手机号')">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center">
                            <span class="iconify text-blue-600 text-lg" data-icon="material-symbols:phone-android"></span>
                        </div>
                        <div>
                            <p class="text-[14px] font-semibold text-gray-800">手机号</p>
                            <p class="text-[11px] text-gray-500">138****8888</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[12px] text-blue-600">修改</span>
                        <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                    </div>
                </div>

                <div class="menu-item flex items-center justify-between p-4 border-b border-gray-100 cursor-pointer" onclick="openChangeModal('邮箱')">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center">
                            <span class="iconify text-orange-600 text-lg" data-icon="material-symbols:mail-outline"></span>
                        </div>
                        <div>
                            <p class="text-[14px] font-semibold text-gray-800">邮箱</p>
                            <p class="text-[11px] text-gray-500">gong***@mail.com</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[12px] text-blue-600">修改</span>
                        <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                    </div>
                </div>

                <div class="menu-item flex items-center justify-between p-4 cursor-pointer" onclick="openChangeModal('密码')">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-purple-50 rounded-full flex items-center justify-center">
                            <span class="iconify text-purple-600 text-lg" data-icon="material-symbols:password"></span>
                        </div>
                        <div>
                            <p class="text-[14px] font-semibold text-gray-800">登录密码</p>
                            <p class="text-[11px] text-gray-500">上次修改于 30 天前</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[12px] text-blue-600">修改</span>
                        <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-4">
                <div class="menu-item flex items-center justify-between p-4 border-b border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-green-50 rounded-full flex items-center justify-center">
                            <span class="iconify text-green-600 text-lg" data-icon="material-symbols:verified-user-outline"></span>
                        </div>
                        <div>
                            <p class="text-[14px] font-semibold text-gray-800">实名认证</p>
                            <p class="text-[11px] text-green-600">已认证 · 龚翔</p>
                        </div>
                    </div>
                    <span class="iconify text-green-500 text-xl" data-icon="material-symbols:check-circle"></span>
                </div>

                <div class="menu-item flex items-center justify-between p-4 border-b border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center">
                            <span class="iconify text-blue-600 text-lg" data-icon="material-symbols:shield-outline"></span>
                        </div>
                        <div>
                            <p class="text-[14px] font-semibold text-gray-800">微信绑定</p>
                            <p class="text-[11px] text-gray-500">已绑定</p>
                        </div>
                    </div>
                    <span class="iconify text-green-500 text-xl" data-icon="material-symbols:check-circle"></span>
                </div>

                <div class="menu-item flex items-center justify-between p-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">
                            <span class="iconify text-gray-500 text-lg" data-icon="material-symbols:link"></span>
                        </div>
                        <div>
                            <p class="text-[14px] font-semibold text-gray-800">第三方账号</p>
                            <p class="text-[11px] text-gray-500">GitHub / 钉钉</p>
                        </div>
                    </div>
                    <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="menu-item flex items-center justify-between p-4 border-b border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-red-50 rounded-full flex items-center justify-center">
                            <span class="iconify text-red-600 text-lg" data-icon="material-symbols:devices"></span>
                        </div>
                        <div>
                            <p class="text-[14px] font-semibold text-gray-800">登录设备</p>
                            <p class="text-[11px] text-gray-500">2 台设备</p>
                        </div>
                    </div>
                    <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                </div>

                <div class="menu-item flex items-center justify-between p-4 cursor-pointer" onclick="confirmLogout()">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">
                            <span class="iconify text-gray-500 text-lg" data-icon="material-symbols:logout"></span>
                        </div>
                        <p class="text-[14px] font-semibold text-red-600">退出登录</p>
                    </div>
                    <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="changeOverlay" onclick="closeChangeModal()"></div>
        <div class="draggable-modal bg-white rounded-2xl shadow-2xl w-[90%] max-w-sm bottom-sheet" id="changeModal" style="display:none;">
            <div class="p-4 border-b border-gray-100">
                <div class="flex items-center justify-between">
                    <h3 class="text-base font-bold text-gray-800" id="changeTitle">修改</h3>
                    <button onclick="closeChangeModal()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
                        <span class="iconify text-gray-500" data-icon="material-symbols:close"></span>
                    </button>
                </div>
            </div>
            <div class="p-4">
                <p class="text-[13px] text-gray-600 mb-3" id="changeDesc">请输入新内容：</p>
                <input class="w-full bg-gray-100 rounded-xl px-4 py-3 text-[13px] outline-none" type="text" placeholder="请输入" />
            </div>
            <div class="p-4 border-t border-gray-100 flex gap-3">
                <button onclick="closeChangeModal()" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 text-[13px] font-medium">取消</button>
                <button onclick="saveChange()" class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white text-[13px] font-medium">保存</button>
            </div>
        </div>

        <div class="android-nav-bar absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-200/50 px-2 flex justify-around items-center z-20">
            <a href="./home.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:home-rounded"></span>
                <span class="text-[10px] mt-0.5 font-medium">首页</span>
            </a>
            <a href="./jobs.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:work-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">职位</span>
            </a>
            <div class="relative -mt-6">
                <a href="ai-assistant.html" class="w-14 h-14 bg-gradient-to-tr from-blue-500 via-blue-600 to-indigo-600 rounded-2xl shadow-lg flex items-center justify-center btn-touch border-[3px] border-white">
                    <span class="iconify text-white text-3xl" data-icon="material-symbols:smart-toy"></span>
                </a>
            </div>
            <a href="./messages.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400 relative">
                <span class="iconify text-2xl" data-icon="material-symbols:chat-bubble-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">消息</span>
                <span class="absolute top-1 right-3 w-2 h-2 bg-red-500 rounded-full"></span>
            </a>
            <a href="./mine.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 nav-active">
                <span class="iconify text-2xl" data-icon="material-symbols:person-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">我的</span>
            </a>
        </div>
    </div>

    <script>
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;
        const changeModal = document.getElementById('changeModal');

        changeModal.addEventListener('mousedown', startDrag);
        changeModal.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        function startDrag(e) {
            isDragging = true;
            const rect = changeModal.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;
            changeModal.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            changeModal.style.left = (clientX - dragOffsetX) + 'px';
            changeModal.style.top = (clientY - dragOffsetY) + 'px';
            changeModal.style.transform = 'none';
        }

        function endDrag() {
            isDragging = false;
            changeModal.style.transition = '';
        }

        function openChangeModal(type) {
            document.getElementById('changeTitle').textContent = '修改' + type;
            document.getElementById('changeDesc').textContent = '请输入新的' + type + '：';
            document.getElementById('changeOverlay').classList.add('active');
            changeModal.style.display = 'block';
            changeModal.style.left = '50%';
            changeModal.style.top = '50%';
            changeModal.style.transform = 'translate(-50%, -50%)';
        }

        function closeChangeModal() {
            document.getElementById('changeOverlay').classList.remove('active');
            changeModal.style.display = 'none';
        }

        function saveChange() {
            alert('修改成功！');
            closeChangeModal();
        }

        function confirmLogout() {
            if (confirm('确定要退出登录吗？')) {
                alert('已退出登录');
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
