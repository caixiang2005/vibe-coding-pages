<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>隐私设置 - 依托人工智能大模型的大学生就业指导服务平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #e8edf5;
        }
        .android-container {
            width: 100%;
            height: 100vh;
            background: #f6f8fc;
            position: relative;
            overflow: hidden;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .nav-active { color: #2563eb; }
        .privacy-option {
            transition: all 0.2s ease;
        }
        .privacy-option:active {
            background-color: #f3f4f6;
        }
        .privacy-option.selected {
            background-color: #eff6ff;
            border-color: #2563eb;
        }
        .radio-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .privacy-option.selected .radio-dot {
            border-color: #2563eb;
            background-color: #2563eb;
        }
        .radio-dot::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            opacity: 0;
            transition: all 0.2s ease;
        }
        .privacy-option.selected .radio-dot::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="android-status-bar"></div>
    <div class="android-container flex flex-col">
        <div class="flex-shrink-0 px-4 pt-2 pb-3 bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-700 shadow-lg">
            <div class="flex items-center gap-2">
                <button onclick="window.history.back()" class="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center btn-touch">
                    <span class="iconify text-white text-lg" data-icon="material-symbols:arrow-back-rounded"></span>
                </button>
                <h1 class="text-white text-base font-bold">依托人工智能大模型的大学生就业指导服务平台</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto hide-scrollbar overscroll-contain pb-16 px-4 pt-4">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
                <h3 class="text-[14px] font-bold text-gray-800 mb-1">简历公开范围</h3>
                <p class="text-[11px] text-gray-500 mb-4">设置谁可以看到你的简历信息</p>

                <div class="space-y-2">
                    <div class="privacy-option selected flex items-center gap-3 p-3 rounded-xl border-2 border-transparent cursor-pointer" onclick="selectPrivacy(this, '所有人')">
                        <div class="radio-dot"></div>
                        <div class="flex-1">
                            <p class="text-[13px] font-semibold text-gray-800">对所有企业可见</p>
                            <p class="text-[11px] text-gray-500">允许所有HR查看你的简历</p>
                        </div>
                    </div>

                    <div class="privacy-option flex items-center gap-3 p-3 rounded-xl border-2 border-transparent cursor-pointer" onclick="selectPrivacy(this, '投递后可见')">
                        <div class="radio-dot"></div>
                        <div class="flex-1">
                            <p class="text-[13px] font-semibold text-gray-800">仅投递后可见</p>
                            <p class="text-[11px] text-gray-500">投递简历后HR才能查看</p>
                        </div>
                    </div>

                    <div class="privacy-option flex items-center gap-3 p-3 rounded-xl border-2 border-transparent cursor-pointer" onclick="selectPrivacy(this, '完全保密')">
                        <div class="radio-dot"></div>
                        <div class="flex-1">
                            <p class="text-[13px] font-semibold text-gray-800">完全保密</p>
                            <p class="text-[11px] text-gray-500">只有你自己可以看到</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
                <h3 class="text-[14px] font-bold text-gray-800 mb-4">个人信息展示</h3>

                <div class="space-y-3">
                    <div class="flex items-center justify-between py-2 border-b border-gray-100">
                        <div class="flex items-center gap-2">
                            <span class="iconify text-gray-500" data-icon="material-symbols:person-outline"></span>
                            <span class="text-[13px] text-gray-700">真实姓名</span>
                        </div>
                        <span class="text-[12px] text-blue-600">公开</span>
                    </div>

                    <div class="flex items-center justify-between py-2 border-b border-gray-100">
                        <div class="flex items-center gap-2">
                            <span class="iconify text-gray-500" data-icon="material-symbols:school-outline"></span>
                            <span class="text-[13px] text-gray-700">学历信息</span>
                        </div>
                        <span class="text-[12px] text-blue-600">公开</span>
                    </div>

                    <div class="flex items-center justify-between py-2 border-b border-gray-100">
                        <div class="flex items-center gap-2">
                            <span class="iconify text-gray-500" data-icon="material-symbols:phone-android"></span>
                            <span class="text-[13px] text-gray-700">手机号码</span>
                        </div>
                        <span class="text-[12px] text-orange-600">仅投递可见</span>
                    </div>

                    <div class="flex items-center justify-between py-2">
                        <div class="flex items-center gap-2">
                            <span class="iconify text-gray-500" data-icon="material-symbols:mail-outline"></span>
                            <span class="text-[13px] text-gray-700">邮箱地址</span>
                        </div>
                        <span class="text-[12px] text-green-600">保密</span>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                <h3 class="text-[14px] font-bold text-gray-800 mb-4">其他设置</h3>

                <div class="space-y-3">
                    <div class="flex items-center justify-between py-2 border-b border-gray-100 cursor-pointer">
                        <div class="flex items-center gap-2">
                            <span class="iconify text-gray-500" data-icon="material-symbols:visibility-off-outline"></span>
                            <span class="text-[13px] text-gray-700">黑名单管理</span>
                        </div>
                        <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                    </div>

                    <div class="flex items-center justify-between py-2 cursor-pointer">
                        <div class="flex items-center gap-2">
                            <span class="iconify text-gray-500" data-icon="material-symbols:delete-outline"></span>
                            <span class="text-[13px] text-gray-700">注销账户</span>
                        </div>
                        <span class="iconify text-gray-400" data-icon="material-symbols:chevron-right-rounded"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="android-nav-bar absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-200/50 px-2 flex justify-around items-center z-20">
            <a href="./home.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:home-rounded"></span>
                <span class="text-[10px] mt-0.5 font-medium">首页</span>
            </a>
            <a href="./jobs.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400">
                <span class="iconify text-2xl" data-icon="material-symbols:work-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">职位</span>
            </a>
            <div class="relative -mt-6">
                <a href="ai-assistant.html" class="w-14 h-14 bg-gradient-to-tr from-blue-500 via-blue-600 to-indigo-600 rounded-2xl shadow-lg flex items-center justify-center btn-touch border-[3px] border-white">
                    <span class="iconify text-white text-3xl" data-icon="material-symbols:smart-toy"></span>
                </a>
            </div>
            <a href="./messages.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 text-gray-400 relative">
                <span class="iconify text-2xl" data-icon="material-symbols:chat-bubble-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">消息</span>
                <span class="absolute top-1 right-3 w-2 h-2 bg-red-500 rounded-full"></span>
            </a>
            <a href="./mine.html" class="ripple tab-ripple flex flex-col items-center py-2 px-4 nav-active">
                <span class="iconify text-2xl" data-icon="material-symbols:person-outline"></span>
                <span class="text-[10px] mt-0.5 font-medium">我的</span>
            </a>
        </div>
    </div>

    <script>
        function selectPrivacy(el, value) {
            document.querySelectorAll('.privacy-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            el.classList.add('selected');
        }
    </script>
</body>
</html>
