<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>图表 - 水利项目质量验收审核软件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .android-container {
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }
        .android-container::-webkit-scrollbar { display: none; }
        .btn-press:active { transform: scale(0.96); transition: transform 0.1s; }
        .card-hover { transition: all 0.2s; }
        .card-hover:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .active-tab { color: #1d4ed8; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-900">
    <div class="android-container bg-gray-50 flex flex-col relative">
        <header class="bg-blue-700 text-white pt-12 pb-5 px-5 rounded-b-3xl shadow-lg">
            <div class="flex items-center justify-between">
                <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-600 active:bg-blue-500">
                    <span class="iconify text-xl" data-icon="material-symbols:arrow-back"></span>
                </a>
                <h1 class="text-base font-bold text-center flex-1">水利项目质量验收审核软件</h1>
                <div class="w-10"></div>
            </div>
            <p class="text-center text-blue-200 text-xs mt-1">数据图表</p>
        </header>

        <main class="flex-1 px-4 py-4 pb-24">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-white p-3 rounded-xl shadow-sm text-center">
                    <p class="text-[10px] text-gray-500">本月验收</p>
                    <p class="text-xl font-bold text-blue-600">42</p>
                    <p class="text-[10px] text-green-500">↑ 12%</p>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm text-center">
                    <p class="text-[10px] text-gray-500">合格率</p>
                    <p class="text-xl font-bold text-green-600">98.5%</p>
                    <p class="text-[10px] text-green-500">↑ 2.1%</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
                <h3 class="text-sm font-bold text-gray-800 mb-3">质量评分趋势</h3>
                <div id="trendChart" style="width: 100%; height: 200px;"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
                <h3 class="text-sm font-bold text-gray-800 mb-3">验收类型分布</h3>
                <div id="pieChart" style="width: 100%; height: 180px;"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm">
                <h3 class="text-sm font-bold text-gray-800 mb-3">各项目质量排名</h3>
                <div class="space-y-3">
                    <div class="flex items-center gap-3">
                        <span class="w-5 h-5 bg-blue-600 text-white text-[10px] rounded flex items-center justify-center">1</span>
                        <div class="flex-1">
                            <div class="flex justify-between">
                                <span class="text-xs text-gray-700">南水北调中线二期</span>
                                <span class="text-xs font-bold text-blue-600">97.5</span>
                            </div>
                            <div class="w-full bg-gray-100 h-1 rounded-full mt-1 overflow-hidden">
                                <div class="bg-blue-600 h-full w-[97.5%]"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-5 h-5 bg-green-600 text-white text-[10px] rounded flex items-center justify-center">2</span>
                        <div class="flex-1">
                            <div class="flex justify-between">
                                <span class="text-xs text-gray-700">丹江口库区护坡</span>
                                <span class="text-xs font-bold text-green-600">96.2</span>
                            </div>
                            <div class="w-full bg-gray-100 h-1 rounded-full mt-1 overflow-hidden">
                                <div class="bg-green-600 h-full w-[96.2%]"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-5 h-5 bg-cyan-600 text-white text-[10px] rounded flex items-center justify-center">3</span>
                        <div class="flex-1">
                            <div class="flex justify-between">
                                <span class="text-xs text-gray-700">二号闸室结构</span>
                                <span class="text-xs font-bold text-cyan-600">95.8</span>
                            </div>
                            <div class="w-full bg-gray-100 h-1 rounded-full mt-1 overflow-hidden">
                                <div class="bg-cyan-600 h-full w-[95.8%]"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-5 h-5 bg-purple-600 text-white text-[10px] rounded flex items-center justify-center">4</span>
                        <div class="flex-1">
                            <div class="flex justify-between">
                                <span class="text-xs text-gray-700">引水隧道工程</span>
                                <span class="text-xs font-bold text-purple-600">94.5</span>
                            </div>
                            <div class="w-full bg-gray-100 h-1 rounded-full mt-1 overflow-hidden">
                                <div class="bg-purple-600 h-full w-[94.5%]"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center py-2 px-2 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
            <a href="index.html" class="flex flex-col items-center space-y-1 text-gray-400">
                <span class="iconify text-xl" data-icon="material-symbols:home-rounded"></span>
                <span class="text-[10px] font-medium">工作台</span>
            </a>
            <a href="acceptance.html" class="flex flex-col items-center space-y-1 text-gray-400">
                <span class="iconify text-xl" data-icon="material-symbols:approval-rounded"></span>
                <span class="text-[10px] font-medium">验收</span>
            </a>
            <a href="charts.html" class="flex flex-col items-center space-y-1 active-tab">
                <span class="iconify text-xl" data-icon="material-symbols:equalizer-rounded"></span>
                <span class="text-[10px] font-medium">图表</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center space-y-1 text-gray-400">
                <span class="iconify text-xl" data-icon="material-symbols:person-outline"></span>
                <span class="text-[10px] font-medium">我的</span>
            </a>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var trendChart = echarts.init(document.getElementById('trendChart'));
            var trendOption = {
                grid: { top: 10, bottom: 20, left: 35, right: 10 },
                xAxis: {
                    type: 'category',
                    data: ['1月', '2月', '3月', '4月', '5月', '6月'],
                    axisLabel: { fontSize: 10, color: '#94a3b8' },
                    axisLine: { show: false }
                },
                yAxis: {
                    type: 'value',
                    min: 90,
                    axisLabel: { fontSize: 10, color: '#94a3b8' },
                    splitLine: { lineStyle: { type: 'dashed', color: '#f1f5f9' } }
                },
                series: [
                    {
                        data: [94, 95, 93, 96, 97, 98.5],
                        type: 'line',
                        smooth: true,
                        lineStyle: { width: 2, color: '#2563eb' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(37, 99, 235, 0.3)' },
                                { offset: 1, color: 'rgba(37, 99, 235, 0)' }
                            ])
                        },
                        symbol: 'circle',
                        symbolSize: 5,
                        itemStyle: { color: '#2563eb' }
                    }
                ]
            };
            trendChart.setOption(trendOption);

            var pieChart = echarts.init(document.getElementById('pieChart'));
            var pieOption = {
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { fontSize: 10 } },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['35%', '50%'],
                    avoidLabelOverlap: false,
                    label: { show: false },
                    data: [
                        { value: 25, name: '单元工程', itemStyle: { color: '#2563eb' } },
                        { value: 18, name: '分部工程', itemStyle: { color: '#10b981' } },
                        { value: 8, name: '单位工程', itemStyle: { color: '#f59e0b' } },
                        { value: 5, name: '竣工验收', itemStyle: { color: '#8b5cf6' } }
                    ]
                }]
            };
            pieChart.setOption(pieOption);
        });
    </script>
</body>
</html>
