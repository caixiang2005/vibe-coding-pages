<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>用户登录 - 木质纤维素水热解聚能耗优化系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('./static/bg.jpeg');
            background-size: cover;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial;
        }
        .glass-card {
            background: rgba(28, 28, 28, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .btn-login {
            background: #3b82f6;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn-login:active {
            transform: scale(0.98);
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            animation: modalIn 0.3s ease-out;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .logo-container {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-black">
    <div id="modal-container"></div>
    <div class="w-[1280px] max-w-[95vw] h-[900px] max-h-[90vh] flex overflow-hidden rounded-[24px] border border-white/10 bg-[#050505]">
        <div class="flex-1 flex items-center justify-center bg-[#121212]">
            <div class="glass-card rounded-2xl p-8 w-[420px]">
                <div class="text-center mb-8">
                    <div class="logo-container w-20 h-20 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i class="fa-solid fa-fire-flame-curved text-3xl text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold mb-2">木质纤维素水热解聚能耗优化系统</h1>
                    <p class="text-gray-500 text-sm">安全监控系统</p>
                </div>
                <form onsubmit="handleLogin(event)" class="space-y-5">
                    <div>
                        <label class="block text-xs text-gray-500 mb-2">用户名</label>
                        <div class="relative">
                            <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                            <input type="text" id="username" value="郑鹏" class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-white" placeholder="请输入用户名">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-2">密码</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                            <input type="password" id="password" value="123456" class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-white" placeholder="请输入密码">
                        </div>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" checked class="w-4 h-4 rounded bg-white/10 border-gray-600 text-blue-500 focus:ring-blue-500 focus:ring-offset-0">
                            <span class="text-gray-400">记住登录状态</span>
                        </label>
                        <a href="#" onclick="showModal('forget-pwd')" class="text-blue-400 hover:text-blue-300">忘记密码?</a>
                    </div>
                    <button type="submit" class="btn-login w-full py-3 rounded-xl text-white font-medium shadow-lg">
                        <i class="fa-solid fa-right-to-bracket mr-2"></i>登录系统
                    </button>
                </form>
                <div class="mt-6 pt-6 border-t border-white/10">
                    <p class="text-center text-xs text-gray-500">
                        <i class="fa-solid fa-shield-halved mr-1"></i>
                        本系统已获得安全认证 | 请使用已授权账户登录
                    </p>
                </div>
            </div>
        </div>
        <div class="w-[500px] h-full bg-gradient-to-br from-blue-900/30 to-green-900/30 flex items-center justify-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-10">
                <div class="absolute top-1/4 left-1/4 w-32 h-32 bg-blue-500 rounded-full blur-3xl"></div>
                <div class="absolute bottom-1/3 right-1/4 w-40 h-40 bg-green-500 rounded-full blur-3xl"></div>
            </div>
            <div class="text-center z-10 px-8">
                <div class="w-24 h-24 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-6 backdrop-blur-sm border border-white/20">
                    <i class="fa-solid fa-leaf text-5xl text-green-400"></i>
                </div>
                <h2 class="text-2xl font-bold mb-4">欢迎回来</h2>
                <p class="text-gray-400 text-sm leading-relaxed">
                    清华大学技术授权<br>
                    木质纤维素水热解聚能耗优化系统<br>
                    基于温压解耦控制策略
                </p>
                <div class="mt-8 flex justify-center gap-4">
                    <div class="text-center">
                        <p class="text-2xl font-bold text-blue-400">98.4%</p>
                        <p class="text-xs text-gray-500">系统健康度</p>
                    </div>
                    <div class="w-px bg-white/20"></div>
                    <div class="text-center">
                        <p class="text-2xl font-bold text-green-400">86.4%</p>
                        <p class="text-xs text-gray-500">当前转化率</p>
                    </div>
                    <div class="w-px bg-white/20"></div>
                    <div class="text-center">
                        <p class="text-2xl font-bold text-purple-400">3.42</p>
                        <p class="text-xs text-gray-500">能效比 COP</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) {
                showModal('login-failed');
                return;
            }
            showModal('login-success');
        }

        let countdown = 0;
        let countdownTimer = null;

        function sendCode() {
            const email = document.getElementById('reset-email').value;
            const btn = document.getElementById('btn-send-code');
            if (!email || !email.includes('@')) {
                alert('请输入有效的邮箱地址');
                return;
            }
            if (countdown > 0) return;
            console.log('发送验证码到:', email);
            countdown = 60;
            btn.disabled = true;
            btn.classList.remove('hover:bg-white/20');
            btn.classList.add('bg-gray-600');
            updateCountdown();
        }

        function updateCountdown() {
            const btn = document.getElementById('btn-send-code');
            if (!btn) return;
            if (countdown > 0) {
                btn.textContent = countdown + '秒后重试';
                countdown--;
                countdownTimer = setTimeout(updateCountdown, 1000);
            } else {
                btn.textContent = '发送验证码';
                btn.disabled = false;
                btn.classList.add('hover:bg-white/20');
                btn.classList.remove('bg-gray-600');
            }
        }

        function verifyCode() {
            const code = document.getElementById('reset-code').value;
            if (!code) {
                alert('请输入验证码');
                return;
            }
            console.log('验证验证码:', code);
            showModal('reset-success');
        }

        function showModal(type) {
            const container = document.getElementById('modal-container');
            let content = '';
            if (type === 'login-success') {
                content = `<div class="fixed inset-0 modal-overlay flex items-center justify-center z-50" onclick="closeModal(event)">
                    <div class="modal-content glass-card rounded-2xl w-[350px] max-w-[90vw] text-center overflow-hidden" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div class="modal-dot bg-[#ff5f56] mr-2"></div>
                            <div class="modal-dot bg-[#ffbd2e] mr-2"></div>
                            <div class="modal-dot bg-[#27c93f]"></div>
                            <h3 class="text-lg font-medium flex-1 pr-12">登录结果</h3>
                        </div>
                        <div class="p-8">
                            <i class="fa-solid fa-circle-check text-5xl text-green-500 mb-4"></i>
                            <h3 class="text-lg font-bold">登录成功</h3>
                            <p class="text-gray-400 mt-1 text-sm">正在跳转至主控制面板...</p>
                        </div>
                    </div></div>`;
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } else if (type === 'login-failed') {
                content = `<div class="fixed inset-0 modal-overlay flex items-center justify-center z-50" onclick="closeModal(event)">
                    <div class="modal-content glass-card rounded-2xl w-[350px] max-w-[90vw] text-center overflow-hidden" onclick="event.stopPropagation()">
                        <div class="modal-header bg-red-900/20">
                            <div class="modal-dot bg-[#ff5f56] mr-2"></div>
                            <div class="modal-dot bg-[#ffbd2e] mr-2"></div>
                            <div class="modal-dot bg-[#27c93f]"></div>
                            <h3 class="text-lg font-medium flex-1 pr-12 text-red-400">登录结果</h3>
                        </div>
                        <div class="p-8">
                            <i class="fa-solid fa-circle-xmark text-5xl text-red-500 mb-4"></i>
                            <h3 class="text-lg font-bold">登录失败</h3>
                            <p class="text-gray-400 mt-1 text-sm">用户名或密码错误</p>
                            <button onclick="closeModal()" class="btn-login px-6 py-2 rounded-lg mt-4"><i class="fa-solid fa-check mr-1"></i>确定</button>
                        </div>
                    </div></div>`;
            } else if (type === 'forget-pwd') {
                content = `<div class="fixed inset-0 modal-overlay flex items-center justify-center z-50" onclick="closeModal(event)">
                    <div class="modal-content glass-card rounded-2xl w-[400px] max-w-[90vw] overflow-hidden" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div class="modal-dot bg-[#ff5f56] mr-2"></div>
                            <div class="modal-dot bg-[#ffbd2e] mr-2"></div>
                            <div class="modal-dot bg-[#27c93f]"></div>
                            <h3 class="text-lg font-medium text-center flex-1 pr-12"><i class="fa-solid fa-key text-yellow-400 mr-2"></i>找回密码</h3>
                        </div>
                        <div class="p-6 space-y-4">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">注册邮箱</label>
                                <input type="email" id="reset-email" placeholder="请输入注册邮箱" class="input-field w-full px-3 py-2 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">验证码</label>
                                <div class="flex gap-2">
                                    <input type="text" id="reset-code" placeholder="请输入验证码" class="input-field flex-1 px-3 py-2 rounded-lg">
                                    <button id="btn-send-code" onclick="sendCode()" class="px-4 py-2 bg-white/10 rounded-lg hover:bg-white/20 text-sm">发送验证码</button>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 border-t border-white/10 flex gap-3">
                            <button onclick="closeModal()" class="flex-1 px-4 py-2 bg-white/10 rounded-lg hover:bg-white/20"><i class="fa-solid fa-xmark mr-1"></i>取消</button>
                            <button onclick="verifyCode()" class="flex-1 btn-login px-4 py-2 rounded-lg"><i class="fa-solid fa-check mr-1"></i>确认</button>
                        </div>
                    </div></div>`;
            } else if (type === 'reset-success') {
                content = `<div class="fixed inset-0 modal-overlay flex items-center justify-center z-50" onclick="closeModal(event)">
                    <div class="modal-content glass-card rounded-2xl w-[350px] max-w-[90vw] text-center overflow-hidden" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <div class="modal-dot bg-[#ff5f56] mr-2"></div>
                            <div class="modal-dot bg-[#ffbd2e] mr-2"></div>
                            <div class="modal-dot bg-[#27c93f]"></div>
                            <h3 class="text-lg font-medium flex-1 pr-12">操作结果</h3>
                        </div>
                        <div class="p-8">
                            <i class="fa-solid fa-circle-check text-5xl text-green-500 mb-4"></i>
                            <h3 class="text-lg font-bold">邮件已发送</h3>
                            <p class="text-gray-400 mt-1 text-sm">请查收邮件并按指示重置密码</p>
                        </div>
                    </div></div>`;
                setTimeout(closeModal, 2000);
            }
            container.innerHTML = content;
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('modal-container').innerHTML = '';
        }
    </script>
</body>
</html>
