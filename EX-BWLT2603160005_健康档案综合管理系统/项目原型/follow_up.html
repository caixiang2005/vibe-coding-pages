<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>健康档案综合管理系统 - 随访记录</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f7;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --accent: #0071e3;
      --accent-light: #e8f2fd;
      --green: #34c759;
      --orange: #ff9500;
      --red: #ff3b30;
      --border: #d2d2d7;
      --card-shadow: 0 1px 3px rgba(0, 0, 0, .06);
      --window-shadow: 0 22px 70px rgba(0, 0, 0, .18), 0 0 0 .5px rgba(0, 0, 0, .08);
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: url('./static/bg.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    .mac-window {
      width: 1200px;
      height: 780px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--window-shadow);
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      height: 52px;
      background: linear-gradient(180deg, #f6f6f6, #e8e8e8);
      border-bottom: 1px solid #d0d0d0;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      position: relative;
    }

    .traffic-lights {
      display: flex;
      gap: 8px;
    }

    .traffic-light {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
    }

    .tl-close {
      background: #ff5f57;
      border: 1px solid #e0443e;
    }

    .tl-minimize {
      background: #febc2e;
      border: 1px solid #dea123;
    }

    .tl-maximize {
      background: #28c840;
      border: 1px solid #1aab29;
    }

    .titlebar-text {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 220px;
      background: #f0f0f2;
      border-right: 1px solid var(--border);
      padding: 12px 8px;
      flex-shrink: 0;
    }

    .sidebar-section {
      margin-bottom: 20px;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 4px 12px;
      margin-bottom: 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .15s;
    }

    .sidebar-item:hover {
      background: rgba(0, 0, 0, .04);
    }

    .sidebar-item:active {
      transform: scale(0.98);
    }

    .sidebar-item.active {
      background: var(--accent);
      color: #fff;
    }

    .sidebar-icon {
      width: 18px;
      height: 18px;
      color: var(--text-tertiary);
    }

    .sidebar-item.active .sidebar-icon {
      color: #fff;
    }

    .sidebar-badge {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .content {
      flex: 1;
      min-height: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-top {
      padding: 24px 24px 0;
      flex-shrink: 0;
    }

    .content-top h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .content-top-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .btn {
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #005bb5;
    }

    .btn-secondary {
      background: #fff;
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #f5f5f7;
    }

    .tabs-bar {
      display: flex;
      gap: 0;
      margin-top: 16px;
      border-bottom: 2px solid #e8e8ea;
    }

    .tab {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all .15s;
    }

    .tab:hover {
      color: var(--text-primary);
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .detail-layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .list-pane {
      width: 340px;
      border-right: 1px solid #e8e8ea;
      overflow-y: auto;
      background: #fff;
      flex-shrink: 0;
    }

    .detail-pane {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      background: var(--bg);
      padding: 24px;
    }

    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    .list-search {
      padding: 12px;
      border-bottom: 1px solid #f0f0f2;
    }

    .list-search input {
      width: 100%;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: var(--bg);
    }

    .list-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, .12);
    }

    .list-item {
      padding: 14px 16px;
      border-bottom: 1px solid #f5f5f7;
      cursor: pointer;
      transition: all .1s;
    }

    .list-item:hover {
      background: #fafafa;
    }

    .list-item.selected {
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
    }

    .li-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .li-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .li-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }

    .li-tag.completed {
      background: #e8faf0;
      color: var(--green);
    }

    .li-tag.pending {
      background: #fff5e6;
      color: var(--orange);
    }

    .li-tag.overdue {
      background: #fce4e4;
      color: var(--red);
    }

    .li-meta {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    .li-preview {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .detail-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .detail-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
    }

    .btn-sm:hover {
      background: #f5f5f7;
    }

    .btn-sm.primary {
      background: var(--accent);
      color: #fff;
      border: none;
    }

    .form-section {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      margin-bottom: 16px;
      border: 1px solid rgba(0, 0, 0, .04);
    }

    .form-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f2;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .form-value {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
    }

    .form-value.warning {
      color: var(--orange);
    }

    .form-value.danger {
      color: var(--red);
    }

    .form-value.normal {
      color: var(--green);
    }

    .form-full {
      grid-column: span 2;
    }

    .form-textarea {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.6;
      background: #fafafa;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #f0f0f2;
    }

    .timeline {
      position: relative;
      padding-left: 24px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: #e8e8ea;
    }

    .tl-item {
      position: relative;
      margin-bottom: 20px;
    }

    .tl-item:last-child {
      margin-bottom: 0;
    }

    .tl-dot {
      position: absolute;
      left: -21px;
      top: 4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px var(--accent);
    }

    .tl-dot.green {
      box-shadow: 0 0 0 2px var(--green);
    }

    .tl-dot.orange {
      box-shadow: 0 0 0 2px var(--orange);
    }

    .tl-time {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .tl-content {
      font-size: 13px;
      color: var(--text-primary);
      margin-top: 3px;
    }

    .tl-by {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.25s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      min-width: 480px;
      max-width: 580px;
      transform: scale(0.9) translateY(-20px);
      transition: transform 0.25s ease;
      overflow: hidden;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      position: relative;
      background: linear-gradient(180deg, #f6f6f6, #e8e8e8);
    }

    .modal-traffic-lights {
      display: flex;
      gap: 8px;
    }

    .modal-traffic-light {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
    }

    .modal-traffic-light.close {
      background: #ff5f57;
      border: 1px solid #e0443e;
    }

    .modal-traffic-light.minimize {
      background: #febc2e;
      border: 1px solid #dea123;
    }

    .modal-traffic-light.maximize {
      background: #28c840;
      border: 1px solid #1aab29;
    }

    .modal-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
    }

    .modal-body {
      padding: 20px;
      max-height: 500px;
      overflow-y: auto;
    }

    .modal-footer {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: #fafafa;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-primary);
      transition: border-color 0.15s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
    }

    .form-select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-primary);
      background: #fff;
      cursor: pointer;
    }

    .form-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .filter-btn {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .filter-btn:hover {
      background: #f5f5f7;
    }

    .filter-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>
  <div class="mac-window">
    <div class="titlebar">
      <div class="traffic-lights">
        <div class="traffic-light tl-close" onclick="window.close()"></div>
        <div class="traffic-light tl-minimize"></div>
        <div class="traffic-light tl-maximize"></div>
      </div>
      <span class="titlebar-text">健康档案综合管理系统</span>
    </div>
    <div class="main-layout">
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-section-title">导航</div>
          <div class="sidebar-item" onclick="window.location.href = 'dashboard.html'">
            <svg class="sidebar-icon" viewBox="0 0 20 20" fill="currentColor">
              <rect x="2" y="2" width="7" height="7" rx="1.5" />
              <rect x="11" y="2" width="7" height="7" rx="1.5" />
              <rect x="2" y="11" width="7" height="7" rx="1.5" />
              <rect x="11" y="11" width="7" height="7" rx="1.5" />
            </svg>
            工作台
          </div>
          <div class="sidebar-item" onclick="window.location.href = 'resident_records.html'">
            <svg class="sidebar-icon" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 2a4 4 0 100 8 4 4 0 000-8zM3 18a7 7 0 0114 0H3z" />
            </svg>
            居民档案
            <span class="sidebar-badge">12</span>
          </div>
          <div class="sidebar-item" onclick="window.location.href = 'health_exam.html'">
            <svg class="sidebar-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M9 2a1 1 0 00-1 1v1H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V6a2 2 0 00-2-2h-3V3a1 1 0 00-1-1H9zm0 2h2v1H9V4zm-4 4h10v8H5V8z" />
            </svg>
            健康体检
          </div>
          <div class="sidebar-item" onclick="window.location.href = 'chronic_disease.html'">
            <svg class="sidebar-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" />
            </svg>
            慢病管理
          </div>
          <div class="sidebar-item active" onclick="window.location.href = 'follow_up.html'">
            <svg class="sidebar-icon" viewBox="0 0 20 20" fill="currentColor">
              <path d="M5 3a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2H5zm1 4h8v2H6V7zm0 4h5v2H6v-2z" />
            </svg>
            随访记录
            <span class="sidebar-badge">3</span>
          </div>
          <div class="sidebar-item" onclick="window.location.href = 'statistics.html'">
            <svg class="sidebar-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 5a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V9zm0 5a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1v-2z" />
            </svg>
            统计报表
          </div>
          <div class="sidebar-item" onclick="window.location.href = 'system_settings.html'">
            <svg class="sidebar-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" />
            </svg>
            系统设置
          </div>
        </div>
      </div>
      <div class="content">
        <div class="content-top">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <h1>随访记录管理</h1>
              <div class="content-top-sub">管理慢病患者定期随访，跟踪病情变化与用药调整</div>
            </div>
            <button class="btn btn-primary" onclick="openNewFollowupModal()">+ 新建随访</button>
          </div>
          <div class="tabs-bar">
            <div class="tab active" onclick="switchTab('all', this)">全部 (<span id="count-all">0</span>)</div>
            <div class="tab" onclick="switchTab('pending', this)">待随访 (<span id="count-pending">0</span>)</div>
            <div class="tab" onclick="switchTab('completed', this)">已完成 (<span id="count-completed">0</span>)</div>
            <div class="tab" onclick="switchTab('overdue', this)">已逾期 (<span id="count-overdue">0</span>)</div>
          </div>
        </div>
        <div class="detail-layout">
          <div class="list-pane">
            <div class="list-search"><input type="text" id="searchInput" placeholder="搜索随访记录..." oninput="filterList()"></div>
            <div id="listContainer"></div>
          </div>
          <div class="detail-pane" id="detailPane">
            <div class="detail-empty">请选择一条随访记录</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-traffic-lights">
          <div class="modal-traffic-light close" onclick="closeModal()"></div>
          <div class="modal-traffic-light minimize"></div>
          <div class="modal-traffic-light maximize"></div>
        </div>
        <span class="modal-title" id="modalTitle">弹窗标题</span>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script>
    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalFooter = document.getElementById('modalFooter');

    let currentTab = 'all';

    function getStatusClass(status) {
      return status === 'completed' ? 'completed' : status === 'pending' ? 'pending' : 'overdue';
    }

    function getMetaText(item) {
      if (item.status === 'completed') {
        return item.type + ' / ' + item.date;
      } else if (item.status === 'pending') {
        return item.type + ' / 计划' + item.planDate;
      } else {
        return item.type + ' / 应于' + item.planDate;
      }
    }

    function renderList() {
      const container = document.getElementById('listContainer');
      const searchText = document.getElementById('searchInput').value.toLowerCase();
      let filtered = followupData;
      
      if (currentTab !== 'all') {
        filtered = filtered.filter(item => item.status === currentTab);
      }
      
      if (searchText) {
        filtered = filtered.filter(item => 
          item.name.toLowerCase().includes(searchText) || 
          item.type.toLowerCase().includes(searchText)
        );
      }
      
      document.getElementById('count-all').textContent = followupData.length;
      document.getElementById('count-pending').textContent = followupData.filter(i => i.status === 'pending').length;
      document.getElementById('count-completed').textContent = followupData.filter(i => i.status === 'completed').length;
      document.getElementById('count-overdue').textContent = followupData.filter(i => i.status === 'overdue').length;
      
      if (filtered.length === 0) {
        container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:13px;">暂无随访记录</div>';
        return;
      }
      
      container.innerHTML = filtered.map(item => `
        <div class="list-item ${item.id === selectedId ? 'selected' : ''}" onclick="selectItem(${item.id})">
          <div class="li-top"><span class="li-name">${item.name}</span><span class="li-tag ${getStatusClass(item.status)}">${item.tag}</span></div>
          <div class="li-meta">${getMetaText(item)}</div>
          <div class="li-preview">${item.symptom}</div>
        </div>
      `).join('');
    }

    function switchTab(tab, el) {
      currentTab = tab;
      selectedId = null;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderList();
      resetDetailPane();
    }

    function filterList() {
      renderList();
    }

    function resetDetailPane() {
      document.getElementById('detailPane').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);font-size:14px;">请选择一条随访记录</div>';
    }

    function selectItem(id) {
      selectedId = id;
      renderList();
      showDetail(id);
    }

    function showDetail(id) {
      const item = followupData.find(i => i.id === id);
      if (!item) return;
      
      const glucoseClass = item.glucose && item.hba1c ? (parseFloat(item.hba1c) < 7 ? 'normal' : 'warning') : '';
      const bpClass = item.bp ? (item.bp.startsWith('15') || item.bp.startsWith('16') || item.bp.startsWith('14') && item.bp.includes('9') ? 'danger' : item.bp.startsWith('14') || item.bp.startsWith('13') ? 'normal' : '') : '';
      
      let labSection = '';
      if (item.glucose || item.hba1c || item.ua || item.lipid) {
        labSection = `
          <div class="form-section">
            <div class="form-section-title">实验室检查</div>
            <div class="form-grid">
              ${item.glucose ? `<div class="form-group"><div class="form-label">空腹血糖</div><div class="form-value ${item.glucose > 7 ? 'warning' : 'normal'}">${item.glucose} mmol/L (参考: 4.4-6.1)</div></div>` : ''}
              ${item.hba1c ? `<div class="form-group"><div class="form-label">糖化血红蛋白</div><div class="form-value ${glucoseClass}">${item.hba1c}% (参考: <7.0%)</div></div>` : ''}
              ${item.ua ? `<div class="form-group"><div class="form-label">尿微量白蛋白</div><div class="form-value normal">${item.ua} mg/L (参考: <30)</div></div>` : ''}
              ${item.lipid ? `<div class="form-group"><div class="form-label">血脂四项</div><div class="form-value normal">${item.lipid}</div></div>` : ''}
            </div>
          </div>`;
      }
      
      const timelineHtml = item.timeline.map(t => `
        <div class="tl-item">
          <div class="tl-dot ${t.color}"></div>
          <div class="tl-time">${t.date}</div>
          <div class="tl-content">${t.content}</div>
          <div class="tl-by">${t.by}</div>
        </div>
      `).join('');
      
      document.getElementById('detailPane').innerHTML = `
        <div class="detail-header">
          <div>
            <div class="detail-title">${item.name} - ${item.type}</div>
            <div class="detail-meta">随访编号：FU${item.planDate.replace(/-/g, '')}-${String(item.id).padStart(3, '0')} / ${item.status === 'completed' ? '随访日期' : '计划日期'}：${item.status === 'completed' ? item.date : item.planDate} / 随访方式：${item.method}</div>
          </div>
          <div class="detail-actions">
            <button class="btn-sm" onclick="openPrintFollowupModal('${item.name}', 'FU${item.planDate.replace(/-/g, '')}-${String(item.id).padStart(3, '0')}')">打印</button>
            <button class="btn-sm primary" onclick="openEditFollowupModal(${item.id})">编辑</button>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">症状与体征</div>
          <div class="form-grid">
            <div class="form-group">
              <div class="form-label">当前症状</div>
              <div class="form-value">${item.symptom}</div>
            </div>
            <div class="form-group">
              <div class="form-label">体征</div>
              <div class="form-value">${item.sign}</div>
            </div>
            <div class="form-group">
              <div class="form-label">血压</div>
              <div class="form-value ${bpClass}">${item.bp || '--'} mmHg</div>
            </div>
            <div class="form-group">
              <div class="form-label">体重</div>
              <div class="form-value">${item.weight} kg ${item.prevWeight ? '(上次: ' + item.prevWeight + ' kg)' : ''}</div>
            </div>
          </div>
        </div>
        ${labSection}
        <div class="form-section">
          <div class="form-section-title">用药及健康指导</div>
          <div class="form-grid">
            <div class="form-group">
              <div class="form-label">当前用药</div>
              <div class="form-value">${item.medication}</div>
            </div>
            <div class="form-group">
              <div class="form-label">用药调整</div>
              <div class="form-value">${item.adjust}</div>
            </div>
            <div class="form-group form-full">
              <div class="form-label">健康指导</div>
              <div class="form-textarea">${item.guidance.replace(/\n/g, '<br>')}</div>
            </div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">随访历史时间线</div>
          <div class="timeline">
            ${timelineHtml}
          </div>
        </div>
      `;
    }

          <div class="form-group">
            <label class="form-label">随访日期</label>
            <input type="date" class="form-input" value="${item.date || item.planDate}">
          </div>
          <div class="form-group">
            <label class="form-label">随访方式</label>
            <select class="form-select">
              <option selected>${item.method}</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">收缩压 (mmHg)</label>
            <input type="number" class="form-input" value="${item.bp.split('/')[0] || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">舒张压 (mmHg)</label>
            <input type="number" class="form-input" value="${item.bp.split('/')[1] || ''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">空腹血糖 (mmol/L)</label>
            <input type="number" class="form-input" step="0.1" value="${item.glucose || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">糖化血红蛋白 (%)</label>
            <input type="number" class="form-input" step="0.1" value="${item.hba1c || ''}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">当前症状</label>
          <input type="text" class="form-input" value="${item.symptom}">
        </div>
        <div class="form-group">
          <label class="form-label">用药调整</label>
          <input type="text" class="form-input" value="${item.adjust}">
        </div>
        <div class="form-group">
          <label class="form-label">健康指导</label>
          <input type="text" class="form-input" value="${item.guidance.replace(/<br>/g, '')}">
        </div>
      `, '<button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="closeModal();alert(\'随访记录已保存！\')">保存</button>');
    }

    function openPrintFollowupModal(name, code) {
      openModal('打印随访记录', `
        <div style="text-align:center;padding:10px 0;">
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">确定要打印${name}的随访记录吗？</p>
          <p style="font-size:12px;color:var(--text-tertiary);">随访编号：${code}</p>
        </div>
        <div class="form-group">
          <label class="form-label">打印格式</label>
          <select class="form-select">
            <option>标准随访记录表</option>
            <option>详细检验报告</option>
            <option>简明健康摘要</option>
          </select>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" checked style="width:14px;height:14px;">
            <span style="font-size:13px;color:var(--text-primary);">包含历史记录</span>
          </label>
        </div>
      `, '<button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="closeModal();alert(\'正在准备打印...\');setTimeout(()=>alert(\'随访记录已发送至打印机！\'),1000)">打印</button>');
    }

    renderList();
  </script>
</body>

</html>
