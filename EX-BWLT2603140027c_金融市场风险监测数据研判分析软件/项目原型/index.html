<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金融市场风险监测数据研判分析软件</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans SC',sans-serif;background:#0a0a12;color:#cdd6f4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    h1{font-size:24px;font-weight:600;margin-bottom:30px;color:#cdd6f4}
    .module-list{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;max-width:800px}
    .module-link{display:block;padding:20px 30px;background:#1e1e2e;border:1px solid rgba(255,255,255,.04);border-radius:8px;text-decoration:none;color:#cdd6f4;transition:all .2s;font-size:14px;text-align:center}
    .module-link:hover{background:#2a2a3c;border-color:rgba(137,180,250,.2);color:#89b4fa}
    .module-link span{display:block;font-size:11px;color:#6c7086;margin-top:5px}
  </style>
</head>
<body>
  <h1>金融市场风险监测数据研判分析软件</h1>
  <div class="module-list">
    <a href="dashboard.html" class="module-link">风险总览<span>综合风险指标与预警</span></a>
    <a href="market.html" class="module-link">市场监测<span>全球市场行情分析</span></a>
    <a href="credit.html" class="module-link">信用风险<span>信用债市场监测</span></a>
    <a href="liquidity.html" class="module-link">流动性分析<span>资金面与央行操作</span></a>
    <a href="stress.html" class="module-link">压力测试<span>多情景分析</span></a>
    <a href="var.html" class="module-link">VaR模型<span>在险价值计算</span></a>
    <a href="correlation.html" class="module-link">关联分析<span>跨市场相关性</span></a>
    <a href="system.html" class="module-link">系统设置<span>配置与参数管理</span></a>
  </div>
</body>
</html>
