<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a56a0">
  <title>个人资料</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #e8edf2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .phone-shell {
      width: 100%;
      height: 100vh;
      background: #fff;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #1a56a0;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .back-btn {
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
    }

    .topbar-title {
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      flex: 1;
      text-align: center;
    }

    .topbar-right {
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px 16px;
    }

    .scroll-area::-webkit-scrollbar {
      display: none;
    }

    .avatar-section {
      text-align: center;
      padding: 20px 0;
      margin-bottom: 14px;
    }

    .avatar-wrap {
      position: relative;
      display: inline-block;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e8f1ff;
    }

    .avatar-edit-btn {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1a56a0;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      border: 2px solid #fff;
    }

    .avatar-tip {
      font-size: 11px;
      color: #90a0b5;
      margin-top: 10px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(26, 86, 160, 0.05);
    }

    .card-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f4fb;
      cursor: pointer;
      transition: background 0.2s;
    }

    .card-item:last-child {
      border-bottom: none;
    }

    .card-item:active {
      background: #f8f9fb;
    }

    .card-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .card-item-content {
      flex: 1;
    }

    .card-item-label {
      font-size: 12px;
      color: #90a0b5;
      margin-bottom: 2px;
    }

    .card-item-value {
      font-size: 14px;
      color: #1a2a44;
      font-weight: 500;
    }

    .card-item-arrow {
      color: #c0ccd8;
      font-size: 12px;
    }

    .card-item-input {
      flex: 1;
      border: none;
      font-size: 14px;
      color: #1a2a44;
      font-family: 'Noto Sans SC', sans-serif;
      background: transparent;
    }

    .card-item-input:focus {
      outline: none;
    }

    .card-item-input::placeholder {
      color: #b0c4e0;
    }

    .save-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a56a0, #3a8ee8);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .save-btn:active {
      transform: scale(0.98);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: flex-end;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: #fff;
      width: 100%;
      max-height: 50vh;
      border-radius: 20px 20px 0 0;
      padding: 0 0 20px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f4fb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: #1a2a44;
      text-align: center;
      flex: 1;
    }

    .modal-close {
      color: #b0bec5;
      font-size: 18px;
      cursor: pointer;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      max-height: calc(50vh - 60px);
    }

    .confirm-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #e6f9f0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto 16px;
      font-size: 28px;
      color: #1a9c5a;
    }

    .confirm-text {
      text-align: center;
      font-size: 15px;
      color: #1a2a44;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .confirm-sub {
      text-align: center;
      font-size: 12px;
      color: #90a0b5;
      margin-bottom: 20px;
    }

    .modal-btn-row {
      display: flex;
      gap: 10px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      border: none;
    }

    .modal-btn-cancel {
      background: #f4f6fb;
      color: #7090b0;
    }

    .modal-btn-confirm {
      background: #1a56a0;
      color: #fff;
    }

    .modal-btn:active, .save-btn:active, .card-item:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>
  <div class="phone-shell">
    <div class="topbar">
      <a href="profile.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
      <span class="topbar-title">个人资料</span>
      <span class="topbar-right" onclick="showSaveModal()">保存</span>
    </div>

    <div class="scroll-area">
      <div class="avatar-section">
        <div class="avatar-wrap">
          <img class="avatar" src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=240&h=240&fit=crop&crop=faces&q=80" alt="">
          <div class="avatar-edit-btn"><i class="fas fa-camera"></i></div>
        </div>
        <div class="avatar-tip">点击头像更换</div>
      </div>

      <div class="card">
        <div class="card-item">
          <div class="card-item-icon" style="background:#e8f1ff;color:#1a56a0;"><i class="fas fa-user"></i></div>
          <div class="card-item-content">
            <div class="card-item-label">姓名</div>
            <input type="text" class="card-item-input" value="于露">
          </div>
          <i class="fas fa-chevron-right card-item-arrow"></i>
        </div>
        <div class="card-item">
          <div class="card-item-icon" style="background:#f2eeff;color:#6c35d4;"><i class="fas fa-venus"></i></div>
          <div class="card-item-content">
            <div class="card-item-label">性别</div>
            <div class="card-item-value">女</div>
          </div>
          <i class="fas fa-chevron-right card-item-arrow"></i>
        </div>
        <div class="card-item">
          <div class="card-item-icon" style="background:#fff3e6;color:#e07020;"><i class="fas fa-birthday-cake"></i></div>
          <div class="card-item-content">
            <div class="card-item-label">出生年月</div>
            <input type="text" class="card-item-input" value="1985年9月">
          </div>
          <i class="fas fa-chevron-right card-item-arrow"></i>
        </div>
        <div class="card-item">
          <div class="card-item-icon" style="background:#e6f9f0;color:#1a9c5a;"><i class="fas fa-phone"></i></div>
          <div class="card-item-content">
            <div class="card-item-label">联系电话</div>
            <input type="text" class="card-item-input" value="138****6789">
          </div>
          <i class="fas fa-chevron-right card-item-arrow"></i>
        </div>
      </div>

      <div class="card">
        <div class="card-item">
          <div class="card-item-icon" style="background:#ffeef5;color:#c42882;"><i class="fas fa-school"></i></div>
          <div class="card-item-content">
            <div class="card-item-label">所属学校</div>
            <div class="card-item-value">中职技术学院</div>
          </div>
          <i class="fas fa-chevron-right card-item-arrow"></i>
        </div>
        <div class="card-item">
          <div class="card-item-icon" style="background:#e5f7f7;color:#1a8a8a;"><i class="fas fa-users"></i></div>
          <div class="card-item-content">
            <div class="card-item-label">所属部门</div>
            <div class="card-item-value">数学教研组</div>
          </div>
          <i class="fas fa-chevron-right card-item-arrow"></i>
        </div>
        <div class="card-item">
          <div class="card-item-icon" style="background:#fffbe6;color:#c8900a;"><i class="fas fa-briefcase"></i></div>
          <div class="card-item-content">
            <div class="card-item-label">职务</div>
            <div class="card-item-value">主任教师</div>
          </div>
          <i class="fas fa-chevron-right card-item-arrow"></i>
        </div>
      </div>

      <button class="save-btn" onclick="showSaveModal()">保存修改</button>

      <div style="height:20px;"></div>
    </div>

    <div class="modal-overlay" id="saveModal">
      <div class="modal-content">
        <div class="modal-header">
          <span style="width:24px;"></span>
          <span class="modal-title">确认保存</span>
          <span class="modal-close" onclick="closeSaveModal()"><i class="fas fa-times"></i></span>
        </div>
        <div class="modal-body">
          <div class="confirm-icon"><i class="fas fa-check"></i></div>
          <div class="confirm-text">是否保存个人资料的修改？</div>
          <div class="confirm-sub">修改后的信息将同步到您的账号</div>
          <div class="modal-btn-row">
            <div class="modal-btn modal-btn-cancel" onclick="closeSaveModal()">取消</div>
            <div class="modal-btn modal-btn-confirm" onclick="saveProfile()">确认保存</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showSaveModal() {
      document.getElementById('saveModal').classList.add('active');
    }

    function closeSaveModal() {
      document.getElementById('saveModal').classList.remove('active');
    }

    function saveProfile() {
      closeSaveModal();
      alert('个人资料已保存');
      window.location.href = 'profile.html';
    }

    document.getElementById('saveModal').addEventListener('click', function(e) {
      if (e.target === this) closeSaveModal();
    });
  </script>
</body>

</html>
