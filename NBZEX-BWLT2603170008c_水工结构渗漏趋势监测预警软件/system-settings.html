<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水工结构渗漏趋势监测预警软件 - 系统设置</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: #808080; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .window { width: 1280px; height: 800px; background: #f0f0f0; border: 1px solid #404040; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
        .title-bar { height: 32px; background: linear-gradient(180deg, #1a3a5c 0%, #0d2137 100%); display: flex; align-items: center; justify-content: space-between; padding: 0 4px 0 10px; }
        .title-left { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 12px; }
        .title-left i { font-size: 14px; color: #6cb2eb; }
        .title-user { margin-left: 30px; color: #a8c8e8; font-size: 11px; }
        .window-controls { display: flex; }
        .win-btn { width: 46px; height: 100%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .win-btn:hover { background: rgba(255,255,255,0.1); }
        .win-btn.close-btn:hover { background: #e81123; }
        .menu-bar { height: 26px; background: #f5f5f5; border-bottom: 1px solid #d0d0d0; display: flex; align-items: center; padding: 0 4px; font-size: 12px; }
        .menu-item { padding: 4px 12px; cursor: pointer; position: relative; }
        .menu-item:hover { background: #e5e5e5; }
        .menu-dropdown { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #ccc; box-shadow: 3px 3px 10px rgba(0,0,0,0.2); min-width: 180px; z-index: 1000; }
        .menu-item:hover .menu-dropdown { display: block; }
        .dropdown-item { padding: 6px 24px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 10px; }
        .dropdown-item:hover { background: #0078d4; color: #fff; }
        .menu-sep { height: 1px; background: #d0d0d0; margin: 4px 0; }
        .toolbar { height: 38px; background: linear-gradient(180deg, #fafafa 0%, #e8e8e8 100%); border-bottom: 1px solid #b0b0b0; display: flex; align-items: center; padding: 0 8px; gap: 4px; }
        .tool-btn { padding: 4px 10px; border: 1px solid #b0b0b0; background: linear-gradient(180deg, #fff 0%, #e8e8e8 100%); cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .tool-btn:hover { background: linear-gradient(180deg, #e5f3ff 0%, #cce8ff 100%); border-color: #0078d4; transform: translateY(-1px); }
        .tool-btn i { font-size: 12px; color: #1a3a5c; }
        .main-area { flex: 1; display: flex; background: #d4d4d4; padding: 10px; overflow: hidden; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .page-title { font-size: 14px; font-weight: bold; color: #1a3a5c; }
        .breadcrumb { font-size: 11px; color: #666; }
        .breadcrumb a { color: #0078d4; text-decoration: none; }
        .settings-container { flex: 1; display: flex; gap: 12px; }
        .settings-nav { width: 200px; background: #fff; border: 1px solid #808080; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: all 0.2s; font-size: 12px; }
        .nav-item:hover { background: #e5f3ff; }
        .nav-item.active { background: linear-gradient(90deg, #e5f3ff 0%, #fff 100%); border-left: 3px solid #0078d4; font-weight: bold; }
        .nav-item i { width: 20px; margin-right: 8px; }
        .settings-content { flex: 1; background: #fff; border: 1px solid #808080; display: flex; flex-direction: column; }
        .panel-head { height: 28px; background: linear-gradient(180deg, #1a3a5c 0%, #0d2137 100%); color: #fff; padding: 0 12px; display: flex; align-items: center; font-size: 12px; font-weight: bold; }
        .panel-head i { margin-right: 8px; }
        .panel-body { flex: 1; padding: 16px; overflow-y: auto; }
        .status-bar { height: 26px; background: #f0f0f0; border-top: 1px solid #b0b0b0; display: flex; align-items: center; padding: 0 12px; font-size: 11px; color: #555; }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #1a3a5c; color: #fff; padding: 10px 24px; font-size: 12px; box-shadow: 2px 2px 10px rgba(0,0,0,0.3); z-index: 3000; display: none; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #c0392b; }
        .toast.show { display: block; }
        .modal-mask { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-mask.show { display: flex; }
        .modal-box { background: #f0f0f0; border: 1px solid #404040; box-shadow: 5px 5px 20px rgba(0,0,0,0.4); min-width: 520px; max-width: 720px; max-height: 85vh; display: flex; flex-direction: column; }
        .modal-head { height: 30px; background: linear-gradient(180deg, #1a3a5c 0%, #0d2137 100%); color: #fff; padding: 0 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; position: relative; }
        .modal-close { position: absolute; right: 10px; width: 24px; height: 24px; background: transparent; border: none; color: #fff; cursor: pointer; font-size: 18px; }
        .modal-close:hover { background: #e81123; }
        .modal-content { padding: 16px; overflow-y: auto; max-height: calc(85vh - 100px); }
        .modal-foot { padding: 12px 16px; background: #e0e0e0; border-top: 1px solid #c0c0c0; display: flex; justify-content: flex-end; gap: 10px; }
        .btn-ok { padding: 6px 22px; font-size: 12px; background: linear-gradient(180deg, #4a90d9 0%, #2d6aa0 100%); color: #fff; border: 1px solid #2d6aa0; cursor: pointer; }
        .btn-ok:hover { background: linear-gradient(180deg, #5a9fe9 0%, #3d7ab0 100%); }
        .btn-cancel { padding: 6px 22px; font-size: 12px; background: linear-gradient(180deg, #f5f5f5 0%, #ddd 100%); border: 1px solid #888; cursor: pointer; }
        .btn-cancel:hover { background: linear-gradient(180deg, #fff 0%, #eee 100%); }
        .form-section { border: 1px solid #c0c0c0; padding: 14px; margin-bottom: 14px; background: #fafafa; }
        .section-title { font-size: 12px; font-weight: bold; color: #1a3a5c; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #d0d0d0; }
        .form-row { display: flex; gap: 20px; margin-bottom: 10px; }
        .form-group { flex: 1; display: flex; align-items: center; }
        .form-group label { width: 120px; text-align: right; padding-right: 10px; font-size: 12px; color: #333; }
        .form-group label.req::after { content: ' *'; color: #c0392b; }
        .form-group input, .form-group select { flex: 1; padding: 5px 8px; font-size: 12px; border: 1px solid #a0a0a0; background: #fff; }
        .form-group textarea { flex: 1; padding: 5px 8px; font-size: 12px; border: 1px solid #a0a0a0; background: #fff; resize: vertical; }
        .action-bar { padding: 12px 16px; background: #f5f5f5; border-top: 1px solid #d0d0d0; display: flex; justify-content: flex-end; gap: 10px; }
        .act-btn { padding: 6px 18px; font-size: 12px; border: 1px solid #a0a0a0; background: linear-gradient(180deg, #fff 0%, #e8e8e8 100%); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .act-btn:hover { background: linear-gradient(180deg, #e5f3ff 0%, #cce8ff 100%); border-color: #0078d4; }
        .act-btn.primary { background: linear-gradient(180deg, #4a90d9 0%, #2d6aa0 100%); color: #fff; border-color: #2d6aa0; }
        .act-btn.primary:hover { background: linear-gradient(180deg, #5a9fe9 0%, #3d7ab0 100%); }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-left">
                <i class="fas fa-water"></i>
                <span>水工结构渗漏趋势监测预警软件</span>
                <span class="title-user">当前用户：李宁</span>
            </div>
            <div class="window-controls">
                <button class="win-btn" title="最小化"><span class="min-icon"></span></button>
                <button class="win-btn" title="最大化"><span class="max-icon"></span></button>
                <button class="win-btn close-btn" title="关闭" onclick="exitApp()"><span class="close-icon"></span></button>
            </div>
        </div>

        <div class="menu-bar">
            <div class="menu-item"><i class="fas fa-file"></i> 文件
                <div class="menu-dropdown">
                    <div class="dropdown-item" onclick="location.href='dashboard.html'"><i class="fas fa-home"></i> 系统主页</div>
                    <div class="menu-sep"></div>
                    <div class="dropdown-item" onclick="exitApp()"><i class="fas fa-sign-out-alt"></i> 退出</div>
                </div>
            </div>
            <div class="menu-item"><i class="fas fa-chart-bar"></i> 视图
                <div class="menu-dropdown">
                    <div class="dropdown-item" onclick="location.href='dashboard.html'"><i class="fas fa-home"></i> 系统主页</div>
                    <div class="dropdown-item" onclick="location.href='monitoring-points.html'"><i class="fas fa-map-marker-alt"></i> 监测点管理</div>
                    <div class="dropdown-item" onclick="location.href='data-collection.html'"><i class="fas fa-database"></i> 数据采集</div>
                    <div class="dropdown-item" onclick="location.href='alert-management.html'"><i class="fas fa-bell"></i> 预警管理</div>
                    <div class="dropdown-item" onclick="location.href='trend-analysis.html'"><i class="fas fa-chart-line"></i> 趋势分析</div>
                    <div class="menu-sep"></div>
                    <div class="dropdown-item" onclick="location.href='report-management.html'"><i class="fas fa-file-alt"></i> 报表管理</div>
                    <div class="dropdown-item" onclick="location.href='device-management.html'"><i class="fas fa-cogs"></i> 设备管理</div>
                    <div class="dropdown-item" onclick="location.href='user-management.html'"><i class="fas fa-users"></i> 用户管理</div>
                    <div class="dropdown-item" onclick="location.href='system-settings.html'"><i class="fas fa-cog"></i> 系统设置</div>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <button class="tool-btn" onclick="toast('配置已保存','success')"><i class="fas fa-save"></i>保存配置</button>
            <button class="tool-btn" onclick="toast('配置已重置','')"><i class="fas fa-undo"></i>重置</button>
        </div>

        <div class="main-area">
            <div class="page-header">
                <div class="page-title"><i class="fas fa-cog"></i> 系统设置</div>
                <div class="breadcrumb"><a href="dashboard.html">系统主页</a> &gt; 系统设置</div>
            </div>

            <div class="settings-container">
                <div class="settings-nav">
                    <div class="nav-item active" onclick="selectNav(this)"><i class="fas fa-cog"></i>基本设置</div>
                    <div class="nav-item" onclick="selectNav(this)"><i class="fas fa-bell"></i>预警设置</div>
                    <div class="nav-item" onclick="selectNav(this)"><i class="fas fa-database"></i>数据采集设置</div>
                    <div class="nav-item" onclick="selectNav(this)"><i class="fas fa-chart-line"></i>分析参数设置</div>
                    <div class="nav-item" onclick="selectNav(this)"><i class="fas fa-folder"></i>工程设置</div>
                    <div class="nav-item" onclick="selectNav(this)"><i class="fas fa-shield-alt"></i>安全设置</div>
                </div>

                <div class="settings-content">
                    <div class="panel-head">
                        <i class="fas fa-cog"></i> 基本设置
                    </div>
                    <div class="panel-body">
                        <div class="form-section">
                            <div class="section-title">工程信息</div>
                            <div class="form-group">
                                <label class="req">工程名称</label>
                                <input type="text" value="龙门水库大坝安全监测工程">
                            </div>
                            <div class="form-group">
                                <label>工程地点</label>
                                <input type="text" value="某省某市龙门镇">
                            </div>
                            <div class="form-group">
                                <label>建设单位</label>
                                <input type="text" value="龙门水库管理处">
                            </div>
                            <div class="form-group">
                                <label>设计单位</label>
                                <input type="text" value="某省水利设计院">
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="section-title">系统参数</div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>采集间隔 (分钟)</label>
                                    <input type="number" value="60" min="1" max="1440">
                                </div>
                                <div class="form-group">
                                    <label>数据保留天数</label>
                                    <input type="number" value="3650" min="30">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>时区</label>
                                    <select>
                                        <option selected>UTC+8 北京时间</option>
                                        <option>UTC+7</option>
                                        <option>UTC+9</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>语言</label>
                                    <select>
                                        <option selected>简体中文</option>
                                        <option>English</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="section-title">联系信息</div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>负责人</label>
                                    <input type="text" value="李宁">
                                </div>
                                <div class="form-group">
                                    <label>联系电话</label>
                                    <input type="text" value="010-88888888">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>备注说明</label>
                                <textarea rows="3" placeholder="请输入备注信息">龙门水库大坝安全监测系统，负责大坝、副坝、泄洪洞等建筑物的渗流监测工作。</textarea>
                            </div>
                        </div>
                    </div>
                    <div class="action-bar">
                        <button class="act-btn primary" onclick="toast('配置已保存','success')"><i class="fas fa-save"></i>保存配置</button>
                        <button class="act-btn" onclick="toast('配置已重置','')"><i class="fas fa-undo"></i>重置</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <span>工程：龙门水库大坝安全监测工程</span>
            <span>系统状态：正常</span>
            <span class="status-right" style="margin-left:auto;">就绪</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 预警设置面板 -->
    <div class="modal-mask" id="alertSettingsModal">
        <div class="modal-box" style="width:620px;">
            <div class="modal-head">
                <span>预警阈值设置</span>
                <button class="modal-close" onclick="closeModal('alertSettingsModal')">×</button>
            </div>
            <div class="modal-content">
                <div class="form-section">
                    <div class="section-title">渗流量预警阈值</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="req">蓝色预警值</label>
                            <input type="number" value="5.0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label class="req">单位</label>
                            <input type="text" value="L/min" readonly>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="req">黄色预警值</label>
                            <input type="number" value="6.0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label class="req">单位</label>
                            <input type="text" value="L/min" readonly>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="req">橙色预警值</label>
                            <input type="number" value="7.0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label class="req">单位</label>
                            <input type="text" value="L/min" readonly>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="req">红色预警值</label>
                            <input type="number" value="8.0" step="0.1">
                        </div>
                        <div class="form-group">
                            <label class="req">单位</label>
                            <input type="text" value="L/min" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn-ok" onclick="toast('预警设置已保存','success');closeModal('alertSettingsModal')">保存</button>
                <button class="btn-cancel" onclick="closeModal('alertSettingsModal')">取消</button>
            </div>
        </div>
    </div>

    <script>
        function toast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show ' + (type || ''); setTimeout(() => t.classList.remove('show'), 2000); }
        function selectNav(item) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); item.classList.add('active'); toast('切换设置面板',''); }
        function exitApp() { if (confirm('确定要退出程序吗？')) { window.location.href = 'login.html'; } }
    </script>
</body>
</html>
