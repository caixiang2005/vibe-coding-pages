<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水工结构渗漏趋势监测预警软件 - 用户登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .login-logo {
            text-align: center;
            color: #fff;
        }

        .login-logo i {
            font-size: 120px;
            color: #6cb2eb;
            margin-bottom: 20px;
        }

        .login-logo h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .login-logo p {
            font-size: 14px;
            color: #a8c8e8;
        }

        .login-box {
            width: 420px;
            background: #f0f0f0;
            border: 1px solid #404040;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            padding: 30px;
        }

        .login-head {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-head h2 {
            font-size: 20px;
            color: #1a3a5c;
            font-weight: bold;
        }

        .login-head p {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            align-items: center;
        }

        .form-group label {
            width: 80px;
            text-align: right;
            padding-right: 12px;
            font-size: 13px;
            color: #333;
        }

        .form-group input {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
            border: 1px solid #a0a0a0;
            background: #fff;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 5px rgba(0,120,212,0.3);
        }

        .form-group i {
            width: 35px;
            text-align: center;
            color: #1a3a5c;
            font-size: 14px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            border: 1px solid #a0a0a0;
            background: #fff;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #0078d4;
            box-shadow: 0 0 5px rgba(0,120,212,0.3);
        }

        .input-wrapper input {
            border: none;
            flex: 1;
        }

        .input-wrapper input:focus {
            outline: none;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .remember-me input {
            cursor: pointer;
        }

        .forgot-password {
            color: #0078d4;
            cursor: pointer;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(180deg, #4a90d9 0%, #2d6aa0 100%);
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .login-btn:hover {
            background: linear-gradient(180deg, #5a9fe9 0%, #3d7ab0 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,120,212,0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-tips {
            text-align: center;
            font-size: 12px;
            color: #666;
            padding-top: 15px;
            border-top: 1px solid #d0d0d0;
        }

        .login-tips a {
            color: #0078d4;
            text-decoration: none;
            margin: 0 8px;
        }

        .login-tips a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a3a5c;
            color: #fff;
            padding: 10px 24px;
            font-size: 13px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            z-index: 3000;
            display: none;
            border-radius: 4px;
        }

        .toast.success { background: #27ae60; }
        .toast.error { background: #c0392b; }
        .toast.show { display: block; animation: slideDown 0.3s ease; }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <i class="fas fa-water"></i>
            <h1>水工结构渗漏趋势监测预警软件</h1>
            <p>Hydraulic Structure Seepage Trend Monitoring and Early Warning Software</p>
        </div>

        <div class="login-box">
            <div class="login-head">
                <h2>用户登录</h2>
                <p>请输入用户名和密码进行登录</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i></label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="请输入用户名" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i></label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-shield-alt"></i></label>
                    <div class="input-wrapper">
                        <input type="text" id="captcha" placeholder="请输入验证码" required style="flex:1.5;">
                        <span id="captchaCode" style="padding: 8px 12px; font-weight: bold; color: #1a3a5c; background: #e8e8e8; cursor: pointer; user-select: none;" onclick="refreshCaptcha()" title="点击刷新">A7B9</span>
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> 记住密码
                    </label>
                    <a href="#" class="forgot-password" onclick="toast('请联系管理员重置密码','error'); return false;">忘记密码？</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>

            <div class="login-tips">
                <a href="#" onclick="toast('默认账号：admin / 密码：123456',''); return false;">默认账号</a>
                <span>|</span>
                <a href="#" onclick="toast('首次使用请联系管理员初始化系统',''); return false;">新手指南</a>
                <span>|</span>
                <a href="#" onclick="toast('技术支持电话：400-888-8888',''); return false;">技术支持</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentCaptcha = 'A7B9';

        function refreshCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let result = '';
            for (let i = 0; i < 4; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = result;
            document.getElementById('captchaCode').textContent = result;
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value.toUpperCase();
            const btn = document.getElementById('loginBtn');

            if (captcha !== currentCaptcha) {
                toast('验证码错误，请重新输入', 'error');
                refreshCaptcha();
                document.getElementById('captcha').value = '';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>登录中...';

            setTimeout(() => {
                if (username === 'admin' && password === '123456') {
                    toast('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    toast('用户名或密码错误', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登录';
                    refreshCaptcha();
                    document.getElementById('captcha').value = '';
                }
            }, 1500);
        }

        function toast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + (type || '');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F5') {
                e.preventDefault();
                refreshCaptcha();
            }
        });

        refreshCaptcha();
    </script>
</body>
</html>
