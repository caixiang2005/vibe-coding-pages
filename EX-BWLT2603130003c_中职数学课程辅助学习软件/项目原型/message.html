<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>消息通知 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--shadow-lg:0 8px 32px rgba(74,108,247,0.12);--radius:16px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}
    .sub-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .sub-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
    .sub-back:active{transform:scale(0.9)}
    .sub-title{color:#fff;font-size:17px;font-weight:700;flex:1}
    .sub-body{padding:16px}
    .msg-item{display:flex;gap:12px;padding:14px;background:var(--card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s}
    .msg-item:active{transform:scale(0.98);background:#F8FAFF}
    .msg-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .msg-content{flex:1}
    .msg-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
    .msg-desc{font-size:12px;color:var(--text-light);line-height:1.5}
    .msg-time{font-size:11px;color:var(--text-light);flex-shrink:0}
    .msg-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:all 0.3s}
    .modal-overlay.show{opacity:1;pointer-events:auto}
    .modal{background:var(--card);border-radius:var(--radius);width:85%;max-width:320px;transform:scale(0.9);transition:all 0.3s}
    .modal.show{transform:scale(1)}
    .modal-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:16px;border-radius:var(--radius) var(--radius) 0 0;text-align:center}
    .modal-title{color:#fff;font-size:16px;font-weight:700}
    .modal-body{padding:20px}
    .modal-text{font-size:14px;color:var(--text);line-height:1.7;text-align:center}
    .modal-btn{display:block;width:100%;padding:14px;background:var(--primary);color:#fff;font-size:15px;font-weight:600;border:none;border-radius:0 0 var(--radius) var(--radius);cursor:pointer;font-family:inherit;transition:all 0.2s}
    .modal-btn:active{background:var(--primary-dark)}
    .modal-btn.secondary{background:var(--bg);color:var(--text)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="sub-header">
        <div class="sub-back" onclick="location.href='home.html'"><i class="ri-arrow-left-s-line"></i></div>
        <div class="sub-title">消息通知</div>
      </div>
      <div class="sub-body">
        <div class="msg-item" onclick="showMsgModal('恭喜您完成今日学习任务，获得 10 积分奖励！','系统通知')">
          <div class="msg-icon" style="background:#E8EDFF;color:var(--primary)"><i class="ri-gift-2-line"></i></div>
          <div class="msg-content">
            <div class="msg-title">学习任务完成</div>
            <div class="msg-desc">恭喜您完成今日学习任务，获得10积分奖励！</div>
          </div>
          <div>
            <div class="msg-time">刚刚</div>
            <div class="msg-dot"></div>
          </div>
        </div>
        <div class="msg-item" onclick="showMsgModal('您收藏的公式已被更新，点击查看最新内容。','公式更新')">
          <div class="msg-icon" style="background:#F0F4FF;color:var(--accent-purple)"><i class="ri-functions"></i></div>
          <div class="msg-content">
            <div class="msg-title">公式更新提醒</div>
            <div class="msg-desc">您收藏的公式已被更新，点击查看最新内容。</div>
          </div>
          <div>
            <div class="msg-time">10分钟前</div>
            <div class="msg-dot"></div>
          </div>
        </div>
        <div class="msg-item" onclick="showMsgModal('您的错题「一元二次方程」已连续掌握3次，再巩固2次即可移除。','学习提醒')">
          <div class="msg-icon" style="background:#FFF0F0;color:var(--accent)"><i class="ri-error-warning-line"></i></div>
          <div class="msg-content">
            <div class="msg-title">错题巩固提醒</div>
            <div class="msg-desc">您的错题「一元二次方程」已连续掌握3次...</div>
          </div>
          <div>
            <div class="msg-time">1小时前</div>
            <div class="msg-dot"></div>
          </div>
        </div>
        <div class="msg-item" onclick="showMsgModal('检测到您的学习数据异常，请检查网络后重新登录。','系统通知')">
          <div class="msg-icon" style="background:#ECFDF5;color:var(--accent-green)"><i class="ri-checkbox-circle-line"></i></div>
          <div class="msg-content">
            <div class="msg-title">系统提示</div>
            <div class="msg-desc">检测到您的学习数据异常，请检查网络后重新登录。</div>
          </div>
          <div class="msg-time">昨天</div>
        </div>
        <div class="msg-item" onclick="showMsgModal('您的好友「李明」向您发起了一场知识点挑战，快去应战吧！','学习互动')">
          <div class="msg-icon" style="background:#FEF3C7;color:var(--accent-orange)"><i class="ri-fire-line"></i></div>
          <div class="msg-content">
            <div class="msg-title">好友挑战</div>
            <div class="msg-desc">您的好友「李明」向您发起了一场知识点挑战...</div>
          </div>
          <div class="msg-time">2天前</div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="modal-title" id="modalTitle">消息详情</div>
        </div>
        <div class="modal-body">
          <div class="modal-text" id="modalText"></div>
        </div>
        <button class="modal-btn" onclick="closeModal()">确定</button>
      </div>
    </div>
  </div>
  <script>
    function showMsgModal(text,title){
      document.getElementById('modalTitle').textContent=title;
      document.getElementById('modalText').textContent=text;
      document.getElementById('modalOverlay').classList.add('show');
    }
    function closeModal(e){
      if(e&&e.target!==document.getElementById('modalOverlay'))return;
      document.getElementById('modalOverlay').classList.remove('show');
    }
  </script>
</body>
</html>
