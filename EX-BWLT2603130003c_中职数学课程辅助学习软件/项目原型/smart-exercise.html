<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>智能出题 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--radius:16px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}
    .sub-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .sub-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
    .sub-back:active{transform:scale(0.9)}
    .sub-title{color:#fff;font-size:17px;font-weight:700;flex:1}
    .sub-body{padding:16px}
    .config-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
    .config-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px}
    .option-group{display:flex;flex-direction:column;gap:10px}
    .option-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:10px;cursor:pointer;transition:all 0.2s}
    .option-item:active{background:#F0F4FF}
    .option-item.selected{background:#E8EDFF;border:1px solid var(--primary)}
    .option-mark{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-light)}
    .option-item.selected .option-mark{border-color:var(--primary);background:var(--primary);color:#fff}
    .option-text{flex:1;font-size:13px;color:var(--text)}
    .generate-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:15px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:16px}
    .generate-btn:active{transform:scale(0.98)}
    .question-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);display:none}
    .question-card.show{display:block}
    .question-type{font-size:11px;color:var(--primary);font-weight:600;margin-bottom:8px}
    .question-text{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:12px}
    .question-options{display:flex;flex-direction:column;gap:8px}
    .question-opt{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:8px;cursor:pointer}
    .question-opt:active{background:#F0F4FF}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="sub-header">
        <div class="sub-back" onclick="goBack()"><i class="ri-arrow-left-s-line"></i></div>
        <div class="sub-title">智能出题</div>
      </div>
      <div class="sub-body">
        <div class="config-card">
          <div class="config-title">选择知识点</div>
          <div class="option-group">
            <div class="option-item" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-checkbox-blank-circle-line"></i></div>
              <div class="option-text">集合与函数</div>
            </div>
            <div class="option-item" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-checkbox-blank-circle-line"></i></div>
              <div class="option-text">不等式</div>
            </div>
            <div class="option-item" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-checkbox-blank-circle-line"></i></div>
              <div class="option-text">数列</div>
            </div>
            <div class="option-item" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-checkbox-blank-circle-line"></i></div>
              <div class="option-text">三角函数</div>
            </div>
          </div>
        </div>
        
        <div class="config-card">
          <div class="config-title">难度等级</div>
          <div class="option-group">
            <div class="option-item" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-checkbox-blank-circle-line"></i></div>
              <div class="option-text">基础题</div>
            </div>
            <div class="option-item" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-checkbox-blank-circle-line"></i></div>
              <div class="option-text">提高题</div>
            </div>
            <div class="option-item" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-checkbox-blank-circle-line"></i></div>
              <div class="option-text">综合题</div>
            </div>
          </div>
        </div>
        
        <div class="config-card">
          <div class="config-title">题目数量</div>
          <div class="option-group">
            <div class="option-item" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-checkbox-blank-circle-line"></i></div>
              <div class="option-text">5 道题</div>
            </div>
            <div class="option-item selected" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-radio-button-line"></i></div>
              <div class="option-text">10 道题</div>
            </div>
            <div class="option-item" onclick="selectOption(this)">
              <div class="option-mark"><i class="ri-checkbox-blank-circle-line"></i></div>
              <div class="option-text">20 道题</div>
            </div>
          </div>
        </div>
        
        <button class="generate-btn" onclick="generateQuestions()"><i class="ri-ai-generate"></i> 开始智能出题</button>
        
        <div id="questionArea">
          <div class="question-card show">
            <div class="question-type">单选题 · 集合与函数</div>
            <div class="question-text">已知集合 A={1,2,3}，B={2,3,4}，则 A∩B 等于？</div>
            <div class="question-options">
              <div class="question-opt"><span>A. {1,4}</span></div>
              <div class="question-opt"><span>B. {2,3}</span></div>
              <div class="question-opt"><span>C. {1,2,3,4}</span></div>
              <div class="question-opt"><span>D. {1}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script>
    function selectOption(el){
      const group=el.parentElement;
      group.querySelectorAll('.option-item').forEach(item=>{
        item.classList.remove('selected');
        item.querySelector('.option-mark').innerHTML='<i class="ri-checkbox-blank-circle-line"></i>';
      });
      el.classList.add('selected');
      el.querySelector('.option-mark').innerHTML='<i class="ri-radio-button-line"></i>';
    }
    
    function generateQuestions(){
      showToast('正在生成题目...');
      setTimeout(()=>{
        document.getElementById('questionArea').scrollIntoView({behavior:'smooth'});
        showToast('题目生成成功！');
      },1500);
    }
    
    function goBack(){
      if(window.history.length>1){
        window.history.back();
      }else{
        location.href='home.html';
      }
    }
    
    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    }
  </script>
</body>
</html>
