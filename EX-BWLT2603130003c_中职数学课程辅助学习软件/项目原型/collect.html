<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>我的收藏 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--shadow-lg:0 8px 32px rgba(74,108,247,0.12);--radius:16px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}
    .sub-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .sub-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
    .sub-back:active{transform:scale(0.9)}
    .sub-title{color:#fff;font-size:17px;font-weight:700;flex:1}
    .sub-body{padding:16px}
    .tabs{display:flex;gap:0;background:var(--card);padding:4px;border-radius:12px;margin-bottom:16px;box-shadow:var(--shadow)}
    .tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--text-light);border-radius:10px;cursor:pointer;transition:all 0.3s}
    .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(74,108,247,0.3)}
    .collect-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s;position:relative}
    .collect-card:active{transform:scale(0.98)}
    .collect-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .collect-type{font-size:11px;color:var(--primary);font-weight:600;display:flex;align-items:center;gap:4px}
    .collect-remove{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--text-light);font-size:14px;cursor:pointer;transition:all 0.2s}
    .collect-remove:active{background:var(--accent);color:#fff;transform:scale(0.9)}
    .collect-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:6px}
    .collect-preview{font-size:12px;color:var(--text-light);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .collect-meta{font-size:11px;color:var(--text-light);margin-top:8px;display:flex;gap:12px}
    .empty-state{text-align:center;padding:60px 20px}
    .empty-icon{font-size:64px;color:var(--text-light);margin-bottom:16px}
    .empty-text{font-size:14px;color:var(--text-light)}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="sub-header">
        <div class="sub-back" onclick="location.href='home.html'"><i class="ri-arrow-left-s-line"></i></div>
        <div class="sub-title">我的收藏</div>
      </div>
      <div class="sub-body">
        <div class="tabs">
          <div class="tab active" onclick="switchTab(this,'formula')">公式</div>
          <div class="tab" onclick="switchTab(this,'course')">课程</div>
          <div class="tab" onclick="switchTab(this,'article')">文章</div>
        </div>
        <div id="collectList">
          <div class="collect-card" onclick="showToast('查看公式详情')">
            <div class="collect-header">
              <div class="collect-type"><i class="ri-functions"></i> 代数</div>
              <div class="collect-remove" onclick="event.stopPropagation();removeCollect(this)"><i class="ri-close-line"></i></div>
            </div>
            <div class="collect-title">一元二次方程求根公式</div>
            <div class="collect-preview">x = (-b ± √(b²-4ac)) / 2a</div>
            <div class="collect-meta"><span><i class="ri-time-line"></i> 3天前</span></div>
          </div>
          <div class="collect-card" onclick="showToast('查看公式详情')">
            <div class="collect-header">
              <div class="collect-type"><i class="ri-functions"></i> 代数</div>
              <div class="collect-remove" onclick="event.stopPropagation();removeCollect(this)"><i class="ri-close-line"></i></div>
            </div>
            <div class="collect-title">完全平方公式</div>
            <div class="collect-preview">(a ± b)² = a² ± 2ab + b²</div>
            <div class="collect-meta"><span><i class="ri-time-line"></i> 1周前</span></div>
          </div>
          <div class="collect-card" onclick="showToast('查看课程详情')">
            <div class="collect-header">
              <div class="collect-type"><i class="ri-play-circle-line"></i> 课程</div>
              <div class="collect-remove" onclick="event.stopPropagation();removeCollect(this)"><i class="ri-close-line"></i></div>
            </div>
            <div class="collect-title">基础模块·集合与函数</div>
            <div class="collect-preview">第一章：集合的概念与表示</div>
            <div class="collect-meta"><span><i class="ri-time-line"></i> 2天前</span></div>
          </div>
          <div class="collect-card" onclick="showToast('查看文章详情')">
            <div class="collect-header">
              <div class="collect-type"><i class="ri-article-line"></i> 文章</div>
              <div class="collect-remove" onclick="event.stopPropagation();removeCollect(this)"><i class="ri-close-line"></i></div>
            </div>
            <div class="collect-title">二次函数图像与性质解题技巧总结</div>
            <div class="collect-preview">本文总结了二次函数图像平移、对称轴开口方向等解题技巧...</div>
            <div class="collect-meta"><span><i class="ri-time-line"></i> 5天前</span></div>
          </div>
          <div class="collect-card" onclick="showToast('查看公式详情')">
            <div class="collect-header">
              <div class="collect-type"><i class="ri-functions"></i> 几何</div>
              <div class="collect-remove" onclick="event.stopPropagation();removeCollect(this)"><i class="ri-close-line"></i></div>
            </div>
            <div class="collect-title">勾股定理</div>
            <div class="collect-preview">a² + b² = c²</div>
            <div class="collect-meta"><span><i class="ri-time-line"></i> 2周前</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script>
    function switchTab(el,type){
      el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      el.classList.add('active');
      showToast('切换到'+type);
    }
    function removeCollect(el){
      el.closest('.collect-card').style.opacity='0';
      el.closest('.collect-card').style.transform='translateX(100%)';
      setTimeout(()=>{
        el.closest('.collect-card').remove();
        showToast('已取消收藏');
      },300);
    }
    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    }
  </script>
</body>
</html>
