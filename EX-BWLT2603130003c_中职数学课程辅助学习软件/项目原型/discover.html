<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>发现中心 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--shadow-lg:0 8px 32px rgba(74,108,247,0.12);--radius:16px;--bottom-nav:64px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch;padding-bottom:80px}
    .page::-webkit-scrollbar{display:none}
    .bottom-nav{height:var(--bottom-nav);background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;position:fixed;bottom:0;left:0;width:100%;z-index:100}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:all 0.3s;padding:4px 12px}
    .nav-item i{font-size:22px;color:var(--text-light);transition:all 0.3s}
    .nav-item span{font-size:10px;color:var(--text-light);transition:all 0.3s;font-weight:500}
    .nav-item.active i{color:var(--primary)}
    .nav-item.active span{color:var(--primary)}
    .sub-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .sub-title{color:#fff;font-size:17px;font-weight:700;flex:1}
    .sub-body{padding:16px}
    .banner{background:linear-gradient(135deg,var(--primary),var(--accent-purple));border-radius:var(--radius);padding:20px;margin-bottom:16px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.25s}
    .banner:active{transform:scale(0.98)}
    .banner-deco{position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.1)}
    .banner-deco2{position:absolute;bottom:-30px;left:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.05)}
    .banner-title{color:#fff;font-size:18px;font-weight:700;margin-bottom:6px}
    .banner-desc{color:rgba(255,255,255,0.85);font-size:12px}
    .banner-tag{display:inline-block;background:rgba(255,255,255,0.2);color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;margin-bottom:8px;backdrop-filter:blur(8px)}
    .menu-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .menu-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 4px;background:var(--card);border-radius:14px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s}
    .menu-item:active{transform:scale(0.95);background:#F8FAFF}
    .menu-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
    .menu-label{font-size:12px;color:var(--text);font-weight:500;text-align:center}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .section-title{font-size:15px;font-weight:700;color:var(--text)}
    .section-more{font-size:12px;color:var(--primary)}
    .article-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s;display:flex;gap:12px}
    .article-card:active{transform:scale(0.98)}
    .article-thumb{width:70px;height:70px;border-radius:12px;object-fit:cover;flex-shrink:0}
    .article-content{flex:1}
    .article-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:6px}
    .article-meta{font-size:11px;color:var(--text-light)}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="sub-header">
        <div class="sub-title">发现中心</div>
      </div>
      <div class="sub-body">
        <div class="banner" onclick="showChallengeModal()">
          <div class="banner-deco"></div>
          <div class="banner-deco2"></div>
          <div class="banner-tag">限时活动</div>
          <div class="banner-title">知识点挑战赛</div>
          <div class="banner-desc">与全国考生同台竞技，赢取丰厚奖励</div>
        </div>
        
        <div class="menu-grid">
          <div class="menu-item" onclick="location.href='smart-exercise.html'">
            <div class="menu-icon" style="background:linear-gradient(135deg,#4A6CF7,#6B8AFF)"><i class="ri-ai-generate"></i></div>
            <div class="menu-label">智能出题</div>
          </div>
          <div class="menu-item" onclick="location.href='notes.html'">
            <div class="menu-icon" style="background:linear-gradient(135deg,#FF9F43,#FFB976)"><i class="ri-file-edit-line"></i></div>
            <div class="menu-label">学长笔记</div>
          </div>
          <div class="menu-item" onclick="location.href='study-group.html'">
            <div class="menu-icon" style="background:linear-gradient(135deg,#2ED573,#7BF0A5)"><i class="ri-team-line"></i></div>
            <div class="menu-label">学习小组</div>
          </div>
          <div class="menu-item" onclick="location.href='video.html'">
            <div class="menu-icon" style="background:linear-gradient(135deg,#A66CFF,#C9A0FF)"><i class="ri-video-line"></i></div>
            <div class="menu-label">视频课程</div>
          </div>
        </div>
        
        <div class="section-header">
          <div class="section-title">精选文章</div>
          <div class="section-more" onclick="showToast('查看更多文章')">更多 <i class="ri-arrow-right-s-line"></i></div>
        </div>
        
        <div class="article-card" onclick="showArticleDetail('二次函数图像与性质解题技巧总结')">
          <img class="article-thumb" src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=140&h=140&fit=crop" alt="">
          <div class="article-content">
            <div class="article-title">二次函数图像与性质解题技巧总结</div>
            <div class="article-meta"><i class="ri-eye-line"></i> 2.3 万阅读 · <i class="ri-thumb-up-line"></i> 892 点赞</div>
          </div>
        </div>
        
        <div class="article-card" onclick="showArticleDetail('数列求和常见方法及典型例题分析')">
          <img class="article-thumb" src="https://images.unsplash.com/photo-1596495577886-d920f1fb7238?w=140&h=140&fit=crop" alt="">
          <div class="article-content">
            <div class="article-title">数列求和常见方法及典型例题分析</div>
            <div class="article-meta"><i class="ri-eye-line"></i> 1.8 万阅读 · <i class="ri-thumb-up-line"></i> 654 点赞</div>
          </div>
        </div>
        
        <div class="article-card" onclick="showArticleDetail('三角函数诱导公式记忆口诀大全')">
          <img class="article-thumb" src="https://images.unsplash.com/photo-1509228468518-180dd4864904?w=140&h=140&fit=crop" alt="">
          <div class="article-content">
            <div class="article-title">三角函数诱导公式记忆口诀大全</div>
            <div class="article-meta"><i class="ri-eye-line"></i> 3.1 万阅读 · <i class="ri-thumb-up-line"></i> 1205 点赞</div>
          </div>
        </div>
        
        <div style="height:20px;"></div>
      </div>
    </div>
    <div class="bottom-nav">
      <div class="nav-item" onclick="location.href='home.html'"><i class="ri-home-5-line"></i><span>首页</span></div>
      <div class="nav-item" onclick="location.href='study.html'"><i class="ri-book-read-line"></i><span>学习</span></div>
      <div class="nav-item active"><i class="ri-compass-3-fill"></i><span>发现</span></div>
      <div class="nav-item" onclick="location.href='profile.html'"><i class="ri-user-3-line"></i><span>我的</span></div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script>
    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    }
    
    function showChallengeModal(){
      showToast('知识竞赛即将开始...');
    }
    
    function showArticleDetail(title){
      showToast('正在打开：'+title);
    }
  </script>
</body>
</html>
