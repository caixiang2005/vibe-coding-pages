<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>我的勋章 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--radius:16px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}
    .sub-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .sub-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
    .sub-back:active{transform:scale(0.9)}
    .sub-title{color:#fff;font-size:17px;font-weight:700;flex:1}
    .sub-body{padding:16px}
    .stats-card{background:linear-gradient(135deg,var(--primary),var(--accent-purple));border-radius:var(--radius);padding:20px;margin-bottom:16px;color:#fff;text-align:center}
    .stats-num{font-size:36px;font-weight:900;margin-bottom:4px}
    .stats-label{font-size:13px;opacity:0.9}
    .section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px}
    .medal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .medal-item{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s}
    .medal-item:active{transform:scale(0.95)}
    .medal-icon{width:60px;height:60px;margin:0 auto 10px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px}
    .medal-name{font-size:12px;color:var(--text);font-weight:600;margin-bottom:4px}
    .medal-desc{font-size:10px;color:var(--text-light)}
    .medal-item.locked{opacity:0.5}
    .medal-item.locked .medal-icon{background:var(--border)!important;color:var(--text-light)!important}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:all 0.3s}
    .modal-overlay.show{opacity:1;pointer-events:auto}
    .modal{background:var(--card);border-radius:var(--radius);width:85%;max-width:320px;transform:scale(0.9);transition:all 0.3s}
    .modal.show{transform:scale(1)}
    .modal-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:16px;border-radius:var(--radius) var(--radius) 0 0;text-align:center}
    .modal-title{color:#fff;font-size:16px;font-weight:700}
    .modal-body{padding:20px;text-align:center}
    .modal-icon{width:80px;height:80px;margin:0 auto 16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px}
    .modal-text{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:12px}
    .modal-btn{display:block;width:100%;padding:14px;background:var(--primary);color:#fff;font-size:15px;font-weight:600;border:none;border-radius:0 0 var(--radius) var(--radius);cursor:pointer;font-family:inherit;transition:all 0.2s}
    .modal-btn:active{background:var(--primary-dark)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="sub-header">
        <div class="sub-back" onclick="goBack()"><i class="ri-arrow-left-s-line"></i></div>
        <div class="sub-title">我的勋章</div>
      </div>
      <div class="sub-body">
        <div class="stats-card">
          <div class="stats-num">5</div>
          <div class="stats-label">已获得勋章 / 共 12 枚</div>
        </div>
        
        <div class="section-title">已获得勋章</div>
        <div class="medal-grid">
          <div class="medal-item" onclick="showMedalDetail('学习新星','第一周开始学习并获得','background:linear-gradient(135deg,#FFD93D,#FF6B6B);color:#fff')">
            <div class="medal-icon" style="background:linear-gradient(135deg,#FFD93D,#FF6B6B);color:#fff"><i class="ri-star-smile-line"></i></div>
            <div class="medal-name">学习新星</div>
            <div class="medal-desc">首次学习</div>
          </div>
          <div class="medal-item" onclick="showMedalDetail('连续 7 天','连续打卡 7 天并获得','background:linear-gradient(135deg,#2ED573,#7BF0A5);color:#fff')">
            <div class="medal-icon" style="background:linear-gradient(135deg,#2ED573,#7BF0A5);color:#fff"><i class="ri-calendar-check-line"></i></div>
            <div class="medal-name">连续 7 天</div>
            <div class="medal-desc">连续打卡 7 天</div>
          </div>
          <div class="medal-item" onclick="showMedalDetail('刷题达人','完成 100 道练习题并获得','background:linear-gradient(135deg,#4A6CF7,#6B8AFF);color:#fff')">
            <div class="medal-icon" style="background:linear-gradient(135deg,#4A6CF7,#6B8AFF);color:#fff"><i class="ri-file-list-3-line"></i></div>
            <div class="medal-name">刷题达人</div>
            <div class="medal-desc">完成 100 道题</div>
          </div>
          <div class="medal-item" onclick="showMedalDetail('满分王者','考试获得满分 100 分并获得','background:linear-gradient(135deg,#A66CFF,#C9A0FF);color:#fff')">
            <div class="medal-icon" style="background:linear-gradient(135deg,#A66CFF,#C9A0FF);color:#fff"><i class="ri-trophy-line"></i></div>
            <div class="medal-name">满分王者</div>
            <div class="medal-desc">考试满分</div>
          </div>
          <div class="medal-item" onclick="showMedalDetail('错题克星','掌握 50 道错题并获得','background:linear-gradient(135deg,#FF9F43,#FFB976);color:#fff')">
            <div class="medal-icon" style="background:linear-gradient(135deg,#FF9F43,#FFB976);color:#fff"><i class="ri-shield-check-line"></i></div>
            <div class="medal-name">错题克星</div>
            <div class="medal-desc">掌握 50 道错题</div>
          </div>
        </div>
        
        <div class="section-title">未获得勋章</div>
        <div class="medal-grid">
          <div class="medal-item locked">
            <div class="medal-icon"><i class="ri-medal-line"></i></div>
            <div class="medal-name">学习标兵</div>
            <div class="medal-desc">连续学习 30 天</div>
          </div>
          <div class="medal-item locked">
            <div class="medal-icon"><i class="ri-award-line"></i></div>
            <div class="medal-name">知识渊博</div>
            <div class="medal-desc">完成所有章节</div>
          </div>
          <div class="medal-item locked">
            <div class="medal-icon"><i class="ri-fire-line"></i></div>
            <div class="medal-name">火热学习</div>
            <div class="medal-desc">单日学习 5 小时</div>
          </div>
          <div class="medal-item locked">
            <div class="medal-icon"><i class="ri-medal-2-line"></i></div>
            <div class="medal-name">进步之星</div>
            <div class="medal-desc">成绩提升 20%</div>
          </div>
          <div class="medal-item locked">
            <div class="medal-icon"><i class="ri-book-3-line"></i></div>
            <div class="medal-name">博览群书</div>
            <div class="medal-desc">阅读 50 篇文章</div>
          </div>
          <div class="medal-item locked">
            <div class="medal-icon"><i class="ri-user-star-line"></i></div>
            <div class="medal-name">学习领袖</div>
            <div class="medal-desc">排行榜第一</div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="modal-title" id="modalTitle">勋章详情</div>
        </div>
        <div class="modal-body">
          <div class="modal-icon" id="modalIcon" style="background:linear-gradient(135deg,#FFD93D,#FF6B6B);color:#fff"><i class="ri-star-smile-line"></i></div>
          <div class="modal-text" id="modalText"></div>
        </div>
        <button class="modal-btn" onclick="closeModal()">关闭</button>
      </div>
    </div>
  </div>
  <script>
    function showMedalDetail(name,desc,style){
      document.getElementById('modalTitle').textContent=name;
      document.getElementById('modalText').textContent=desc;
      document.getElementById('modalIcon').style=style;
      document.getElementById('modalOverlay').classList.add('show');
    }
    
    function closeModal(e){
      if(e&&e.target!==document.getElementById('modalOverlay'))return;
      document.getElementById('modalOverlay').classList.remove('show');
    }
    
    function goBack(){
      if(window.history.length>1){
        window.history.back();
      }else{
        location.href='home.html';
      }
    }
    
    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    }
  </script>
</body>
</html>
