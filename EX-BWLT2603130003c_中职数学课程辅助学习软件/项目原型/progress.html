<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <title>学习进度 - 中职数学课程辅助学习软件</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--primary:#4A6CF7;--primary-light:#6B8AFF;--primary-dark:#3451D1;--accent:#FF6B6B;--accent-orange:#FF9F43;--accent-green:#2ED573;--accent-purple:#A66CFF;--bg:#F5F7FB;--card:#FFFFFF;--text:#1E293B;--text-sec:#64748B;--text-light:#94A3B8;--border:#E2E8F0;--shadow:0 2px 12px rgba(74,108,247,0.08);--shadow-lg:0 8px 32px rgba(74,108,247,0.12);--radius:16px}
    html,body{font-family:'Noto Sans SC',sans-serif;background:#1a1a2e;height:100%;overflow:hidden}
    .phone-frame{width:100%;height:100vh;background:var(--bg);overflow:hidden;position:relative}
    .page{height:100%;overflow-y:auto;overflow-x:hidden;background:var(--bg);-webkit-overflow-scrolling:touch}
    .page::-webkit-scrollbar{display:none}
    .sub-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .sub-back{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
    .sub-back:active{transform:scale(0.9)}
    .sub-title{color:#fff;font-size:17px;font-weight:700;flex:1}
    .sub-body{padding:16px}
    .progress-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
    .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .progress-title{font-size:16px;font-weight:700;color:var(--text)}
    .progress-percent{font-size:24px;font-weight:900;color:var(--primary)}
    .progress-bar{height:10px;background:#E8EDFF;border-radius:10px;overflow:hidden;margin-bottom:16px}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:10px;transition:width 1s ease}
    .progress-stats{display:flex;gap:12px}
    .stat-item{flex:1;background:var(--bg);border-radius:12px;padding:12px;text-align:center}
    .stat-num{font-size:20px;font-weight:900;color:var(--text)}
    .stat-label{font-size:11px;color:var(--text-light);margin-top:2px}
    .module-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s}
    .module-card:active{transform:scale(0.98)}
    .module-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .module-name{font-size:15px;font-weight:600;color:var(--text)}
    .module-percent{font-size:14px;font-weight:700;color:var(--primary)}
    .module-bar{height:6px;background:#E8EDFF;border-radius:6px;overflow:hidden}
    .module-fill{height:100%;border-radius:6px;transition:width 1s ease}
    .module-meta{display:flex;gap:16px;margin-top:8px}
    .module-meta span{font-size:11px;color:var(--text-light)}
    .rank-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
    .rank-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .rank-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .rank-title{font-size:14px;font-weight:600;color:var(--text)}
    .rank-list{}
    .rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
    .rank-item:last-child{border:none}
    .rank-num{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--text-light);background:var(--bg)}
    .rank-num.gold{background:linear-gradient(135deg,#FFD700,#FFAA00);color:#fff}
    .rank-num.silver{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#fff}
    .rank-num.bronze{background:linear-gradient(135deg,#CD7F32,#B87333);color:#fff}
    .rank-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#E8EDFF,#C9D1FF);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--primary)}
    .rank-name{flex:1;font-size:13px;color:var(--text)}
    .rank-score{font-size:13px;font-weight:600;color:var(--primary)}
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E293B;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page">
      <div class="sub-header">
        <div class="sub-back" onclick="location.href='home.html'"><i class="ri-arrow-left-s-line"></i></div>
        <div class="sub-title">学习进度</div>
      </div>
      <div class="sub-body">
        <div class="progress-card">
          <div class="progress-header">
            <div class="progress-title">总体完成度</div>
            <div class="progress-percent">42%</div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:42%"></div>
          </div>
          <div class="progress-stats">
            <div class="stat-item">
              <div class="stat-num" style="color:var(--primary)">28</div>
              <div class="stat-label">已学课时</div>
            </div>
            <div class="stat-item">
              <div class="stat-num" style="color:var(--accent-green)">156</div>
              <div class="stat-label">练习题数</div>
            </div>
            <div class="stat-item">
              <div class="stat-num" style="color:var(--accent-orange)">12</div>
              <div class="stat-label">连续打卡</div>
            </div>
          </div>
        </div>
        <div class="module-card" onclick="showToast('基础模块 已完成 65%')">
          <div class="module-header">
            <div class="module-name">基础模块·集合与函数</div>
            <div class="module-percent">65%</div>
          </div>
          <div class="module-bar">
            <div class="module-fill" style="width:65%;background:linear-gradient(90deg,var(--primary),var(--primary-light))"></div>
          </div>
          <div class="module-meta">
            <span><i class="ri-play-circle-line"></i> 12/18课时</span>
            <span><i class="ri-file-list-3-line"></i> 45题</span>
          </div>
        </div>
        <div class="module-card" onclick="showToast('基础模块 已完成 38%')">
          <div class="module-header">
            <div class="module-name">基础模块·不等式</div>
            <div class="module-percent">38%</div>
          </div>
          <div class="module-bar">
            <div class="module-fill" style="width:38%;background:linear-gradient(90deg,var(--accent-orange),#FFB976)"></div>
          </div>
          <div class="module-meta">
            <span><i class="ri-play-circle-line"></i> 8/21课时</span>
            <span><i class="ri-file-list-3-line"></i> 32题</span>
          </div>
        </div>
        <div class="module-card" onclick="showToast('基础模块 已完成 22%')">
          <div class="module-header">
            <div class="module-name">基础模块·数列</div>
            <div class="module-percent">22%</div>
          </div>
          <div class="module-bar">
            <div class="module-fill" style="width:22%;background:linear-gradient(90deg,var(--accent-green),#7BF0A5)"></div>
          </div>
          <div class="module-meta">
            <span><i class="ri-play-circle-line"></i> 5/23课时</span>
            <span><i class="ri-file-list-3-line"></i> 28题</span>
          </div>
        </div>
        <div class="module-card" onclick="showToast('基础模块 已完成 50%')">
          <div class="module-header">
            <div class="module-name">基础模块·三角函数</div>
            <div class="module-percent">50%</div>
          </div>
          <div class="module-bar">
            <div class="module-fill" style="width:50%;background:linear-gradient(90deg,var(--accent-purple),#C9A0FF)"></div>
          </div>
          <div class="module-meta">
            <span><i class="ri-play-circle-line"></i> 10/20课时</span>
            <span><i class="ri-file-list-3-line"></i> 51题</span>
          </div>
        </div>
        <div class="rank-card">
          <div class="rank-header">
            <div class="rank-icon" style="background:#FEF3C7;color:var(--accent-orange)"><i class="ri-trophy-line"></i></div>
            <div class="rank-title">学习排行榜</div>
          </div>
          <div class="rank-list">
            <div class="rank-item">
              <div class="rank-num gold">1</div>
              <div class="rank-avatar">张</div>
              <div class="rank-name">张明</div>
              <div class="rank-score">2890分</div>
            </div>
            <div class="rank-item">
              <div class="rank-num silver">2</div>
              <div class="rank-avatar">李</div>
              <div class="rank-name">李晓</div>
              <div class="rank-score">2650分</div>
            </div>
            <div class="rank-item">
              <div class="rank-num bronze">3</div>
              <div class="rank-avatar">王</div>
              <div class="rank-name">王强</div>
              <div class="rank-score">2430分</div>
            </div>
            <div class="rank-item">
              <div class="rank-num">4</div>
              <div class="rank-avatar">高</div>
              <div class="rank-name">高晶</div>
              <div class="rank-score">2180分</div>
            </div>
            <div class="rank-item">
              <div class="rank-num">5</div>
              <div class="rank-avatar">陈</div>
              <div class="rank-name">陈思</div>
              <div class="rank-score">1950分</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script>
    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2000);
    }
  </script>
</body>
</html>
